<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#2e7d6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<title>Find Your Good</title><!-- v4 -->
<style>
:root{
  --verde:#2e7d6b; --verde-chiaro:#e3f2ee; --crema:#faf7f2; --testo:#2b2b2b;
  --grigio:#8a8a8a; --rosso:#c65b4e; --rosso-chiaro:#fdeae7; --giallo:#f2b950;
  --card:#ffffff; --bordo:#e6e1d8; --blu:#4a7fa5; --input:#ffffff; --ombra:rgba(0,0,0,.05);
  --info:#edf3f8; --arancio:#e67e22; --switch-off:#cccccc;
  color-scheme:light;
}
/* Tema scuro: applicato automaticamente col sistema (se non forzato "chiaro"), o forzato "scuro" */
@media (prefers-color-scheme: dark){
  :root:not([data-tema="chiaro"]){
    --verde:#5ec4ae; --verde-chiaro:#1f463e; --crema:#141619; --testo:#eceae4;
    --grigio:#a6a6a6; --rosso:#ef8175; --rosso-chiaro:#432723; --giallo:#e6b04a;
    --card:#1e2124; --bordo:#3a3f44; --blu:#7fb0d1; --input:#282c30; --ombra:rgba(0,0,0,.45);
    --info:#18303b; --arancio:#f0955f; --switch-off:#5a5f64;
    color-scheme:dark;
  }
}
:root[data-tema="scuro"]{
  --verde:#5ec4ae; --verde-chiaro:#1f463e; --crema:#141619; --testo:#eceae4;
  --grigio:#a6a6a6; --rosso:#ef8175; --rosso-chiaro:#432723; --giallo:#e6b04a;
  --card:#1e2124; --bordo:#3a3f44; --blu:#7fb0d1; --input:#282c30; --ombra:rgba(0,0,0,.45);
  --info:#18303b; --arancio:#f0955f; --switch-off:#5a5f64;
  color-scheme:dark;
}
:root[data-tema="chiaro"]{ color-scheme:light; }
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--crema); color:var(--testo);
  font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif; font-size:18px;}
body{padding-bottom:90px;}
h1{font-size:1.35rem; margin:0;}
h2{font-size:1.15rem; margin:0 0 10px 0; color:var(--verde);}
.header{background:var(--verde); color:#fff; padding:14px 16px; display:flex;
  align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20;}
.header select{font-size:1rem; border-radius:10px; border:none; padding:8px 10px; background:#fff; color:var(--testo); max-width:45%;}
.contenuto{max-width:640px; margin:0 auto; padding:14px;}
.card{background:var(--card); border:1px solid var(--bordo); border-radius:16px;
  padding:16px; margin-bottom:14px; box-shadow:0 1px 3px var(--ombra);}
.riga-data{display:flex; align-items:center; justify-content:space-between; margin:4px 0 14px 0;}
.riga-data .titolo-data{font-weight:700; font-size:1.1rem; text-align:center; flex:1;}
.btn{display:inline-block; border:2px solid var(--bordo); background:var(--input); color:var(--testo);
  border-radius:14px; padding:12px 16px; font-size:1rem; cursor:pointer; min-height:48px;}
.btn:active{transform:scale(.97);}
.btn-verde{background:var(--verde); border-color:var(--verde); color:#fff; font-weight:600;}
.btn-freccia{width:48px; font-size:1.2rem; font-weight:700;}
.btn-piccolo{padding:8px 12px; min-height:40px; font-size:.95rem;}
.scala{display:flex; gap:8px; justify-content:space-between;}
.scala button{flex:1; font-size:1.7rem; padding:10px 0; min-height:56px; border:2px solid var(--bordo);
  border-radius:14px; background:var(--input); color:var(--testo); cursor:pointer;}
.scala button.attivo{border-color:var(--verde); background:var(--verde-chiaro);}
.scala-num button{font-size:1.15rem; font-weight:700;}
.etichette{display:flex; justify-content:space-between; font-size:.8rem; color:var(--grigio); margin-top:4px;}
.chips{display:flex; flex-wrap:wrap; gap:8px;}
.chip{border:2px solid var(--bordo); background:var(--input); color:var(--testo); border-radius:999px; padding:10px 16px;
  font-size:1rem; cursor:pointer; min-height:44px;}
.chip.attivo{border-color:var(--rosso); background:var(--rosso-chiaro); font-weight:600;}
.chip.attivo-verde{border-color:var(--verde); background:var(--verde-chiaro); font-weight:600;}
.chips-sugg{display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 8px;}
.chip-sugg{padding:6px 12px; min-height:36px; font-size:.9rem; border-style:dashed; opacity:.9;}
.sotto{font-size:.9rem; color:var(--grigio); margin-top:6px;}
.peso-box{display:flex; align-items:center; gap:10px; justify-content:center;}
.peso-box input{width:120px; font-size:1.6rem; text-align:center; padding:10px; border:2px solid var(--bordo); border-radius:14px; background:var(--input); color:var(--testo);}
.peso-box .btn{font-size:1.4rem; width:56px;}
.pasto{border-top:1px solid var(--bordo); padding:12px 0;}
.pasto:first-of-type{border-top:none;}
.pasto .nome{font-weight:700; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;}
.pasto .nome input[type=time]{font-size:1rem; padding:6px; border:2px solid var(--bordo); border-radius:10px;}
.dettagli-btn{width:100%; text-align:left; background:none; border:none; font-size:1rem;
  color:var(--blu); padding:6px 0; cursor:pointer; font-weight:600;}
.nascosto{display:none;}
.toggle-riga{display:flex; align-items:center; justify-content:space-between; padding:10px 0;}
.interruttore{position:relative; width:58px; height:32px; flex-shrink:0;}
.interruttore input{opacity:0; width:0; height:0;}
.slider{position:absolute; inset:0; background:var(--switch-off); border-radius:999px; transition:.2s; cursor:pointer;}
.slider:before{content:""; position:absolute; height:26px; width:26px; left:3px; top:3px;
  background:#fff; border-radius:50%; transition:.2s;}
input:checked + .slider{background:var(--verde);}
input:checked + .slider:before{transform:translateX(26px);}
textarea{width:100%; border:2px solid var(--bordo); border-radius:14px; padding:12px; font-size:1rem; font-family:inherit; min-height:70px; background:var(--input); color:var(--testo);}
input[type=time]{font-family:inherit;}
input[type=number],input[type=time],input[type=date],input[type=email],input[type=password],input[type=text]{background:var(--input); color:var(--testo);}
select{background:var(--input); color:var(--testo);}
.nav{position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--bordo);
  display:flex; z-index:30; padding-bottom:env(safe-area-inset-bottom);}
.nav button{flex:1; background:none; border:none; padding:10px 4px 8px 4px; font-size:.8rem;
  color:var(--grigio); cursor:pointer;}
.nav button .icona{display:block; font-size:1.5rem; margin-bottom:2px;}
.nav button.attivo{color:var(--verde); font-weight:700;}
.banner{background:var(--giallo); color:#5a4300; border-radius:14px; padding:14px; margin-bottom:14px;
  font-size:1rem; cursor:pointer; font-weight:600;}
.banner-verde{background:var(--verde-chiaro); color:var(--verde); cursor:default;}
.toast{position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--verde);
  color:#fff; padding:10px 22px; border-radius:999px; font-weight:600; z-index:50; opacity:0; transition:opacity .3s; pointer-events:none;}
.toast.visibile{opacity:1;}
.calendario{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.calendario .intestazione{text-align:center; font-size:.8rem; color:var(--grigio); font-weight:700;}
.giorno{aspect-ratio:1; border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:1rem; border:2px solid transparent; cursor:pointer; background:var(--input); color:var(--grigio);}
.giorno.compilato{background:var(--verde-chiaro); color:var(--verde); font-weight:700;}
.giorno.mancante{background:var(--rosso-chiaro); color:var(--rosso); font-weight:700;}
.giorno.futuro{opacity:.35; cursor:default;}
.giorno.oggi{border-color:var(--verde);}
.legenda{display:flex; gap:16px; margin-top:12px; font-size:.85rem; color:var(--grigio); flex-wrap:wrap;}
.pallino{display:inline-block; width:14px; height:14px; border-radius:50%; vertical-align:-2px; margin-right:4px;}
.mese-nav{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
.mese-nav .nome-mese{font-weight:700; font-size:1.1rem;}
canvas{width:100%; height:220px;}
.selettore-grafico{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
.correlazione{border-left:5px solid var(--rosso); background:var(--rosso-chiaro); border-radius:0 12px 12px 0;
  padding:12px; margin-bottom:10px; font-size:1rem;}
.correlazione.positiva{border-left-color:var(--verde); background:var(--verde-chiaro);}
.correlazione .forza{font-size:.85rem; color:var(--grigio); margin-top:4px;}
.avviso{font-size:.85rem; color:var(--grigio); font-style:italic; margin-top:14px;}
.riga-profilo{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--bordo);}
.streak{background:rgba(255,255,255,.2); border-radius:999px; padding:6px 12px; font-size:.9rem; font-weight:700;}
.sezione-scala{margin-bottom:18px;}
.sezione-scala .nome-scala{font-weight:700; margin-bottom:8px;}
.tre-bottoni{display:flex; gap:8px;}
.tre-bottoni .chip{flex:1; text-align:center;}
.form-riga{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;}
.form-riga input[type=text],.form-riga input[type=number],.form-riga input[type=date],
.form-riga input[type=email],.form-riga input[type=password],.form-riga select{
  flex:1; min-width:130px; padding:10px; font-size:1rem; border:2px solid var(--bordo); border-radius:12px; font-family:inherit; background:var(--input); color:var(--testo);}
.elemento-lista{border:1px solid var(--bordo); border-radius:12px; padding:10px 12px; margin-bottom:8px; background:var(--card);}
.elemento-lista .titolo{font-weight:700; display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;}
.badge{display:inline-block; border-radius:999px; padding:3px 10px; font-size:.75rem; font-weight:700; color:#fff;}
.giorno{position:relative;}
.punti-giorno{display:flex; gap:3px; justify-content:center; position:absolute; bottom:4px; left:0; right:0;}
.punto{width:6px; height:6px; border-radius:50%; display:inline-block;}
.previsione{border-radius:14px; padding:14px; margin-bottom:10px; font-size:1rem;}
.consiglio{border-left:5px solid var(--blu); background:var(--info); border-radius:0 12px 12px 0; padding:12px; margin-bottom:10px; font-size:.98rem;}
.stat-griglia{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.stat-box{background:var(--verde-chiaro); border-radius:12px; padding:12px; text-align:center;}
.stat-box .numero{font-size:1.35rem; font-weight:800; color:var(--verde);}
.stat-box .nome-stat{font-size:.82rem; color:var(--grigio); margin-top:2px;}
.stato-sync{font-size:.9rem; margin-top:8px; color:var(--grigio);}
.pastiglia-colore{display:inline-block; width:20px; height:20px; border-radius:50%; border:1px solid rgba(128,128,128,.4); vertical-align:-4px; margin-right:6px;}
.contatore-acqua{display:flex; align-items:center; justify-content:center; gap:14px;}
.contatore-acqua .valore{font-size:2rem; font-weight:800; min-width:120px; text-align:center; color:var(--blu);}
.contatore-acqua .btn{font-size:1.5rem; width:56px;}
.barra-acqua{background:var(--bordo); border-radius:999px; height:12px; overflow:hidden; margin:10px 0 4px;}
.barra-acqua > div{background:var(--blu); height:100%; transition:width .2s;}
.tipo-attivita{margin-top:10px;}
.tipo-attivita input{width:100%; padding:10px; font-size:1rem; border:2px solid var(--bordo); border-radius:12px; font-family:inherit; background:var(--input); color:var(--testo);}
pre.sql{background:var(--input); border-radius:12px; padding:12px; font-size:.75rem; overflow-x:auto; white-space:pre-wrap;}
/* Selettori orario/data uniformi (anche in tema scuro) */
input[type=time],input[type=date]{border:2px solid var(--bordo); border-radius:12px; padding:8px 10px; font-size:1rem; font-family:inherit; background:var(--input); color:var(--testo); min-height:44px;}
/* Input numerici uniformi (obiettivo acqua, convalescenza) */
.campo-num{border:2px solid var(--bordo); border-radius:12px; padding:8px 10px; font-size:1rem; font-family:inherit; background:var(--input); color:var(--testo); min-height:44px; text-align:center;}
/* Pulsanti intensità attività */
.chips-int{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
.chips-int .chip{flex:1; min-width:70px; text-align:center; padding:8px 6px;}
/* Slider intensità disturbi */
.riga-intensita{display:flex; align-items:center; gap:10px; margin:8px 0;}
.riga-intensita .etichetta-int{flex:1; font-size:.95rem;}
.riga-intensita input[type=range]{flex:1.4; accent-color:var(--rosso); height:26px;}
.riga-intensita .val-int{min-width:44px; text-align:right; font-weight:800; color:var(--rosso);}
/* Modale riepilogo giorno */
.modale-overlay{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:60; display:flex; align-items:flex-end; justify-content:center;}
.modale{background:var(--card); width:100%; max-width:640px; max-height:86vh; overflow:auto; border-radius:22px 22px 0 0; padding:18px; box-shadow:0 -4px 20px rgba(0,0,0,.3);}
.modale .maniglia{width:44px; height:5px; border-radius:999px; background:var(--bordo); margin:0 auto 12px;}
.modale h2{margin-bottom:12px;}
.rie-riga{display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px solid var(--bordo); font-size:1rem;}
.rie-riga .et{color:var(--grigio);}
.rie-riga .vl{font-weight:600; text-align:right;}
.durata-input{width:80px; text-align:center;}
.voce-attivita{border:1px solid var(--bordo); border-radius:12px; padding:10px; margin-top:8px; background:var(--input);}
.voce-attivita .riga1{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.voce-attivita input[type=text]{flex:1; min-width:120px; padding:8px 10px; font-size:1rem; border:2px solid var(--bordo); border-radius:10px; background:var(--card); color:var(--testo); font-family:inherit;}
.voce-attivita input[type=number]{width:78px; padding:8px; font-size:1rem; border:2px solid var(--bordo); border-radius:10px; background:var(--card); color:var(--testo); text-align:center; font-family:inherit;}
/* Blocco scorrimento sfondo quando un popup è aperto (evita che scrolli la pagina dietro) */
body.modale-aperta{overflow:hidden;}
/* Resoconto: campi data che non sforino su mobile */
.periodo-date{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
.periodo-date label{flex:1 1 130px; min-width:120px; font-size:.9rem; color:var(--grigio);}
.periodo-date label input[type=date]{width:100%; display:block; margin-top:4px;}
/* Slider orari sonno (passi 15 min) */
.slider-orario{display:flex; align-items:center; gap:10px; margin:8px 0;}
.slider-orario .et-ora{flex:0 0 90px; font-size:.95rem;}
.slider-orario input[type=range]{flex:1; accent-color:var(--verde); height:26px;}
.slider-orario .val-ora{flex:0 0 60px; text-align:right; font-weight:800; color:var(--verde);}
/* Selettore vista diario */
.diario-modi{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
.diario-modi .chip{flex:1; text-align:center; min-width:64px; padding:8px 6px;}
/* Timeline giorno/settimana (blocchi colorati fra gli orari) */
.tl-scroll{max-height:70vh; overflow-y:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--bordo); border-radius:12px;}
.tl-wrap{display:flex; min-width:100%;}
.tl-ore-col{flex:0 0 40px; position:relative;}
.tl-giorni{display:flex; flex:1; min-width:0;}
.tl-col{flex:1 1 0; min-width:64px; position:relative; border-left:1px solid var(--bordo);}
.tl-testa{position:sticky; top:0; z-index:3; background:var(--card); text-align:center; font-size:.8rem; font-weight:700; padding:6px 2px; border-bottom:1px solid var(--bordo); cursor:pointer;}
.tl-testa.oggi{color:var(--verde);}
.tl-testa small{display:block; font-weight:400; color:var(--grigio); font-size:.68rem;}
.tl-griglia{position:relative;}
.tl-riga-ora{position:absolute; left:0; right:0; border-top:1px dashed var(--bordo); height:0;}
.tl-ora-et{position:absolute; left:0; font-size:.62rem; color:var(--grigio); transform:translateY(-6px); padding-left:2px;}
.tl-blocco{position:absolute; left:3px; right:3px; border-radius:6px; font-size:.66rem; line-height:1.1; color:#fff; padding:2px 4px; overflow:hidden; box-shadow:0 1px 2px var(--ombra);}
.tl-vuoto{padding:14px; text-align:center; color:var(--grigio); font-size:.9rem;}
.tl-fascia-dist{position:sticky; top:32px; z-index:2; background:var(--rosso-chiaro); color:var(--rosso); font-size:.68rem; padding:2px 4px; border-bottom:1px solid var(--rosso);}
/* Vista anno */
.anno-griglia{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px;}
.anno-mese .nome{font-weight:700; text-align:center; color:var(--verde); font-size:.85rem; margin-bottom:5px; cursor:pointer;}
.anno-cal{display:grid; grid-template-columns:repeat(7,1fr); gap:2px;}
.anno-int{text-align:center; font-size:.5rem; color:var(--grigio);}
.anno-g{aspect-ratio:1; border-radius:3px; background:var(--input); display:flex; align-items:center; justify-content:center; font-size:.55rem; color:var(--grigio); cursor:pointer; position:relative; overflow:hidden;}
.anno-g.compilato{background:var(--verde-chiaro); color:var(--verde); font-weight:700;}
.anno-g.mancante{background:var(--rosso-chiaro); color:var(--rosso);}
.anno-g.oggi{outline:2px solid var(--verde); outline-offset:-1px;}
.anno-g .adot{position:absolute; bottom:1px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%;}
/* Esami del sangue */
.esame-riga{display:flex; justify-content:space-between; gap:8px; align-items:baseline; padding:6px 0; border-bottom:1px solid var(--bordo); font-size:.95rem; flex-wrap:wrap;}
.esame-riga .val{font-weight:700;}
.esame-riga .fuori{color:var(--rosso);}
.trend-su{color:var(--rosso);} .trend-giu{color:var(--verde);} .trend-stab{color:var(--grigio);}
</style>
</head>
<body>

<div class="header">
  <h1>🌱 Find Your Good</h1>
  <div style="display:flex; gap:10px; align-items:center;">
    <span class="streak" id="streak"></span>
  </div>
</div>

<div class="contenuto" id="app"></div>

<div class="nav">
  <button id="nav-oggi" onclick="vai('oggi')"><span class="icona">📝</span>Oggi</button>
  <button id="nav-diario" onclick="vai('diario')"><span class="icona">📅</span>Diario</button>
  <button id="nav-analisi" onclick="vai('analisi')"><span class="icona">📊</span>Analisi</button>
  <button id="nav-salute" onclick="vai('salute')"><span class="icona">💊</span>Sanità</button>
  <button id="nav-impostazioni" onclick="vai('impostazioni')"><span class="icona">⚙️</span>Altro</button>
</div>

<div class="toast" id="toast">Salvato ✓</div>
<div id="modale"></div>

<script>
"use strict";
/* ============ DATI E STATO ============ */
const CHIAVE = "fyg_v1";
let S = carica();
let vista = "oggi";
let dataInModifica = oggi();
let meseDiario = oggi().slice(0,7); // "AAAA-MM"
let sezioniAperte = new Set();   // sezioni espandibili aperte (persistono tra i render)
let saluteRitorno = null;        // giorno da cui si è aperta la scheda Salute
let scrollPos = {};              // posizione di scroll memorizzata per ogni sezione
let authPronto = false;          // controllo sessione completato
let promptInstall = null;        // evento per installare la PWA
let clickTimer = null;           // per distinguere click singolo/doppio sul calendario

function carica(){
  try{
    const raw = localStorage.getItem(CHIAVE);
    if(raw){ const s=JSON.parse(raw); if(!s.salute) s.salute={};
      if(!s.impostazioni) s.impostazioni={}; if(s.impostazioni.tema==null) s.impostazioni.tema="auto";
      return s; }
  }catch(e){}
  const id = "p" + Date.now();
  return { profili:[{id:id, nome:"Io"}], profiloCorrente:id, voci:{}, salute:{}, impostazioni:{oraPromemoria:"20:00", tema:"auto"} };
}
function applicaTema(){
  const t=(S.impostazioni&&S.impostazioni.tema)||"auto";
  const html=document.documentElement;
  if(t==="chiaro") html.setAttribute("data-tema","chiaro");
  else if(t==="scuro") html.setAttribute("data-tema","scuro");
  else html.removeAttribute("data-tema");
  // aggiorna il colore della barra del browser
  const scuroAttivo = t==="scuro" || (t==="auto" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute("content", scuroAttivo ? "#15171a" : "#2e7d6b");
}

function fmtData(d){

function dataBella(iso){

  const pre = iso===oggi() ? "Oggi, " : (iso===spostaGiorni(oggi(),-1) ? "Ieri, " : "");
  return pre + giorni[d.getDay()]+" "+g+" "+mesi[m-1];
}
function spostaGiorni(iso, n){

function vociProfilo(){

  if(!v[data].pasti) v[data].pasti={};
  if(!v[data].sintomi) v[data].sintomi=[];
  if(!v[data].attivita) v[data].attivita=[];
  if(!v[data].attivitaTipo) v[data].attivitaTipo={};

}
function compilato(data){

function giorniConvalescenza(){
  const n=S.impostazioni&&S.impostazioni.giorniConvalescenza;

}
function convAutomatica(){ return !(S.impostazioni&&S.impostazioni.convalescenzaAuto===false); }
/* Giorni base di attenzione per tipo di disturbo (poi scalati sull'intensità) */
function tipoBaseConval(sk){
  const m={malattia:6, ferita:6, dolori:4, malPancia:3, freddo:3, allergie:2, malTesta:2, fastidi:2};
  return m[sk]||3;
}
function giorniConvalescenzaPer(sk, intensita){
  const base=tipoBaseConval(sk);
  const f = (intensita>=1&&intensita<=10) ? (0.6 + (intensita/10)*0.8) : 1;   // ~0.68 (lieve) → 1.4 (intenso)
  return Math.max(1, Math.min(21, Math.round(base*f)));
}
function bannerConvalescenza(){
  const auto=convAutomatica();
  const Nfisso=giorniConvalescenza();
  if(!auto && Nfisso<=0) return "";
  const voci=vociProfilo();
  const vOggi=voci[dataInModifica];
  const attiviOggi=new Set((vOggi&&vOggi.sintomi)||[]);
  const nomi={}; SINTOMI.forEach(([k,n])=>nomi[k]=n);
  const maxLook = auto ? 21 : Nfisso;
  const inConvalescenza=[];
  for(const [sk] of SINTOMI){
    if(attiviOggi.has(sk)) continue;               // ancora presente: non è convalescenza
    for(let i=1;i<=maxLook;i++){
      const d=spostaGiorni(dataInModifica,-i);
      const vd=voci[d];
      if(vd&&(vd.sintomi||[]).includes(sk)){
        const intens=vd.sintomiIntensita&&vd.sintomiIntensita[sk];
        const finestra = auto ? giorniConvalescenzaPer(sk, intens) : Nfisso;
        if(i<=finestra) inConvalescenza.push([nomi[sk], i, finestra]);
        break;                                     // conta solo l'ultima comparsa
      }
    }
  }
  if(inConvalescenza.length===0) return "";
  const lista=inConvalescenza.map(([n,g,f])=>`${n} (sparito ${g} giorn${g===1?"o":"i"} fa · attenzione ~${f} gg)`).join(", ");
  return `<div class="banner" style="background:var(--verde-chiaro);color:var(--testo);border:1px solid var(--verde)">
    🩹 <b>Convalescenza</b>: ${lista}. Per qualche giorno vale la pena stare più a bacchetta e fare attenzione: un fastidio residuo o una piccola ricaduta sono normali, ma segnali che tornano vanno annotati bene.${auto?" <span class='sotto' style='display:block;margin-top:4px'>Durata stimata da tipo e intensità del disturbo.</span>":""}</div>`;
}

      <div class="toggle-riga"><span>Quante volte ti sei svegliato?</span>
        <input type="number" min="0" inputmode="numeric" style="width:80px" value="${v.risvegli!=null?v.risvegli:""}" placeholder="0" onchange="impostaCampoNum('risvegli',this.value)"></div>
      <label class="sotto" style="display:block;margin:6px 0 4px">Perché ti sei svegliato? (facoltativo)</label>
      <input type="text" value="${esc(v.motivoRisvegli)}" placeholder="Es. bagno, rumori, pensieri..." onkeydown="if(event.key==='Enter')this.blur()" onchange="imposta('motivoRisvegli',this.value)" style="width:100%;padding:10px;border:2px solid var(--bordo);border-radius:12px;background:var(--input);color:var(--testo);font-family:inherit">
      <label class="sotto" style="display:block;margin:10px 0 4px">💭 Sogni (facoltativo)</label>
      <input type="text" value="${esc(v.sogni)}" placeholder="Cosa hai sognato..." onkeydown="if(event.key==='Enter')this.blur()" onchange="imposta('sogni',this.value)" style="width:100%;padding:10px;border:2px solid var(--bordo);border-radius:12px;background:var(--input);color:var(--testo);font-family:inherit">
      <div class="toggle-riga" style="margin-top:8px"><span>😱 Hai avuto incubi?</span>

      ${v.incubi?`<input type="text" value="${esc(v.notaIncubi)}" placeholder="Che incubo? (facoltativo)" onkeydown="if(event.key==='Enter')this.blur()" onchange="imposta('notaIncubi',this.value)" style="width:100%;padding:10px;border:2px solid var(--bordo);border-radius:12px;background:var(--input);color:var(--testo);font-family:inherit">`:""}
    </div>
  </div>`;

  // Corpo e ambiente
  if(traccia('corpoAmbiente')) h+=`<div class="card"><h2>🌤️ Corpo e ambiente</h2>
    <div class="sezione-scala"><div class="nome-scala">🌡️ Che temperatura ha fatto oggi?</div>${scala("temperatura",v.temperatura,TEMP_EMOJI,["Molto freddo","Molto caldo"])}</div>
    <div class="sezione-scala"><div class="nome-scala">🥱 Stanchezza</div>${scala("stanchezza",v.stanchezza,null,["Pieno di energie","Esausto"])}</div>
    <div class="sezione-scala"><div class="nome-scala">💤 Sonnolenza durante il giorno</div>${scala("sonnolenza",v.sonnolenza,null,["Sveglissimo","Crollavo"])}</div>
    <div class="nome-scala" style="font-weight:700;margin-bottom:8px">☀️ Sole preso oggi</div>
    <div class="chips">${SOLE.map(([k,n])=>`<button class="chip ${v.sole===k?"attivo-verde":""}" onclick="imposta('sole','${k}')">${n}</button>`).join("")}</div>
    <div class="toggle-riga"><span>☁️ Giornata nuvolosa?</span>
      <label class="interruttore"><input type="checkbox" ${v.nuvoloso?"checked":""} onchange="imposta('nuvoloso',this.checked)"><span class="slider"></span></label></div>
    <div class="sotto">Obiettivo: almeno 15 minuti di sole al giorno, 30 se è nuvoloso.</div>
  </div>`;

  // Idratazione e segnali del corpo
  if(traccia('idratazione')||traccia('urina')||traccia('feci')||traccia('occhi')){
    const obiettivo=obiettivoAcqua();
    const bicch=v.acqua||0;
    const pctAcqua=Math.min(100, Math.round(bicch/obiettivo*100));
    let msgAcqua;
    if(bicch===0) msgAcqua="Tocca + ogni volta che bevi un bicchiere d'acqua.";
    else if(bicch<obiettivo) msgAcqua=`Ancora ${obiettivo-bicch} bicchier${obiettivo-bicch===1?"e":"i"} per l'obiettivo.`;
    else msgAcqua="Ottimo, obiettivo raggiunto! 💧";
    const sepStile="font-weight:700;margin:8px 0;padding-top:18px;border-top:1px solid var(--bordo)";
    h+=`<div class="card"><h2>💧 Idratazione e segnali del corpo</h2>`;
    if(traccia('idratazione')) h+=`
      <div class="nome-scala" style="font-weight:700;margin-bottom:8px">Acqua bevuta (bicchieri da ~250 ml)</div>
      <div class="contatore-acqua">

    if(traccia('feci')){

      h+=`

      <div class="contatore-acqua">
        <button class="btn" onclick="modificaScariche(-1)">−</button>

        <button class="btn" onclick="modificaScariche(1)">+</button>

      <div class="sotto" style="text-align:center">${nScar===0?"Tocca + per ogni volta che scarichi durante la giornata.":(nScar>=4?"Diverse scariche oggi: se sono liquide o si ripetono per più giorni, valuta col medico.":"Registrato. La regolarità intestinale è un buon segnale del corpo.")}</div>
      <div class="nome-scala" style="${sepStile}">💩 Colore delle feci</div>
      <div class="chips">${FECI.map(([k,n,c])=>`<button class="chip ${v.feci===k?"attivo-verde":""}" onclick="imposta('feci','${k}')"><span class="pastiglia-colore" style="background:${c}"></span>${n}</button>`).join("")}</div>
      ${v.feci?`<div class="sotto">${notaFeci(v.feci)}</div>`:""}
      <div class="nome-scala" style="${sepStile}">🧻 Consistenza delle feci</div>
      <div class="chips">${CONSISTENZA_FECI.map(([k,n])=>`<button class="chip ${v.feciConsistenza===k?"attivo-verde":""}" onclick="imposta('feciConsistenza','${k}')">${n}</button>`).join("")}</div>
      ${v.feciConsistenza?`<div class="sotto">${notaConsistenza(v.feciConsistenza)}</div>`:""}`;
    }

    if(traccia('occhi')) h+=`
      <div class="nome-scala" style="${sepStile}">👁️ Giallore degli occhi</div>
      <div class="chips">${OCCHI.map(([k,n])=>`<button class="chip ${v.occhi===k?(k==="o_no"?"attivo-verde":"attivo"):""}" onclick="imposta('occhi','${k}')">${n}</button>`).join("")}</div>
      ${v.occhi==="o_marcato"?`<div class="sotto">⚠️ Un giallore evidente di occhi o pelle va sempre mostrato a un medico (può riguardare fegato o bilirubina).</div>`:`<div class="sotto">Un colore giallo di occhi o pelle (ittero) è un segnale da non ignorare.</div>`}`;

  // Pasti
  if(traccia('pasti')){
  h+=`<div class="card"><h2>🍽️ Pasti</h2>`;
  for(const [pk,pn] of PASTI){

    h+=`<button class="chip ${p.ecc?"attivo":""}" onclick="impostaPasto('${pk}','ecc',${p.ecc?"false":"true"})">⚠️ Eccezione dieta</button>
      </div></div>`;
  }
  h+=`<div class="sotto">"Eccezione dieta" = hai mangiato qualcosa fuori dalla tua dieta abituale.</div></div>`;

  // Sintomi
  if(traccia('disturbi')){
  h+=`<div class="card"><h2>🩺 Disturbi di oggi</h2><div class="chips">`;
  for(const [sk,sn] of SINTOMI){
    h+=`<button class="chip ${v.sintomi.includes(sk)?"attivo":""}" onclick="togglaLista('sintomi','${sk}')">${sn}</button>`;

  h+=`</div>`;
  // Dettaglio disturbi: tipo (facoltativo) + intensità 1-10
  for(const [sk,sn] of SINTOMI){
    if(!v.sintomi.includes(sk)) continue;
    const tipo=(v.sintomiTipo&&v.sintomiTipo[sk])||"";
    const val=(v.sintomiIntensita&&v.sintomiIntensita[sk])||"";
    const sugg=suggerimentiSintomo(sk);
    h+=`<div class="voce-attivita">
      <label class="sotto" style="display:block;margin-bottom:4px;font-weight:700">${sn}</label>

      ${chipsSuggSint(sk,sugg,tipo)}
      <div class="riga-intensita" style="margin:0">
        <span class="etichetta-int">Intensità</span>
        <input type="range" min="1" max="10" value="${val||5}" oninput="mostraValInt(this)" onchange="impostaIntensita('${sk}',this.value)">
        <span class="val-int">${val?val+"/10":"—"}</span>
      </div>
    </div>`;
  }
  if(v.sintomi.length>0) h+=`<div class="sotto">Per ogni disturbo puoi indicare il tipo e l'intensità (1-10). Tutto facoltativo.</div>`;
  if(v.sintomi.includes("ferita")){
    h+=`<div class="toggle-riga"><span>La ferita cicatrizza lentamente?</span>
      <label class="interruttore"><input type="checkbox" ${v.feritaLenta?"checked":""} onchange="imposta('feritaLenta',this.checked)"><span class="slider"></span></label></div>
    <div class="sotto">Se le ferite guariscono lentamente, parlane col medico (possibile carenza di vitamina K o rischio infezioni).</div>`;
  }
  h+=`<div class="sotto">Non selezionare niente = giornata senza disturbi 🎉</div></div>`;
  }

  // Attività
  if(traccia('attivita')){
  h+=`<div class="card"><h2>🌿 Cura di te (oggi)</h2><div class="chips">`;
  for(const [ak,an] of ATTIVITA){
    h+=`<button class="chip ${v.attivita.includes(ak)?"attivo-verde":""}" onclick="togglaLista('attivita','${ak}')">${an}</button>`;
  }
  h+=`</div>`;
  if(v.attivita.includes("pisolino")){
    h+=`<div class="toggle-riga"><span>Pisolino subito dopo un pasto?</span>
      <label class="interruttore"><input type="checkbox" ${v.pisolinoDopoPasto?"checked":""} onchange="imposta('pisolinoDopoPasto',this.checked)"><span class="slider"></span></label></div>
    <div class="sotto">Sdraiarsi subito dopo mangiato può disturbare la digestione.</div>`;
  }
  // Dettaglio attività: aggiungi voci a volontà con tipo, durata (min) e orario
  for(const [ak,an] of ATTIVITA){
    if(!v.attivita.includes(ak)) continue;
    if(!v.attivitaDett) v.attivitaDett={};
    let entries=v.attivitaDett[ak];
    if(!entries){ entries = (v.attivitaTipo&&v.attivitaTipo[ak]) ? [{n:v.attivitaTipo[ak], d:"", o:""}] : []; v.attivitaDett[ak]=entries; }
    const sugg=suggerimentiTipo(ak);
    const nomePulito=an.replace(/^[^ ]+ /,"").toLowerCase();
    h+=`<div class="tipo-attivita">
      <label class="sotto" style="display:block;margin-bottom:4px;font-weight:700">${an} <span style="opacity:.7;font-weight:400">— dettagli facoltativi</span></label>`;
    entries.forEach((e,idx)=>{
      h+=`<div class="voce-attivita"><div class="riga1">
        <input type="text" value="${esc(e.n)}" placeholder="Tipo/nome" onkeydown="if(event.key==='Enter')this.blur()" onchange="impostaVoceAttivita('${ak}',${idx},'n',this.value)">
        <input type="number" min="0" inputmode="numeric" value="${(e.d!==''&&e.d!=null)?e.d:''}" placeholder="min" title="Durata in minuti" onchange="impostaVoceAttivita('${ak}',${idx},'d',this.value)">
        <input type="time" value="${e.o||''}" title="Orario" onchange="impostaVoceAttivita('${ak}',${idx},'o',this.value)">
        <button class="btn btn-piccolo" onclick="eliminaVoceAttivita('${ak}',${idx})" title="Rimuovi">🗑️</button>
      </div>${chipsSuggAtt(ak,idx,sugg,e.n)}
      <div class="chips-int">${INTENSITA_ATT.map(([ik,inome])=>`<button type="button" class="chip ${e.int===ik?"attivo-verde":""}" onclick="impostaIntensitaAtt('${ak}',${idx},'${ik}')">${inome}</button>`).join("")}</div></div>`;
    });
    h+=`<button class="chip btn-piccolo" style="margin-top:8px" onclick="aggiungiVoceAttivita('${ak}')">➕ Aggiungi ${nomePulito}</button>
    </div>`;
  }
  h+=`</div>`;
  }

  // Salute del giorno (farmaci attivi, visite, notizie)
  {
    const sp=saluteProfilo();
    const fAtt=sp.farmaci.filter(f=>dataInModifica>=f.dal&&(!f.al||dataInModifica<=f.al));
    const tAtt=sp.trattamenti.filter(t=>dataInModifica>=t.dal&&(!t.al||dataInModifica<=t.al));
    const vG=sp.visite.filter(x=>x.data===dataInModifica);
    const nG=sp.notizie.filter(x=>x.data===dataInModifica);
    h+=`<div class="card"><h2>💊 Sanità in questo giorno</h2>`;
    if(fAtt.length===0&&tAtt.length===0&&vG.length===0&&nG.length===0) h+=`<div class="sotto" style="margin-top:0">Nessun farmaco, trattamento, visita o notizia registrata per questo giorno.</div>`;
    if(fAtt.length>0||tAtt.length>0) h+=`<div class="sotto" style="margin-top:0;margin-bottom:8px">Hai preso/fatto quello di oggi? Segna anche se hai <b>saltato</b>: serve all'analisi.</div>`;
    for(const f of fAtt) h+=rigaAderenza(f.id,"💊",f.nome,f.dose,"Preso");
    for(const t of tAtt) h+=rigaAderenza(t.id,"🧑‍⚕️",t.nome,t.dett,"Fatto");
    for(const x of vG) h+=`<div class="elemento-lista">🩺 <b>${esc(x.testo)}</b>${x.invasivo?' <span class="badge" style="background:var(--rosso)">invasivo</span>':""}</div>`;
    for(const x of nG) h+=`<div class="elemento-lista">${x.tipo==="buona"?"📬✨":"📬⛈️"} ${esc(x.testo)}</div>`;
    h+=`<button class="chip" style="margin-top:6px" onclick="saluteRitorno=dataInModifica;vai('salute')">➕ Gestisci farmaci, visite e notizie</button></div>`;
  }

  // Extra
  h+=`<div class="card">
    <button class="dettagli-btn" onclick="togglaSezione('dett-extra')">➕ Altri dettagli (facoltativi) ▾</button>
    <div id="dett-extra" class="${sezClass('dett-extra')}">
      <div class="sezione-scala" style="margin-top:10px"><div class="nome-scala">Quanto sei stato fermo/seduto?</div>${scala("sedentarieta",v.sedentarieta,null,["Sempre in movimento","Tutto il giorno fermo"])}</div>
      ${traccia('igiene')?`
      <div class="sezione-scala"><div class="nome-scala">🪥 Lavaggi denti (quante volte)</div>
        <div class="scala scala-num">
          ${[0,1,2,3].map(n=>`<button class="${v.denti===n?"attivo":""}" onclick="imposta('denti',${n})">${n}</button>`).join("")}
        </div></div>
      <div class="sezione-scala"><div class="nome-scala">🧵 Filo interdentale (quante volte)</div>
        <div class="scala scala-num">
          ${[0,1,2,3].map(n=>`<button class="${v.filo===n?"attivo":""}" onclick="imposta('filo',${n})">${n}</button>`).join("")}
        </div></div>
      <div class="toggle-riga"><span>🌊 Lavaggio con colluttorio</span>

      <div class="toggle-riga"><span>Giornata in pessime condizioni igieniche?</span>
        <label class="interruttore"><input type="checkbox" ${v.igienePessima?"checked":""} onchange="imposta('igienePessima',this.checked)"><span class="slider"></span></label></div>
      <div class="nome-scala" style="font-weight:700; margin:10px 0 8px 0">📝 Note libere</div>
      <textarea placeholder="Qualsiasi cosa vuoi ricordare di oggi..." onchange="imposta('note',this.value)">${esc(v.note)}</textarea>
    </div>
  </div>`;

  h+=`<div style="text-align:center; margin:20px 0">
    <button class="btn btn-verde" style="font-size:1.15rem; padding:16px 40px" onclick="mostraToast('Giornata salvata ✓');vai('diario')">✓ Ho finito per ${dataInModifica===oggi()?"oggi":"questo giorno"}</button>
    <div class="sotto" style="margin-top:8px">Tutto si salva da solo mentre compili.</div>
  </div>`;
  return h;

/* Orari sonno: conversioni + slider a passi di 15 min */
function minToHHMM(m){ m=((Math.round(m)%1440)+1440)%1440; return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0"); }
function hhmmToMin(s){ if(!s) return null; const [H,M]=s.split(":").map(Number); return H*60+M; }
function sonnoDefault(campo){
  const d=S.impostazioni&&S.impostazioni[campo+"Default"];
  return d || (campo==="oraDormire"?"23:00":"07:00");
}
function posSlider(hhmm, base){ const m=hhmmToMin(hhmm); return Math.max(0,Math.min(660, ((m-base)%1440+1440)%1440)); }
function mostraOraSlider(el, base){ const s=el.parentNode.querySelector(".val-ora-inp"); if(s) s.value=minToHHMM(base + (+el.value)); }
function impostaOraSonno(campo, base, val){ imposta(campo, minToHHMM(base + (+val))); }
function togglaSezione(id){
  const el=document.getElementById(id);
  el.classList.toggle("nascosto");
  if(el.classList.contains("nascosto")) sezioniAperte.delete(id); else sezioniAperte.add(id);
}
function sezClass(id, apertaSeVero){ return (sezioniAperte.has(id) || apertaSeVero) ? "" : "nascosto"; }
function aggiungiVoceAttivita(ak){
  const v=voce(dataInModifica);
  if(!v.attivitaDett) v.attivitaDett={};
  if(!v.attivitaDett[ak]) v.attivitaDett[ak]=[];
  v.attivitaDett[ak].push({n:"", d:"", o:""});
  v.agg=Date.now(); salva(); render();
}
function impostaVoceAttivita(ak, idx, campo, val){
  const v=voce(dataInModifica);
  if(!v.attivitaDett||!v.attivitaDett[ak]||!v.attivitaDett[ak][idx]) return;
  if(campo==="d"){ v.attivitaDett[ak][idx].d = (val===""? "" : Math.max(0, parseInt(val,10)||0)); }
  else { v.attivitaDett[ak][idx][campo] = val; }
  v.agg=Date.now(); salva();
}
function impostaIntensitaAtt(ak, idx, val){
  const v=voce(dataInModifica);
  if(!v.attivitaDett||!v.attivitaDett[ak]||!v.attivitaDett[ak][idx]) return;
  const e=v.attivitaDett[ak][idx];
  e.int = (e.int===val) ? "" : val;   // ritocca per deselezionare
  v.agg=Date.now(); salva(); render();
}
function eliminaVoceAttivita(ak, idx){
  const v=voce(dataInModifica);
  if(!v.attivitaDett||!v.attivitaDett[ak]) return;
  v.attivitaDett[ak].splice(idx,1);
  v.agg=Date.now(); salva(); render();
}
function chipsSuggSint(sk, sugg, corrente){
  const cur=String(corrente||"").toLowerCase();
  const items=(sugg||[]).filter(s=>s.toLowerCase()!==cur).slice(0,8);
  if(!items.length) return "";
  return `<div class="chips-sugg">`+items.map(s=>`<button type="button" class="chip chip-sugg" onclick="applicaSuggSint('${sk}',this.textContent)">${esc(s)}</button>`).join("")+`</div>`;
}
function chipsSuggAtt(ak, idx, sugg, corrente){
  const cur=String(corrente||"").toLowerCase();
  const items=(sugg||[]).filter(s=>s.toLowerCase()!==cur).slice(0,8);
  if(!items.length) return "";
  return `<div class="chips-sugg">`+items.map(s=>`<button type="button" class="chip chip-sugg" onclick="applicaSuggAtt('${ak}',${idx},this.textContent)">${esc(s)}</button>`).join("")+`</div>`;
}
function applicaSuggSint(sk,val){ impostaTipoSintomo(sk,val); render(); }

  const emojiPasto={colazione:"🍞 Colaz.",pranzo:"🍝 Pranzo",cena:"🍲 Cena",merenda:"🍎 Merenda"};
  for(const [pk] of PASTI){ const p=v.pasti&&v.pasti[pk]; if(p&&p.ora){ const m=hhmmToMin(p.ora); if(m!=null) b.push({s:m,e:Math.min(1440,m+30),txt:emojiPasto[pk]||"🍽️",col:"#e8843c"}); } }
  const colAtt={meditazione:"#26a69a",respirazione:"#26a69a",sport:"#2e9e5b",pisolino:"#7e57c2",sauna:"#00897b",vacanza:"#00897b",intimita:"#d81b60"};
  const emoAtt=Object.fromEntries(ATTIVITA.map(([k,n])=>[k,n.split(" ")[0]]));
  for(const [ak] of ATTIVITA){
    const dett=(v.attivitaDett&&v.attivitaDett[ak])||[];
    for(const e of dett){ if(e.o){ const m=hhmmToMin(e.o); if(m!=null){ const dur=(e.d&&+e.d>0)?+e.d:30; b.push({s:m,e:Math.min(1440,m+dur),txt:(emoAtt[ak]||"🌿")+(e.n?" "+e.n:""),col:colAtt[ak]||"#2e9e5b"}); } } }

}
let giornoRiepilogo=null;
function chiudiModale(){ document.getElementById("modale").innerHTML=""; document.body.classList.remove("modale-aperta"); giornoRiepilogo=null; }
function rieRiga(et, vl){ return vl?`<div class="rie-riga"><span class="et">${et}</span><span class="vl">${vl}</span></div>`:""; }
/* Gestione swipe sul popup riepilogo: ← → cambia giorno, ↓ chiude */
function attivaSwipeModale(){
  const ov=document.querySelector(".modale-overlay");
  const md=ov&&ov.querySelector(".modale");
  if(!md) return;
  let x0=null,y0=null,st0=0,t0=0;
  md.addEventListener("touchstart",(e)=>{
    if(e.touches.length!==1){ x0=null; return; }
    x0=e.touches[0].clientX; y0=e.touches[0].clientY; st0=md.scrollTop; t0=Date.now();
  },{passive:true});
  md.addEventListener("touchend",(e)=>{
    if(x0==null) return;
    const t=e.changedTouches[0], dx=t.clientX-x0, dy=t.clientY-y0, dt=Date.now()-t0; x0=null;
    if(dt>700) return;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.4){
      const avanti=dx<0;
      if(avanti && giornoRiepilogo>=oggi()) return;   // non si va oltre oggi
      mostraRiepilogo(spostaGiorni(giornoRiepilogo, avanti?1:-1));
      return;
    }
    if(dy>80 && st0<=0 && Math.abs(dy)>Math.abs(dx)) chiudiModale();
  },{passive:true});
}
function mostraRiepilogo(iso){

    corpo+=rieRiga("Sogni", v.sogni?esc(v.sogni):"");

    corpo+=rieRiga("Peso", v.peso!=null?v.peso+" kg":(v.pesoSaltato?"Non pesato":""));

    corpo+=rieRiga("Consistenza feci", v.feciConsistenza?nomiFecCons[v.feciConsistenza]:"");

    const pasti=PASTI.filter(([pk])=>v.pasti&&v.pasti[pk]&&(v.pasti[pk].q||v.pasti[pk].ora)).map(([pk,pn])=>{
      const p=v.pasti[pk]; const q=(QUANTITA.find(x=>x[0]===p.q)||[])[1];

    });
    corpo+=rieRiga("Pasti", pasti.join("<br>"));
    if(v.sintomi&&v.sintomi.length){
      const s=v.sintomi.map(sk=>{ const int=v.sintomiIntensita&&v.sintomiIntensita[sk]; const tp=v.sintomiTipo&&v.sintomiTipo[sk]; return (nomiSint[sk]||sk)+(tp?`: ${esc(tp)}`:"")+(int?` (${int}/10)`:""); });
      corpo+=rieRiga("Disturbi", s.join("<br>"));
    }
    if(v.attivita&&v.attivita.length){
      const a=v.attivita.map(ak=>{

        if(dett.length) return dett.map(x=>`${(nomiAtt[ak]||ak).replace(/^[^ ]+ /,"")}${x.n?": "+esc(x.n):""}${x.d?` ${x.d}min`:""}${x.int?` · ${x.int}`:""}${x.o?` (${x.o})`:""}`).join("<br>");

    const adTxt=(id)=>{ const st=v.aderenza&&v.aderenza[id]; const q=v.aderenzaDett&&v.aderenzaDett[id]; return st==="preso"?` — ✅ preso${q?" ("+esc(q)+")":""}`:(st==="saltato"?" — ⛔ saltato":""); };
    const fAtt=sp.farmaci.filter(f=>iso>=f.dal&&(!f.al||iso<=f.al)).map(f=>esc(f.nome)+(f.dose?` (${esc(f.dose)})`:"")+adTxt(f.id));

    corpo+=rieRiga("Trattamenti attivi", tAtt.join("<br>"));
    const camb=sp.cambiamenti.filter(c=>c.data===iso).map(c=>esc(c.testo));
    corpo+=rieRiga("Cambi terapia", camb.join("<br>"));
    const vis=sp.visite.filter(x=>x.data===iso).map(x=>esc(x.testo));

    const notz=sp.notizie.filter(x=>x.data===iso).map(x=>(x.tipo==="buona"?"✨ ":"⛈️ ")+esc(x.testo));
    corpo+=rieRiga("Notizie", notz.join("<br>"));
    if(!corpo) corpo=`<p class="sotto">Giornata segnata senza dettagli.</p>`;

      </div>
      <div class="sotto" style="text-align:center;margin:0 0 12px">Scorri ← → per cambiare giorno · trascina ↓ per chiudere</div>
      ${corpo}
      <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
        <button class="btn btn-verde" onclick="chiudiModale();apriGiorno('${iso}')">✏️ Modifica questo giorno</button>

  document.getElementById("modale").innerHTML=html;

function puntiGiorno(iso){
  const sp=saluteProfilo();
  const v=vociProfilo()[iso];
  let p="";
  if(v&&v.sintomi&&v.sintomi.length>0) p+=`<span class="punto" style="background:var(--rosso)"></span>`;
  if(sp.visite.some(x=>x.data===iso)) p+=`<span class="punto" style="background:var(--blu)"></span>`;
  if(sp.notizie.some(x=>x.data===iso)) p+=`<span class="punto" style="background:#9b59b6"></span>`;
  if(sp.farmaci.some(f=>iso>=f.dal&&(!f.al||iso<=f.al))) p+=`<span class="punto" style="background:var(--giallo)"></span>`;
  if(sp.trattamenti.some(t=>iso>=t.dal&&(!t.al||iso<=t.al))) p+=`<span class="punto" style="background:#16a085"></span>`;
  if(sp.cambiamenti.some(c=>c.data===iso)) p+=`<span class="punto" style="background:var(--arancio)"></span>`;
  return p;
}
function eventiMese(anno,mese){
  const sp=saluteProfilo();
  const pref=anno+"-"+String(mese).padStart(2,"0");
  const righe=[];
  for(const x of sp.visite.filter(x=>x.data&&x.data.startsWith(pref)))
    righe.push([x.data, `🩺 ${esc(x.testo)}${x.invasivo?' <span class="badge" style="background:var(--rosso)">invasivo</span>':""}`]);
  for(const x of sp.notizie.filter(x=>x.data&&x.data.startsWith(pref)))
    righe.push([x.data, `${x.tipo==="buona"?"📬✨":"📬⛈️"} ${esc(x.testo)}`]);
  for(const f of sp.farmaci){
    if(f.dal&&f.dal.startsWith(pref)) righe.push([f.dal, `💊 Inizio: <b>${esc(f.nome)}</b> ${f.dose?esc(f.dose):""}`]);
    if(f.al&&f.al.startsWith(pref)) righe.push([f.al, `💊 Fine: <b>${esc(f.nome)}</b>`]);
  }
  for(const t of sp.trattamenti){
    if(t.dal&&t.dal.startsWith(pref)) righe.push([t.dal, `🧑‍⚕️ Inizio: <b>${esc(t.nome)}</b> ${t.dett?esc(t.dett):""}`]);
    if(t.al&&t.al.startsWith(pref)) righe.push([t.al, `🧑‍⚕️ Fine: <b>${esc(t.nome)}</b>`]);
  }
  for(const c of sp.cambiamenti.filter(c=>c.data&&c.data.startsWith(pref)&&c.tipo==="dose"))
    righe.push([c.data, `🔔 ${esc(c.testo)}`]);
  if(righe.length===0) return "";
  righe.sort((a,b)=>a[0]<b[0]?-1:1);
  let h=`<div class="card"><h2>📌 Eventi del mese</h2>`;
  for(const [d,t] of righe) h+=`<div class="elemento-lista" style="cursor:pointer" onclick="apriGiorno('${d}')"><b>${d.slice(8,10)}</b> — ${t}</div>`;
  h+=`</div>`;
  return h;
}

const GRAFICI=[["peso","⚖️ Peso"],["umore","😊 Umore"],["stress","😣 Stress"],["sonnoQ","😴 Sonno"],["stanchezza","🥱 Stanchezza"],["sonnolenza","💤 Sonnolenza"],["temperatura","🌡️ Temperatura"],["acqua","💧 Acqua"]];

function cartaStatistiche(nDati){
  if(nDati<5) return "";
  const voci=vociProfilo();
  const date=Object.keys(voci).filter(d=>compilato(d)).sort();
  const nomiSintomi=Object.fromEntries(SINTOMI);
  // sintomo più frequente (ultimi 90 giorni)
  const da90=spostaGiorni(oggi(),-90);
  const conta={};
  for(const d of date){ if(d<da90) continue; for(const s of (voci[d].sintomi||[])) conta[s]=(conta[s]||0)+1; }
  const top=Object.entries(conta).sort((a,b)=>b[1]-a[1])[0];
  // medie ultimi 30 giorni
  const da30=spostaGiorni(oggi(),-30);
  const media=campo=>{
    const vals=date.filter(d=>d>=da30).map(d=>voci[d][campo]).filter(x=>x!=null);
    return vals.length? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : "—";
  };
  // stagione più critica
  const stagioni={inverno:[11,0,1],primavera:[2,3,4],estate:[5,6,7],autunno:[8,9,10]};
  let peggiore=null;
  for(const [nome,mesi] of Object.entries(stagioni)){
    const giorni=date.filter(d=>mesi.includes(Number(d.slice(5,7))-1));
    if(giorni.length<7) continue;
    const rate=giorni.filter(d=>(voci[d].sintomi||[]).length>0).length/giorni.length;
    if(!peggiore||rate>peggiore.rate) peggiore={nome,rate};
  }
  return `<div class="card"><h2>📊 Le tue statistiche</h2><div class="stat-griglia">
    <div class="stat-box"><div class="numero">${nDati}</div><div class="nome-stat">giorni tracciati</div></div>
    <div class="stat-box"><div class="numero">🔥 ${calcolaStreak()}</div><div class="nome-stat">giorni di fila</div></div>
    <div class="stat-box"><div class="numero">${media("umore")}</div><div class="nome-stat">umore medio (30 gg)</div></div>
    <div class="stat-box"><div class="numero">${media("sonnoQ")}</div><div class="nome-stat">sonno medio (30 gg)</div></div>
    <div class="stat-box"><div class="numero" style="font-size:1rem">${top?(nomiSintomi[top[0]]||top[0])+" ("+top[1]+"×)":"Nessuno 🎉"}</div><div class="nome-stat">disturbo più frequente (90 gg)</div></div>
    <div class="stat-box"><div class="numero" style="font-size:1rem">${peggiore?peggiore.nome+" ("+Math.round(peggiore.rate*100)+"% gg con disturbi)":"—"}</div><div class="nome-stat">stagione più critica</div></div>
  </div></div>`;
}
function cartaPrevisione(nDati){
  if(nDati<21) return `<div class="card"><h2>🔮 Previsioni</h2><p style="margin:0">Con almeno <b>21 giorni</b> di dati l'app stimerà il tuo rischio di ammalarti nei prossimi giorni, in base a stagione, sonno, stress, freddo e stanchezza. Giorni attuali: <b>${nDati}</b>.</p></div>`;
  const voci=vociProfilo();
  const date=Object.keys(voci).filter(d=>compilato(d));
  const meseCorrente=new Date().getMonth();
  let tot=0, mal=0;
  for(const d of date){
    const m=Number(d.slice(5,7))-1;
    const diff=Math.min(Math.abs(m-meseCorrente), 12-Math.abs(m-meseCorrente));
    if(diff<=1){ tot++; if((voci[d].sintomi||[]).includes("malattia")) mal++; }
  }
  let base = tot>=10 ? mal/Math.max(tot,1) : date.filter(d=>(voci[d].sintomi||[]).includes("malattia")).length/date.length;
  let rischio=Math.max(base,0.02);
  const motivi=[];
  const ultimi=[0,1,2].map(i=>voci[spostaGiorni(oggi(),-i)]).filter(Boolean);
  if(ultimi.some(v=>(v.sintomi||[]).includes("freddo"))){ rischio*=2; motivi.push("hai preso freddo di recente"); }
  if(ultimi.filter(v=>v.sonnoQ!=null&&v.sonnoQ<=2).length>=2){ rischio*=1.6; motivi.push("stai dormendo male"); }
  if(ultimi.filter(v=>v.stress!=null&&v.stress>=4).length>=2){ rischio*=1.5; motivi.push("sei molto stressato"); }
  if(ultimi.filter(v=>v.stanchezza!=null&&v.stanchezza>=4).length>=2){ rischio*=1.3; motivi.push("sei molto stanco"); }
  const conSole=ultimi.filter(v=>v.sole!=null);
  if(conSole.length>=2&&conSole.every(v=>!soleSufficiente(v))){ rischio*=1.2; motivi.push("stai prendendo poco sole"); }
  rischio=Math.min(rischio,0.9);
  let livello, colore, sfondo;
  if(rischio<0.08){ livello="BASSO"; colore="var(--verde)"; sfondo="var(--verde-chiaro)"; }
  else if(rischio<0.22){ livello="MEDIO"; colore="#8a6d00"; sfondo="#fdf3d7"; }
  else { livello="ALTO"; colore="var(--rosso)"; sfondo="var(--rosso-chiaro)"; }
  let h=`<div class="card"><h2>🔮 Previsioni</h2>
    <div class="previsione" style="background:${sfondo};color:${colore}">
      Rischio di ammalarti nei prossimi giorni: <b>${livello}</b> (~${Math.round(rischio*100)}%)
      ${motivi.length?`<div style="font-size:.9rem;margin-top:6px">Perché: ${motivi.join(", ")}.</div>`:""}
      ${livello!=="BASSO"?`<div style="font-size:.9rem;margin-top:6px">💡 Rallenta: dormi di più, copriti bene e riduci gli impegni per qualche giorno.</div>`:""}
    </div>
    <div class="avviso">Stima statistica basata sui tuoi dati passati e sulla stagione. Non è una previsione medica.</div></div>`;
  return h;
}
function cartaConsigli(){
  const voci=vociProfilo();
  const giorni=[];
  for(let i=0;i<14;i++){ const d=spostaGiorni(oggi(),-i); if(voci[d]&&compilato(d)) giorni.push(voci[d]); }
  let c=[];
  if(giorni.length<5){
    c.push("📖 Compila il diario ogni giorno: con più dati i consigli diventano personalizzati.");
  } else {
    const media=campo=>{ const v=giorni.map(g=>g[campo]).filter(x=>x!=null); return v.length? v.reduce((a,b)=>a+b,0)/v.length : null; };
    const conSole=giorni.filter(g=>g.sole!=null);
    if(conSole.length>=5 && conSole.filter(g=>!soleSufficiente(g)).length/conSole.length>0.5)
      c.push("☀️ Stai prendendo poco sole: punta ad almeno 15 minuti al giorno (30 se nuvoloso). La luce solare regola vitamina D, umore e ritmo sonno-veglia.");
    const mAcqua=media("acqua");
    if(mAcqua!=null&&mAcqua<obiettivoAcqua()*0.7)
      c.push(`💧 Bevi poca acqua rispetto al tuo obiettivo (${obiettivoAcqua()} bicchieri): prova ad avvicinarti durante la giornata. Una buona idratazione aiuta reni, digestione, pelle e concentrazione.`);
    const giorniUrinaScura=giorni.filter(g=>g.urina==="u4"||g.urina==="u5"||g.urina==="u6").length;
    if(giorniUrinaScura>=3)
      c.push("🚻 Spesso la tua urina è scura: è un segnale di disidratazione. Prova a bere di più durante la giornata, non solo ai pasti.");
    const mSonno=media("sonnoQ");
    if(mSonno!=null&&mSonno<3)
      c.push("😴 Il tuo sonno è spesso di bassa qualità. Le misure più efficaci secondo la ricerca: orari regolari (anche nel weekend), niente schermi nell'ultima ora, camera fresca e buia, niente caffeina dopo pranzo.");
    const mSed=media("sedentarieta");
    if(mSed!=null&&mSed>=3.5)
      c.push("🏃 Sei spesso sedentario: l'OMS raccomanda almeno 150 minuti di movimento a settimana. Anche una camminata di 10-15 minuti dopo i pasti migliora digestione e glicemia.");
    const mStress=media("stress");
    const medita=giorni.filter(g=>(g.attivita||[]).includes("meditazione")||(g.attivita||[]).includes("respirazione")).length;
    if(mStress!=null&&mStress>=3.5&&medita<3)
      c.push("🧘 Stress alto e poca pratica di rilassamento: 10 minuti al giorno di respirazione lenta (es. 4 secondi inspiro, 6 espiro) riducono in modo misurabile cortisolo e battito cardiaco.");
    if(giorni.filter(g=>g.pisolinoDopoPasto).length>=3)
      c.push("💤 Spesso fai il pisolino subito dopo mangiato: sdraiarsi a stomaco pieno favorisce reflusso e cattiva digestione. Aspetta 30-60 minuti.");
    if(giorni.filter(g=>g.denti!=null&&g.denti<2).length>giorni.length/2)
      c.push("🪥 Lava i denti almeno 2 volte al giorno: la salute della bocca è collegata anche a cuore e infiammazione generale.");
    const conEcc=giorni.filter(g=>Object.values(g.pasti||{}).some(p=>p&&p.ecc)).length;
    if(conEcc>giorni.length*0.35)
      c.push("🍝 Molte eccezioni alla dieta ultimamente: meglio pianificarle (es. una a settimana) che farle capitare. Il corpo tollera meglio gli strappi prevedibili.");
    const orePranzo=giorni.map(g=>g.pasti&&g.pasti.pranzo&&g.pasti.pranzo.ora).filter(Boolean).map(o=>Number(o.slice(0,2))*60+Number(o.slice(3,5)));
    if(orePranzo.length>=5&&Math.max(...orePranzo)-Math.min(...orePranzo)>120)
      c.push("🕐 Gli orari dei tuoi pasti variano molto: la ricerca sulla crononutrizione mostra che orari regolari aiutano metabolismo, digestione e sonno.");
    if(giorni.some(g=>g.feritaLenta))
      c.push("🩹 Hai segnalato ferite che cicatrizzano lentamente: parlane col medico, può indicare carenze (es. vitamina K, zinco) o rischio di infezione.");
    if(c.length===0) c.push("🌟 Le tue abitudini delle ultime 2 settimane sembrano equilibrate: continua così e tieni d'occhio l'analisi delle correlazioni.");
  }
  let h=`<div class="card"><h2>💡 Consigli per te</h2>`;
  for(const t of c.slice(0,5)) h+=`<div class="consiglio">${t}</div>`;
  h+=`<div class="avviso">Consigli generali ispirati a linee guida (OMS) e ricerca consolidata su sonno, luce solare, movimento e stress, applicati ai tuoi dati. Non sostituiscono il parere del medico.</div></div>`;
  return h;
}
function serieUltimi30(campo){
  const out=[];
  let d=spostaGiorni(oggi(),-29);
  for(let i=0;i<30;i++){
    const v=vociProfilo()[d];
    out.push({data:d, val:(v&&v[campo]!=null)?v[campo]:null});
    d=spostaGiorni(d,1);
  }
  return out;
}
function disegnaGrafico(){
  const cv=document.getElementById("grafico");
  if(!cv) return;
  const ctx=cv.getContext("2d");
  const W=cv.width, H=cv.height, pad=34;
  ctx.clearRect(0,0,W,H);
  const serie=serieUltimi30(graficoScelto);
  const valori=serie.filter(p=>p.val!=null);
  if(valori.length<2){
    ctx.fillStyle="#8a8a8a"; ctx.font="16px sans-serif"; ctx.textAlign="center";
    ctx.fillText("Non ci sono ancora abbastanza dati.", W/2, H/2);
    return;
  }
  let min=Math.min(...valori.map(p=>p.val)), max=Math.max(...valori.map(p=>p.val));
  if(graficoScelto!=="peso" && graficoScelto!=="acqua"){ min=1; max=5; }
  if(graficoScelto==="acqua"){ min=0; max=Math.max(obiettivoAcqua(), max); }
  if(min===max){ min-=1; max+=1; }
  const x=i=>pad+(W-pad-10)*(i/29);
  const y=v=>H-pad+ (pad+10-H)*((v-min)/(max-min));
  // assi
  ctx.strokeStyle="#e6e1d8"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad,10); ctx.lineTo(pad,H-pad); ctx.lineTo(W-10,H-pad); ctx.stroke();
  ctx.fillStyle="#8a8a8a"; ctx.font="12px sans-serif"; ctx.textAlign="right";
  ctx.fillText(String(Math.round(max*10)/10), pad-5, 18);
  ctx.fillText(String(Math.round(min*10)/10), pad-5, H-pad);
  // linea
  ctx.strokeStyle="#2e7d6b"; ctx.lineWidth=3; ctx.beginPath();
  let iniziato=false;
  serie.forEach((p,i)=>{
    if(p.val==null) return;
    if(!iniziato){ ctx.moveTo(x(i),y(p.val)); iniziato=true; }
    else ctx.lineTo(x(i),y(p.val));
  });
  ctx.stroke();
  // punti
  ctx.fillStyle="#2e7d6b";
  serie.forEach((p,i)=>{
    if(p.val==null) return;
    ctx.beginPath(); ctx.arc(x(i),y(p.val),4,0,7); ctx.fill();
  });
}

function fattoriDinamici(){
  const sp=saluteProfilo();
  const out=[];
  for(const f of sp.farmaci){
    out.push(["farm_"+f.id, `il farmaco "${esc(f.nome)}"`, (v,d)=>d>=f.dal&&(!f.al||d<=f.al)]);
  }
  for(const t of sp.trattamenti){
    out.push(["tratt_"+t.id, `il trattamento "${esc(t.nome)}"`, (v,d)=>d>=t.dal&&(!t.al||d<=t.al)]);
  }
  if(sp.visite.length>0){
    out.push(["visita", "una visita o esame", (v,d)=>sp.visite.some(x=>x.data===d)]);
    if(sp.visite.some(x=>x.invasivo))
      out.push(["visitaInv", "un esame invasivo", (v,d)=>sp.visite.some(x=>x.data===d&&x.invasivo)]);
  }
  if(sp.notizie.some(x=>x.tipo==="buona"))
    out.push(["notiziaB", "una bella notizia ricevuta", (v,d)=>sp.notizie.some(x=>x.data===d&&x.tipo==="buona")]);
  if(sp.notizie.some(x=>x.tipo!=="buona"))
    out.push(["notiziaC", "una brutta notizia ricevuta", (v,d)=>sp.notizie.some(x=>x.data===d&&x.tipo!=="buona")]);

}

/* ===== Esami del sangue: andamento + correlazione leggera ===== */
function finestraMedia(iso, campo, raggio){
  const voci=vociProfilo(); let s=0,n=0;
  for(let i=-raggio;i<=raggio;i++){ const d=spostaGiorni(iso,i); const v=voci[d]; if(v&&v[campo]!=null){ s+=v[campo]; n++; } }
  return n? s/n : null;
}
function finestraSintomi(iso, raggio){
  const voci=vociProfilo(); let s=0,n=0;
  for(let i=-raggio;i<=raggio;i++){ const d=spostaGiorni(iso,i); const v=voci[d]; if(v&&compilato(d)){ s+=((v.sintomi||[]).length>0?1:0); n++; } }
  return n? s/n : null;
}
function pearson(xs, ys){
  const n=xs.length; if(n<3) return null;
  const mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
  let sxy=0,sxx=0,syy=0;
  for(let i=0;i<n;i++){ const dx=xs[i]-mx, dy=ys[i]-my; sxy+=dx*dy; sxx+=dx*dx; syy+=dy*dy; }
  if(sxx===0||syy===0) return null;
  return sxy/Math.sqrt(sxx*syy);
}
function cartaSangue(){
  const sp=saluteProfilo();
  if(!sp.sangue||sp.sangue.length===0) return "";
  const perNome={};
  for(const e of sp.sangue) (perNome[e.nome]=perNome[e.nome]||[]).push(e);
  let h=`<div class="card"><h2>🩸 Esami del sangue</h2>`;
  for(const nome of Object.keys(perNome).sort()){
    const arr=perNome[nome].slice().sort((a,b)=>a.data<b.data?-1:1);
    const primo=arr[0], ultimo=arr[arr.length-1];
    let trend="stabile", cls="trend-stab", freccia="→";
    if(arr.length>=2){
      const d=ultimo.valore-primo.valore, soglia=Math.abs(primo.valore)*0.05;
      if(d>soglia){ trend="in aumento"; cls="trend-su"; freccia="↑"; }
      else if(d<-soglia){ trend="in calo"; cls="trend-giu"; freccia="↓"; }
    }
    const fuori=(ultimo.rifBasso!=null&&ultimo.valore<ultimo.rifBasso)||(ultimo.rifAlto!=null&&ultimo.valore>ultimo.rifAlto);
    h+=`<div class="elemento-lista"><div class="titolo"><span>🩸 ${esc(nome)}</span>
      <span class="${cls}">${freccia} ${arr.length>=2?trend:"1 misura"}</span></div>
      <div class="sotto">Ultimo: <b class="${fuori?'trend-su':''}">${esc(String(ultimo.valore))}${ultimo.unita?" "+esc(ultimo.unita):""}</b> il ${ultimo.data}${arr.length>=2?` · prima: ${esc(String(primo.valore))} il ${primo.data}`:""}${fuori?" · ⚠️ fuori dai riferimenti":""}</div>`;
    if(arr.length>=4){
      const xs=[], yU=[], yS=[];
      for(const e of arr){ const u=finestraMedia(e.data,"umore",3), st=finestraSintomi(e.data,3);
        if(u!=null){ xs.push(e.valore); yU.push(u); yS.push(st==null?0:st); } }
      if(xs.length>=4){
        const rU=pearson(xs,yU);
        if(rU!=null&&Math.abs(rU)>=0.5)
          h+=`<div class="sotto">📈 Quando <b>${esc(nome)}</b> era più ${rU<0?"alto":"basso"}, nei giorni attorno l'umore tendeva a essere più basso. Indizio da verificare.</div>`;
        const rS=pearson(xs,yS);
        if(rS!=null&&Math.abs(rS)>=0.5)
          h+=`<div class="sotto">📈 Valori più ${rS>0?"alti":"bassi"} di <b>${esc(nome)}</b> si accompagnano a più disturbi nei giorni vicini. Indizio da verificare.</div>`;
      }
    }
    h+=`</div>`;
  }
  h+=`<div class="avviso" style="color:var(--grigio)">Con poche misurazioni questi collegamenti sono solo indizi, non prove: servono più esami distribuiti nel tempo.</div></div>`;
  return h;
}
function trovaCorrelazioni(){
  const voci=vociProfilo();
  const date=Object.keys(voci).filter(d=>compilato(d)).sort();
  if(date.length<14) return [];
  const risultati=[];
  for(const [fk,fNome,fTest,eBenefico] of FATTORI.concat(fattoriDinamici())){
    for(const [ek,eNome,eTest] of ESITI){
      if(fk==="cattivoSonno"&&ek==="cattivoSonnoEsito") continue;
      if(fk==="stressAlto"&&ek==="stressAltoEsito") continue;
      for(const lag of [0,1]){
        let conF=0,conFE=0,senzaF=0,senzaFE=0;
        for(const d of date){
          const dEsito=spostaGiorni(d,lag);
          const vE=voci[dEsito];
          if(!vE||!compilato(dEsito)) continue;
          const f=!!fTest(voci[d], d), e=eTest(vE);
          if(f){conF++; if(e)conFE++;} else {senzaF++; if(e)senzaFE++;}
        }
        if(conF<5||senzaF<5) continue;
        const p1=conFE/conF, p0=senzaFE/senzaF;
        const diff=p1-p0;
        if(Math.abs(diff)<0.2) continue;
        const quando=lag===1?"Il giorno dopo":"Nei giorni con";
        const pct=x=>Math.round(x*100)+"%";
        let testo, positiva;
        if(diff>0){
          positiva=false;
          testo=`⚠️ <b>${quando} ${fNome}</b> hai avuto <b>${eNome}</b> molto più spesso: ${pct(p1)} delle volte, contro ${pct(p0)} negli altri giorni.`;
          if(eBenefico) continue; // attività benefica che "causa" sintomi: probabile rumore, salta
        } else {
          positiva=true;
          testo=`✅ <b>${quando} ${fNome}</b> hai avuto meno ${eNome}: ${pct(p1)} delle volte, contro ${pct(p0)} negli altri giorni.`;
        }
        risultati.push({testo, positiva, forza:Math.abs(diff),
          dettaglio:`Basato su ${conF} giorni con e ${senzaF} senza. ${lag===1?"(effetto del giorno dopo)":""}`});
      }
    }
  }
  risultati.sort((a,b)=>b.forza-a.forza);
  return risultati.slice(0,10);
}

  // IPOTESI
  h+=`<div class="card"><h2>🔬 Le tue ipotesi</h2>
    <div class="sotto" style="margin-top:0;margin-bottom:10px">Es. "Il latte mi gonfia", "Dormo male quando ceno tardi". Raccogli indizi a favore o contro, poi conferma o smentisci.</div>`;
  for(const i of [...sp.ipotesi].sort((a,b)=>(a.stato==="aperta"?0:1)-(b.stato==="aperta"?0:1))){
    const colori={aperta:"var(--giallo)",confermata:"var(--verde)",smentita:"var(--rosso)"};
    const tot=i.pro+i.contro;

function valore(id){ const e=document.getElementById(id); return e?e.value.trim():""; }
function aggiungiFarmaco(){
  const nome=valore("fm-nome"); if(!nome){ alert("Scrivi il nome del farmaco."); return; }
  const dose=valore("fm-dose"); const dal=valore("fm-dal")||oggi();
  const fid="f"+Date.now();
  saluteProfilo().farmaci.push({id:fid, nome, dose, dal, al:valore("fm-al")||null, agg:Date.now()});
  registraCambiamento(dal, `Inizio ${nome}${dose?` (${dose})`:""}`, "inizio", fid);
  salva(); render();
}
function terminaFarmaco(id){
  const f=saluteProfilo().farmaci.find(x=>x.id===id); if(!f) return;
  f.al=oggi(); f.agg=Date.now();
  registraCambiamento(oggi(), `Stop ${f.nome}`, "stop", id);
  salva(); render();
}
function modificaFarmaco(id){
  const f=saluteProfilo().farmaci.find(x=>x.id===id); if(!f) return;
  const nome=prompt("Nome del farmaco:", f.nome); if(nome===null) return;
  const dose=prompt("Dose (es. 300mg, 1/giorno):", f.dose||""); if(dose===null) return;
  const dal=prompt("Data inizio (AAAA-MM-GG):", f.dal||oggi()); if(dal===null) return;
  const al=prompt("Data fine (vuoto = in corso):", f.al||""); if(al===null) return;
  const oldDose=(f.dose||"").trim(), newDose=(dose||"").trim();
  if(newDose!==oldDose) registraCambiamento(oggi(), `Cambio dose ${nome.trim()||f.nome}: ${oldDose||"—"} → ${newDose||"—"}`, "dose", id);
  f.nome=nome.trim()||f.nome; f.dose=newDose; f.dal=dal.trim()||f.dal; f.al=al.trim()||null; f.agg=Date.now();
  salva(); render();
}
function copiaFarmaco(id){
  const f=saluteProfilo().farmaci.find(x=>x.id===id); if(!f) return;
  const nid="f"+Date.now();
  saluteProfilo().farmaci.push({id:nid, nome:f.nome, dose:f.dose, dal:oggi(), al:null, agg:Date.now()});

  mostraToast("Farmaco copiato ✓");

}

function aggiungiSangue(){
  const nome=valore("sg-nome"); if(!nome){ alert("Scrivi il nome dell'esame."); return; }
  const val=parseFloat(String(valore("sg-val")).replace(",","."));
  if(isNaN(val)){ alert("Inserisci un valore numerico."); return; }
  const min=parseFloat(String(valore("sg-min")).replace(",",".")), max=parseFloat(String(valore("sg-max")).replace(",","."));
  saluteProfilo().sangue.push({id:"s"+Date.now(), data:valore("sg-data")||oggi(), nome, valore:val,
    unita:valore("sg-unita"), rifBasso:isNaN(min)?null:min, rifAlto:isNaN(max)?null:max, agg:Date.now()});
  mostraToast("Valore aggiunto ✓");
  salva(); render();
}
function aggiungiIpotesi(){
  const testo=valore("ip-testo"); if(!testo){ alert("Scrivi l'ipotesi."); return; }

  salva(); render();
}
function assicuraIndizi(i){
  if(!i.indiziPro) i.indiziPro = Array.from({length:i.pro||0},()=>({testo:"",data:i.creata||oggi()}));
  if(!i.indiziContro) i.indiziContro = Array.from({length:i.contro||0},()=>({testo:"",data:i.creata||oggi()}));
}
function listaIndizi(i){
  assicuraIndizi(i);
  if(i.indiziPro.length===0 && i.indiziContro.length===0) return "";
  const riga=(e,tipo,idx)=>`<div class="rie-riga" style="padding:4px 0">
    <span class="vl" style="font-weight:400;text-align:left">${tipo==="pro"?"👍":"👎"} ${e.testo?esc(e.testo):'<i style="opacity:.6">senza nota</i>'} ${e.data?`<span class="sotto" style="display:inline">(${e.data.slice(8,10)}/${e.data.slice(5,7)})</span>`:""}</span>
    <button class="btn btn-piccolo" onclick="eliminaIndizio('${i.id}','${tipo}',${idx})">🗑️</button></div>`;
  let h="";
  i.indiziPro.forEach((e,idx)=>{ h+=riga(e,"pro",idx); });
  i.indiziContro.forEach((e,idx)=>{ h+=riga(e,"contro",idx); });
  return `<div style="margin-top:8px">${h}</div>`;
}
function votaIpotesi(id, delta){
  const i=saluteProfilo().ipotesi.find(x=>x.id===id); if(!i) return;
  assicuraIndizi(i);
  const nota=prompt(delta>0?"Quale indizio a FAVORE? (facoltativo)":"Quale indizio CONTRO? (facoltativo)","");
  if(nota===null) return;
  const el={testo:String(nota).trim(), data:oggi()};
  if(delta>0){ i.indiziPro.push(el); i.pro=i.indiziPro.length; }
  else { i.indiziContro.push(el); i.contro=i.indiziContro.length; }
  i.agg=Date.now(); salva(); render();
}
function eliminaIndizio(id, tipo, idx){
  const i=saluteProfilo().ipotesi.find(x=>x.id===id); if(!i) return;
  assicuraIndizi(i);
  const arr = tipo==="pro"?i.indiziPro:i.indiziContro;
  arr.splice(idx,1);
  i.pro=i.indiziPro.length; i.contro=i.indiziContro.length;
  i.agg=Date.now(); salva(); render();
}
function statoIpotesi(id, stato){
  const i=saluteProfilo().ipotesi.find(x=>x.id===id); if(!i) return;
  i.stato=stato; i.agg=Date.now(); salva(); render();
}
function eliminaElemento(lista, id){
  if(!confirm("Eliminare questo elemento?")) return;
  const sp=saluteProfilo();
  const elem=(sp[lista]||[]).find(x=>x.id===id);
  sp[lista]=sp[lista].filter(x=>x.id!==id);
  // Rimuovi anche i "cambiamenti nella terapia" collegati (evita promemoria fantasma)
  if((lista==="farmaci"||lista==="trattamenti") && Array.isArray(sp.cambiamenti)){
    const nome=elem&&elem.nome?elem.nome:null;
    sp.cambiamenti=sp.cambiamenti.filter(c=>{
      if(c.rif===id) return false;                                   // collegamento diretto
      if(nome && !c.rif && c.testo && c.testo.includes(nome)) return false;  // compat: vecchi record senza rif
      return true;
    });
  }
  salva(); render();
}

    <p><b>Segnali che stai bevendo poco:</b> urina scura e concentrata, bocca secca, sete intensa, stanchezza, mal di testa, pelle "che resta sollevata" se pizzicata. L'urina chiara è un buon segno.</p>

    <p class="sotto">Nota: in alcune condizioni (per es. problemi di cuore o reni) il medico può indicare un limite ai liquidi. In quel caso segui la sua indicazione.</p>
  </div>

  <button class="dettagli-btn" style="margin-top:8px" onclick="togglaSezione('aiuto-abitudini')">🌙 Sonno, movimento e piccole abitudini ▾</button>
  <div id="aiuto-abitudini" class="nascosto" style="font-size:.96rem; line-height:1.5">
    <p style="margin-top:8px"><b>Sonno:</b> per un adulto di solito servono 7-9 ore. Aiutano orari regolari, poca luce e schermi prima di dormire, e limitare caffè dal pomeriggio.</p>
    <p><b>Movimento:</b> anche una camminata di 20-30 minuti al giorno migliora umore, sonno e salute generale.</p>
    <p><b>Pasti:</b> orari regolari e porzioni non enormi aiutano digestione ed energia; annota nell'app cosa ti fa sentire pesante o gonfio, così l'app può notarlo.</p>
    <p><b>Conservazione dei farmaci:</b> tienili all'asciutto, lontano da luce e calore (non in bagno o in auto), fuori dalla portata dei bambini; controlla la <b>scadenza</b> e come conservare quelli che vanno in frigo.</p>
    <p><b>Compila con costanza:</b> il valore dell'app cresce con la regolarità. Basta poco ogni giorno: è dalla continuità che emergono le relazioni tra ciò che fai e come stai.</p>
  </div>

  <p class="avviso" style="margin-top:12px">Queste informazioni sono generali e non sostituiscono il parere di medico o farmacista. In caso di dubbi sui tuoi farmaci o sintomi, chiedi sempre a un professionista.</p>
  </div>`;
}

function aggiungiProfilo(){
  const nome=prompt("Nome della persona:");
  if(!nome) return;
  const id="p"+Date.now();
  S.profili.push({id, nome:nome.trim()});
  S.profiloCorrente=id;
  salva(); render();
}
function rinominaProfilo(id){
  const p=S.profili.find(p=>p.id===id);
  const nome=prompt("Nuovo nome:", p.nome);
  if(!nome) return;
  p.nome=nome.trim(); salva(); render();
}
function eliminaProfilo(id){
  const p=S.profili.find(p=>p.id===id);
  if(!confirm(`Eliminare "${p.nome}" e tutti i suoi dati? Non si può annullare.`)) return;
  S.profili=S.profili.filter(x=>x.id!==id);
  delete S.voci[id];
  if(S.profiloCorrente===id) S.profiloCorrente=S.profili[0].id;
  salva(); render();
}
function esporta(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="find-your-good-backup-"+oggi()+".json";
  a.click();
  mostraToast("Backup scaricato ✓");
}
function importa(input){
  const f=input.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const dati=JSON.parse(r.result);
      if(!dati.profili||!dati.voci) throw new Error();
      if(!confirm("Sostituire i dati attuali con quelli del backup?")) return;
      S=dati; salva(); render();
      mostraToast("Backup caricato ✓");
    }catch(e){ alert("File non valido. Usa un backup creato da questa app."); }
  };
  r.readAsText(f);
}
function cancellaTutto(){
  if(!confirm("Cancellare DAVVERO tutti i tuoi dati?")) return;
  if(!confirm("Ultima conferma: i dati andranno persi per sempre (a meno che tu non abbia un backup).")) return;
  localStorage.removeItem(CHIAVE);
  S=carica(); render();
}
function impostaConvalescenza(val){
  const n=parseInt(val,10);
  S.impostazioni.giorniConvalescenza=isNaN(n)?3:Math.max(0,Math.min(14,n));
  salva();
}
function impostaConvAuto(on){ S.impostazioni.convalescenzaAuto=!!on; salva(); render(); }
function impostaSonnoDefault(campo, val){ if(!val) return; S.impostazioni[campo+"Default"]=val; salva(); }
function impostaTraccia(k, on){
  if(!S.impostazioni.traccia) S.impostazioni.traccia={};
  S.impostazioni.traccia[k]=!!on;
  salva();
}
function nomeProfiloCorrente(){
  if(utente&&utente.email) return utente.email;
  const p=S.profili.find(p=>p.id===S.profiloCorrente);
  return p?p.nome:"—";
}
