<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2e7d6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<title>Find Your Good</title><!-- v4 -->
<style>
:root{
  --verde:#2e7d6b; --verde-chiaro:#e3f2ee; --crema:#faf7f2; --testo:#2b2b2b;
  --grigio:#8a8a8a; --rosso:#c65b4e; --rosso-chiaro:#fdeae7; --giallo:#f2b950;
  --card:#ffffff; --bordo:#e6e1d8; --blu:#4a7fa5; --input:#ffffff; --ombra:rgba(0,0,0,.05);
  --info:#edf3f8; --arancio:#e67e22; --switch-off:#cccccc;
  color-scheme:light;
}
/* Tema scuro: applicato automaticamente col sistema (se non forzato "chiaro"), o forzato "scuro" */
@media (prefers-color-scheme: dark){
  :root:not([data-tema="chiaro"]){
    --verde:#5ec4ae; --verde-chiaro:#1f463e; --crema:#141619; --testo:#eceae4;
    --grigio:#a6a6a6; --rosso:#ef8175; --rosso-chiaro:#432723; --giallo:#e6b04a;
    --card:#1e2124; --bordo:#3a3f44; --blu:#7fb0d1; --input:#282c30; --ombra:rgba(0,0,0,.45);
    --info:#18303b; --arancio:#f0955f; --switch-off:#5a5f64;
    color-scheme:dark;
  }
}
:root[data-tema="scuro"]{
  --verde:#5ec4ae; --verde-chiaro:#1f463e; --crema:#141619; --testo:#eceae4;
  --grigio:#a6a6a6; --rosso:#ef8175; --rosso-chiaro:#432723; --giallo:#e6b04a;
  --card:#1e2124; --bordo:#3a3f44; --blu:#7fb0d1; --input:#282c30; --ombra:rgba(0,0,0,.45);
  --info:#18303b; --arancio:#f0955f; --switch-off:#5a5f64;
  color-scheme:dark;
}
:root[data-tema="chiaro"]{ color-scheme:light; }
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--crema); color:var(--testo);
  font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif; font-size:18px;}
body{padding-bottom:90px;}
h1{font-size:1.35rem; margin:0;}
h2{font-size:1.15rem; margin:0 0 10px 0; color:var(--verde);}
.header{background:var(--verde); color:#fff; padding:14px 16px; display:flex;
  align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20;}
.header select{font-size:1rem; border-radius:10px; border:none; padding:8px 10px; background:#fff; color:var(--testo); max-width:45%;}
.contenuto{max-width:640px; margin:0 auto; padding:14px;}
.card{background:var(--card); border:1px solid var(--bordo); border-radius:16px;
  padding:16px; margin-bottom:14px; box-shadow:0 1px 3px var(--ombra);}
.riga-data{display:flex; align-items:center; justify-content:space-between; margin:4px 0 14px 0;}
.riga-data .titolo-data{font-weight:700; font-size:1.1rem; text-align:center; flex:1;}
.btn{display:inline-block; border:2px solid var(--bordo); background:var(--input); color:var(--testo);
  border-radius:14px; padding:12px 16px; font-size:1rem; cursor:pointer; min-height:48px;}
.btn:active{transform:scale(.97);}
.btn-verde{background:var(--verde); border-color:var(--verde); color:#fff; font-weight:600;}
.btn-freccia{width:48px; font-size:1.2rem; font-weight:700;}
.btn-piccolo{padding:8px 12px; min-height:40px; font-size:.95rem;}
.scala{display:flex; gap:8px; justify-content:space-between;}
.scala button{flex:1; font-size:1.7rem; padding:10px 0; min-height:56px; border:2px solid var(--bordo);
  border-radius:14px; background:var(--input); color:var(--testo); cursor:pointer;}
.scala button.attivo{border-color:var(--verde); background:var(--verde-chiaro);}
.scala-num button{font-size:1.15rem; font-weight:700;}
.etichette{display:flex; justify-content:space-between; font-size:.8rem; color:var(--grigio); margin-top:4px;}
.chips{display:flex; flex-wrap:wrap; gap:8px;}
.chip{border:2px solid var(--bordo); background:var(--input); color:var(--testo); border-radius:999px; padding:10px 16px;
  font-size:1rem; cursor:pointer; min-height:44px;}
.chip.attivo{border-color:var(--rosso); background:var(--rosso-chiaro); font-weight:600;}
.chip.attivo-verde{border-color:var(--verde); background:var(--verde-chiaro); font-weight:600;}
.chips-sugg{display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 8px;}
.chip-sugg{padding:6px 12px; min-height:36px; font-size:.9rem; border-style:dashed; opacity:.9;}
.sotto{font-size:.9rem; color:var(--grigio); margin-top:6px;}
.peso-box{display:flex; align-items:center; gap:10px; justify-content:center;}
.peso-box input{width:120px; font-size:1.6rem; text-align:center; padding:10px; border:2px solid var(--bordo); border-radius:14px; background:var(--input); color:var(--testo);}
.peso-box .btn{font-size:1.4rem; width:56px;}
.pasto{border-top:1px solid var(--bordo); padding:12px 0;}
.pasto:first-of-type{border-top:none;}
.pasto .nome{font-weight:700; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;}
.pasto .nome input[type=time]{font-size:1rem; padding:6px; border:2px solid var(--bordo); border-radius:10px;}
.dettagli-btn{width:100%; text-align:left; background:none; border:none; font-size:1rem;
  color:var(--blu); padding:6px 0; cursor:pointer; font-weight:600;}
.nascosto{display:none;}
.nascosto.ric-mostra{display:block !important;}
.card.collassabile > h2{cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:8px; -webkit-user-select:none; user-select:none;}
.card.collassabile > h2::after{content:"▾"; font-size:.7em; color:var(--grigio); transition:transform .2s; flex:0 0 auto;}
.card.collassabile.collassato > h2::after{transform:rotate(-90deg);}
.card.collassabile.collassato > *:not(h2){display:none !important;}
.chiudi-sezione{margin-top:12px; width:100%; padding:9px; border:1px solid var(--bordo); border-radius:12px; background:var(--input); color:var(--grigio); font-family:inherit; font-size:.85rem; cursor:pointer;}
.chiudi-sezione:hover{border-color:var(--verde); color:var(--verde);}
.chip.chip-attivo{background:var(--verde); color:#fff; border-color:var(--verde);}
.barra-ricerca{display:flex; align-items:center; gap:8px; background:var(--card); border:2px solid var(--bordo); border-radius:14px; padding:8px 12px; margin-bottom:12px; position:sticky; top:8px; z-index:20; box-shadow:0 2px 8px var(--ombra);}
.barra-ricerca .lente{flex:0 0 auto; opacity:.7;}
.barra-ricerca input{flex:1; border:none; background:transparent; color:var(--testo); font-family:inherit; font-size:1rem; outline:none;}
.barra-ricerca .pulisci-ric{flex:0 0 auto; border:none; background:var(--input); color:var(--testo); border-radius:999px; width:26px; height:26px; cursor:pointer; font-size:.8rem;}
.toggle-riga{display:flex; align-items:center; justify-content:space-between; padding:10px 0;}
.interruttore{position:relative; width:58px; height:32px; flex-shrink:0;}
.interruttore input{opacity:0; width:0; height:0;}
.slider{position:absolute; inset:0; background:var(--switch-off); border-radius:999px; transition:.2s; cursor:pointer;}
.slider:before{content:""; position:absolute; height:26px; width:26px; left:3px; top:3px;
  background:#fff; border-radius:50%; transition:.2s;}
input:checked + .slider{background:var(--verde);}
input:checked + .slider:before{transform:translateX(26px);}
textarea{width:100%; border:2px solid var(--bordo); border-radius:14px; padding:12px; font-size:1rem; font-family:inherit; min-height:70px; background:var(--input); color:var(--testo);}
input[type=time]{font-family:inherit;}
input[type=number],input[type=time],input[type=date],input[type=email],input[type=password],input[type=text]{background:var(--input); color:var(--testo);}
select{background:var(--input); color:var(--testo);}
.nav{position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--bordo);
  display:flex; z-index:30; padding-bottom:env(safe-area-inset-bottom);}
.nav button{flex:1; background:none; border:none; padding:10px 4px 8px 4px; font-size:.8rem;
  color:var(--grigio); cursor:pointer;}
.nav button .icona{display:block; font-size:1.5rem; margin-bottom:2px;}
.nav button.attivo{color:var(--verde); font-weight:700;}
.banner{background:var(--giallo); color:#5a4300; border-radius:14px; padding:14px; margin-bottom:14px;
  font-size:1rem; cursor:pointer; font-weight:600;}
.banner-verde{background:var(--verde-chiaro); color:var(--verde); cursor:default;}
.toast{position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--verde);
  color:#fff; padding:10px 22px; border-radius:999px; font-weight:600; z-index:50; opacity:0; transition:opacity .3s; pointer-events:none;}
.toast.visibile{opacity:1;}
.calendario{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.calendario .intestazione{text-align:center; font-size:.8rem; color:var(--grigio); font-weight:700;}
.giorno{aspect-ratio:1; border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:1rem; border:2px solid transparent; cursor:pointer; background:var(--input); color:var(--grigio);}
.giorno.compilato{background:var(--verde-chiaro); color:var(--verde); font-weight:700;}
.giorno.mancante{background:var(--rosso-chiaro); color:var(--rosso); font-weight:700;}
.giorno.futuro{opacity:.35; cursor:default;}
.giorno.oggi{border-color:var(--verde);}
.legenda{display:flex; gap:16px; margin-top:12px; font-size:.85rem; color:var(--grigio); flex-wrap:wrap;}
.pallino{display:inline-block; width:14px; height:14px; border-radius:50%; vertical-align:-2px; margin-right:4px;}
.mese-nav{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
.mese-nav .nome-mese{font-weight:700; font-size:1.1rem;}
canvas{width:100%; height:220px;}
.selettore-grafico{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
.correlazione{border-left:5px solid var(--rosso); background:var(--rosso-chiaro); border-radius:0 12px 12px 0;
  padding:12px; margin-bottom:10px; font-size:1rem;}
.correlazione.positiva{border-left-color:var(--verde); background:var(--verde-chiaro);}
.correlazione .forza{font-size:.85rem; color:var(--grigio); margin-top:4px;}
.avviso{font-size:.85rem; color:var(--grigio); font-style:italic; margin-top:14px;}
.riga-profilo{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--bordo);}
.streak{background:rgba(255,255,255,.2); border-radius:999px; padding:6px 12px; font-size:.9rem; font-weight:700;}
.sezione-scala{margin-bottom:18px;}
.sezione-scala .nome-scala{font-weight:700; margin-bottom:8px;}
.tre-bottoni{display:flex; gap:8px;}
.tre-bottoni .chip{flex:1; text-align:center;}
.form-riga{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;}
.form-riga input[type=text],.form-riga input[type=number],.form-riga input[type=date],
.form-riga input[type=email],.form-riga input[type=password],.form-riga select{
  flex:1; min-width:130px; padding:10px; font-size:1rem; border:2px solid var(--bordo); border-radius:12px; font-family:inherit; background:var(--input); color:var(--testo);}
.elemento-lista{border:1px solid var(--bordo); border-radius:12px; padding:10px 12px; margin-bottom:8px; background:var(--card);}
.elemento-lista .titolo{font-weight:700; display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;}
.badge{display:inline-block; border-radius:999px; padding:3px 10px; font-size:.75rem; font-weight:700; color:#fff;}
.giorno{position:relative;}
.punti-giorno{display:flex; gap:3px; justify-content:center; position:absolute; bottom:4px; left:0; right:0;}
.punto{width:6px; height:6px; border-radius:50%; display:inline-block;}
.previsione{border-radius:14px; padding:14px; margin-bottom:10px; font-size:1rem;}
.consiglio{border-left:5px solid var(--blu); background:var(--info); border-radius:0 12px 12px 0; padding:12px; margin-bottom:10px; font-size:.98rem;}
.stat-griglia{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.stat-box{background:var(--verde-chiaro); border-radius:12px; padding:12px; text-align:center;}
.stat-box .numero{font-size:1.35rem; font-weight:800; color:var(--verde);}
.stat-box .nome-stat{font-size:.82rem; color:var(--grigio); margin-top:2px;}
.stato-sync{font-size:.9rem; margin-top:8px; color:var(--grigio);}
.pastiglia-colore{display:inline-block; width:20px; height:20px; border-radius:50%; border:1px solid rgba(128,128,128,.4); vertical-align:-4px; margin-right:6px;}
.contatore-acqua{display:flex; align-items:center; justify-content:center; gap:14px;}
.contatore-acqua .valore{font-size:2rem; font-weight:800; min-width:120px; text-align:center; color:var(--blu);}
.contatore-acqua .btn{font-size:1.5rem; width:56px;}
.barra-acqua{background:var(--bordo); border-radius:999px; height:12px; overflow:hidden; margin:10px 0 4px;}
.barra-acqua > div{background:var(--blu); height:100%; transition:width .2s;}
.tipo-attivita{margin-top:10px;}
.tipo-attivita input{width:100%; padding:10px; font-size:1rem; border:2px solid var(--bordo); border-radius:12px; font-family:inherit; background:var(--input); color:var(--testo);}
pre.sql{background:var(--input); border-radius:12px; padding:12px; font-size:.75rem; overflow-x:auto; white-space:pre-wrap;}
/* Selettori orario/data uniformi (anche in tema scuro) */
input[type=time],input[type=date]{border:2px solid var(--bordo); border-radius:12px; padding:8px 10px; font-size:1rem; font-family:inherit; background:var(--input); color:var(--testo); min-height:44px;}
/* Input numerici uniformi (obiettivo acqua, convalescenza) */
.campo-num{border:2px solid var(--bordo); border-radius:12px; padding:8px 10px; font-size:1rem; font-family:inherit; background:var(--input); color:var(--testo); min-height:44px; text-align:center;}
/* Pulsanti intensità attività */
.chips-int{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
.chips-int .chip{flex:1; min-width:70px; text-align:center; padding:8px 6px;}
/* Slider intensità disturbi */
.riga-intensita{display:flex; align-items:center; gap:10px; margin:8px 0;}
.riga-intensita .etichetta-int{flex:1; font-size:.95rem;}
.riga-intensita input[type=range]{flex:1.4; accent-color:var(--rosso); height:26px;}
.riga-intensita .val-int{min-width:44px; text-align:right; font-weight:800; color:var(--rosso);}
/* Modale riepilogo giorno */
.modale-overlay{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:60; display:flex; align-items:flex-end; justify-content:center;}
.modale{background:var(--card); width:100%; max-width:640px; max-height:86vh; overflow:auto; border-radius:22px 22px 0 0; padding:18px; box-shadow:0 -4px 20px rgba(0,0,0,.3);}
.modale .maniglia{width:44px; height:5px; border-radius:999px; background:var(--bordo); margin:0 auto 12px;}
.modale h2{margin-bottom:12px;}
.rie-riga{display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px solid var(--bordo); font-size:1rem;}
.rie-riga .et{color:var(--grigio);}
.rie-riga .vl{font-weight:600; text-align:right;}
.durata-input{width:80px; text-align:center;}
.voce-attivita{border:1px solid var(--bordo); border-radius:12px; padding:10px; margin-top:8px; background:var(--input);}
.voce-attivita .riga1{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.voce-attivita input[type=text]{flex:1; min-width:120px; padding:8px 10px; font-size:1rem; border:2px solid var(--bordo); border-radius:10px; background:var(--card); color:var(--testo); font-family:inherit;}
.voce-attivita input[type=number]{width:78px; padding:8px; font-size:1rem; border:2px solid var(--bordo); border-radius:10px; background:var(--card); color:var(--testo); text-align:center; font-family:inherit;}
/* Blocco scorrimento sfondo quando un popup è aperto (evita che scrolli la pagina dietro) */
body.modale-aperta{overflow:hidden;}
.sc-lista{display:flex; flex-direction:column; gap:6px; max-height:44vh; overflow:auto; -webkit-overflow-scrolling:touch;}
.sc-voce{text-align:left; padding:11px 12px; border:2px solid var(--bordo); border-radius:12px; background:var(--input); color:var(--testo); font-family:inherit; font-size:.95rem; cursor:pointer; transition:.15s;}
.sc-voce:hover{border-color:var(--verde);}
.sc-voce.sc-sel{border-color:var(--verde); background:var(--verde); color:#fff;}
.sc-voce.sc-sel .sotto{color:rgba(255,255,255,.85);}
/* Resoconto: campi data che non sforino su mobile */
.periodo-date{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
.periodo-date label{flex:1 1 130px; min-width:120px; font-size:.9rem; color:var(--grigio);}
.periodo-date label input[type=date]{width:100%; display:block; margin-top:4px;}
/* Slider orari sonno (passi 15 min) */
.slider-orario{display:flex; align-items:center; gap:10px; margin:8px 0;}
.slider-orario .et-ora{flex:0 0 90px; font-size:.95rem;}
.slider-orario input[type=range]{flex:1; accent-color:var(--verde); height:26px;}
.slider-orario .val-ora{flex:0 0 60px; text-align:right; font-weight:800; color:var(--verde);}
/* Selettore vista diario */
.diario-modi{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
.diario-modi .chip{flex:1; text-align:center; min-width:64px; padding:8px 6px;}
/* Timeline giorno/settimana (blocchi colorati fra gli orari) */
.tl-scroll{max-height:70vh; overflow-y:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--bordo); border-radius:12px;}
.tl-wrap{display:flex; min-width:100%;}
.tl-ore-col{flex:0 0 40px; position:relative;}
.tl-giorni{display:flex; flex:1; min-width:0;}
.tl-col{flex:1 1 0; min-width:64px; position:relative; border-left:1px solid var(--bordo);}
.tl-testa{position:sticky; top:0; z-index:3; background:var(--card); text-align:center; font-size:.8rem; font-weight:700; padding:6px 2px; border-bottom:1px solid var(--bordo); cursor:pointer;}
.tl-testa.oggi{color:var(--verde);}
.tl-testa small{display:block; font-weight:400; color:var(--grigio); font-size:.68rem;}
.tl-griglia{position:relative;}
.tl-riga-ora{position:absolute; left:0; right:0; border-top:1px dashed var(--bordo); height:0;}
.tl-ora-et{position:absolute; left:0; font-size:.62rem; color:var(--grigio); transform:translateY(-6px); padding-left:2px;}
.tl-blocco{position:absolute; left:3px; right:3px; border-radius:6px; font-size:.66rem; line-height:1.1; color:#fff; padding:2px 4px; overflow:hidden; box-shadow:0 1px 2px var(--ombra);}
.tl-vuoto{padding:14px; text-align:center; color:var(--grigio); font-size:.9rem;}
.tl-fascia-dist{position:sticky; top:32px; z-index:2; background:var(--rosso-chiaro); color:var(--rosso); font-size:.68rem; padding:2px 4px; border-bottom:1px solid var(--rosso);}
/* Vista anno */
.anno-griglia{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px;}
.anno-mese .nome{font-weight:700; text-align:center; color:var(--verde); font-size:.85rem; margin-bottom:5px; cursor:pointer;}
.anno-cal{display:grid; grid-template-columns:repeat(7,1fr); gap:2px;}
.anno-int{text-align:center; font-size:.5rem; color:var(--grigio);}
.anno-g{aspect-ratio:1; border-radius:3px; background:var(--input); display:flex; align-items:center; justify-content:center; font-size:.55rem; color:var(--grigio); cursor:pointer; position:relative; overflow:hidden;}
.anno-g.compilato{background:var(--verde-chiaro); color:var(--verde); font-weight:700;}
.anno-g.mancante{background:var(--rosso-chiaro); color:var(--rosso);}
.anno-g.oggi{outline:2px solid var(--verde); outline-offset:-1px;}
.anno-g .adot{position:absolute; bottom:1px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%;}
/* Esami del sangue */
.esame-riga{display:flex; justify-content:space-between; gap:8px; align-items:baseline; padding:6px 0; border-bottom:1px solid var(--bordo); font-size:.95rem; flex-wrap:wrap;}
.esame-riga .val{font-weight:700;}
.esame-riga .fuori{color:var(--rosso);}
.trend-su{color:var(--rosso);} .trend-giu{color:var(--verde);} .trend-stab{color:var(--grigio);}
</style>
</head>
<body>

<div class="header">
  <h1>🌱 Find Your Good</h1>
  <div style="display:flex; gap:10px; align-items:center;">
    <span class="streak" id="streak"></span>
  </div>
</div>

<div class="contenuto" id="app"></div>

<div class="nav">
  <button id="nav-oggi" onclick="vai('oggi')"><span class="icona">📝</span>Oggi</button>
  <button id="nav-diario" onclick="vai('diario')"><span class="icona">📅</span>Diario</button>
  <button id="nav-analisi" onclick="vai('analisi')"><span class="icona">📊</span>Analisi</button>

<script>
"use strict";
/* ============ DATI E STATO ============ */
const CHIAVE = "fyg_v1";
let chiaveDati = CHIAVE;   // casella dati attiva: diventa "per-utente" dopo il login
let S = carica();
let vista = "oggi";
let dataInModifica = oggi();
let meseDiario = oggi().slice(0,7); // "AAAA-MM"
let sezioniAperte = new Set();   // sezioni espandibili aperte (persistono tra i render)
let carteAperte = new Set();     // carte espanse in ogni vista (chiave: vista|titolo); default tutte chiuse
let queryRicerca = "";           // testo di ricerca per filtrare la vista attuale
let periodoSangue = {preset:"tutto", da:"", a:""}; // periodo di riferimento dei grafici degli esami
let saluteRitorno = null;        // giorno da cui si è aperta la scheda Salute

let promptInstall = null;        // evento per installare la PWA
let clickTimer = null;           // per distinguere click singolo/doppio sul calendario

function caricaDa(key){
  try{
    const raw = localStorage.getItem(key);
    if(raw){ const s=JSON.parse(raw); if(!s.salute) s.salute={};
      if(!s.impostazioni) s.impostazioni={}; if(s.impostazioni.tema==null) s.impostazioni.tema="auto";
      return s; }
  }catch(e){}
  const id = "p" + Date.now();
  return { profili:[{id:id, nome:"Io"}], profiloCorrente:id, voci:{}, salute:{}, impostazioni:{oraPromemoria:"20:00", tema:"auto"} };
}
function carica(){ return caricaDa(chiaveDati); }
// Passa alla casella dati del singolo utente: ogni account tiene i suoi dati
// separati su questo dispositivo, e il login fa una fusione ADDITIVA (cloud + locale di quell'utente).
function passaUtente(uid){
  chiaveDati = CHIAVE + "_u_" + uid;
  let locale = null;
  try{ const raw = localStorage.getItem(chiaveDati); locale = raw ? JSON.parse(raw) : null; }catch(e){ locale=null; }
  if(!locale){
    // Prima volta di questo utente su questo dispositivo: eredita UNA SOLA VOLTA
    // i dati "vecchi" generici del dispositivo (per non perderli), poi ogni account resta separato.
    if(!localStorage.getItem("fyg_migrato") && localStorage.getItem(CHIAVE)){
      locale = caricaDa(CHIAVE);
      localStorage.setItem("fyg_migrato","1");
    } else {
      locale = caricaDa("__nuovo__");   // default vuoto
    }
  }
  S = locale;
  if(!S.salute) S.salute={};
  if(!S.impostazioni) S.impostazioni={};
  migraMerenda();
  migraCategorieSangue();
  localStorage.setItem(chiaveDati, JSON.stringify(S));
}
/* Migrazione globale: sposta la vecchia "merenda" unica in "merenda pomeriggio" su tutti i giorni/profili */
function migraMerenda(){
  const voci=S.voci||{};
  for(const prof of Object.keys(voci)){
    const g=voci[prof]||{};
    for(const d of Object.keys(g)){
      const p=g[d]&&g[d].pasti;
      if(p&&p.merenda){ if(!p.merendaPomeriggio) p.merendaPomeriggio=p.merenda; delete p.merenda; }
    }
  }
}
function applicaTema(){
  const t=(S.impostazioni&&S.impostazioni.tema)||"auto";
  const html=document.documentElement;
  if(t==="chiaro") html.setAttribute("data-tema","chiaro");
  else if(t==="scuro") html.setAttribute("data-tema","scuro");
  else html.removeAttribute("data-tema");
  // aggiorna il colore della barra del browser
  const scuroAttivo = t==="scuro" || (t==="auto" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute("content", scuroAttivo ? "#15171a" : "#2e7d6b");
}
function impostaTema(t){ S.impostazioni.tema=t; localStorage.setItem(chiaveDati, JSON.stringify(S)); applicaTema(); render(); }
function salva(){
  localStorage.setItem(chiaveDati, JSON.stringify(S));

}
/* Normalizza il testo in forma NFC: le tastiere iOS/macOS producono accenti "decomposti"
   (es. "e" + segno accento separato) che possono comparire come simboli strani (�/riquadri).
   Applicata a TUTTI i testi inseribili per prevenire l'errore. */
function norm(t){ t=String(t==null?"":t); try{ return t.normalize("NFC"); }catch(e){ return t; } }
function esc(t){ return norm(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
let toastTimer=null;
function mostraToast(testo){
  const t=document.getElementById("toast");
  t.textContent = testo || "Salvato ✓";
  t.classList.add("visibile");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("visibile"), 1200);
}
function oggi(){ return fmtData(new Date()); }
function fmtData(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function dataBella(iso){
  const [a,m,g]=iso.split("-").map(Number);
  const d=new Date(a,m-1,g);
  const giorni=["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
  const mesi=["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
  const pre = iso===oggi() ? "Oggi, " : (iso===spostaGiorni(oggi(),-1) ? "Ieri, " : "");
  return pre + giorni[d.getDay()]+" "+g+" "+mesi[m-1];
}
function spostaGiorni(iso, n){
  const [a,m,g]=iso.split("-").map(Number);
  const d=new Date(a,m-1,g); d.setDate(d.getDate()+n);
  return fmtData(d);
}
function vociProfilo(){
  if(!S.voci[S.profiloCorrente]) S.voci[S.profiloCorrente]={};
  return S.voci[S.profiloCorrente];
}
function voce(data){
  const v=vociProfilo();
  if(!v[data]) v[data]={ pasti:{}, sintomi:[], attivita:[] };
  if(!v[data].pasti) v[data].pasti={};
  // Migrazione: la vecchia "merenda" unica diventa "merenda pomeriggio"
  if(v[data].pasti.merenda){ if(!v[data].pasti.merendaPomeriggio) v[data].pasti.merendaPomeriggio=v[data].pasti.merenda; delete v[data].pasti.merenda; }
  if(!v[data].sintomi) v[data].sintomi=[];
  if(!v[data].attivita) v[data].attivita=[];
  if(!v[data].attivitaTipo) v[data].attivitaTipo={};
  if(!v[data].attivitaDett) v[data].attivitaDett={};
  return v[data];
}
function compilato(data){
  const v=vociProfilo()[data];
  if(!v) return false;
  return v.umore!=null || v.stress!=null || v.peso!=null || v.pesoSaltato || v.sonnoQ!=null ||
    v.temperatura!=null || v.stanchezza!=null || v.sonnolenza!=null || v.sole!=null ||
    v.acqua!=null || v.urina!=null || v.feci!=null || v.feciConsistenza!=null || v.occhi!=null || v.scariche!=null ||
    v.denti!=null || v.filo!=null || v.colluttorio ||
    v.risvegli!=null || (v.sogni&&v.sogni.trim()!=="") || v.incubi || v.oraDormire || v.oraSveglia ||
    (v.sintomi&&v.sintomi.length>0) || (v.attivita&&v.attivita.length>0) ||
    Object.keys(v.pasti||{}).length>0 || (v.note&&v.note.trim()!=="");
}
/* Quali moduli tracciare (default: tutti). Configurabile dalle Impostazioni. */
function traccia(k){
  const t=S.impostazioni&&S.impostazioni.traccia;
  if(!t) return true;
  return t[k]!==false;
}
function imposta(campo, valore){
  const v=voce(dataInModifica);
  if(typeof valore==="string") valore=norm(valore);
  v[campo] = (v[campo]===valore && typeof valore==="number") ? null : valore;
  v.agg=Date.now();
  salva(); render();
}
function togglaLista(campo, chiave){
  const v=voce(dataInModifica);
  const i=v[campo].indexOf(chiave);
  if(i>=0) v[campo].splice(i,1); else v[campo].push(chiave);
  v.agg=Date.now();
  salva(); render();
}
function impostaPasto(pasto, campo, valore){
  const v=voce(dataInModifica);
  if(!v.pasti[pasto]) v.pasti[pasto]={};
  if(typeof valore==="string") valore=norm(valore);
  if((campo==="q"||campo==="macro") && v.pasti[pasto][campo]===valore) v.pasti[pasto][campo]=null;
  else v.pasti[pasto][campo]=valore;
  v.agg=Date.now();
  salva(); render();
}
function saluteProfilo(){
  if(!S.salute) S.salute={};
  if(!S.salute[S.profiloCorrente]) S.salute[S.profiloCorrente]={};
  const sp=S.salute[S.profiloCorrente];
  for(const k of ["farmaci","trattamenti","visite","notizie","ipotesi","cambiamenti","sangue","categorie"]) if(!sp[k]) sp[k]=[];
  return sp;
}
function registraCambiamento(data, testo, tipo, rif){
  saluteProfilo().cambiamenti.push({id:"c"+Date.now()+Math.floor(Math.random()*99), data, testo, tipo, rif:rif||null, agg:Date.now()});
}
function cambiamentiRecenti(rifIso, giorni){
  const sp=saluteProfilo();
  const da=spostaGiorni(rifIso, -(giorni-1));
  return sp.cambiamenti.filter(c=>c.data && c.data<=rifIso && c.data>=da).sort((a,b)=>a.data<b.data?1:-1);
}
function bannerCambiamenti(){
  const rec=cambiamentiRecenti(oggi(), 10);

    Nei prossimi giorni segna bene disturbi e come ti senti: servirà a capire se il cambiamento ti fa stare <b>meglio, peggio o uguale</b>.</div>`;
}

function giorniConvalescenza(){
  const n=S.impostazioni&&S.impostazioni.giorniConvalescenza;
  return (n==null||isNaN(n))?3:Math.max(0,Math.min(14,n));
}
function convAutomatica(){ return !(S.impostazioni&&S.impostazioni.convalescenzaAuto===false); }
/* Giorni base di attenzione per tipo di disturbo (poi scalati sull'intensità) */
function tipoBaseConval(sk){
  const m={malattia:6, ferita:6, dolori:4, malPancia:3, freddo:3, allergie:2, malTesta:2, fastidi:2};
  return m[sk]||3;
}
function giorniConvalescenzaPer(sk, intensita){
  const base=tipoBaseConval(sk);
  const f = (intensita>=1&&intensita<=10) ? (0.6 + (intensita/10)*0.8) : 1;   // ~0.68 (lieve) → 1.4 (intenso)
  return Math.max(1, Math.min(21, Math.round(base*f)));
}
function bannerConvalescenza(){
  const auto=convAutomatica();
  const Nfisso=giorniConvalescenza();
  if(!auto && Nfisso<=0) return "";
  const voci=vociProfilo();
  const vOggi=voci[dataInModifica];
  const attiviOggi=new Set((vOggi&&vOggi.sintomi)||[]);
  const nomi={}; SINTOMI.forEach(([k,n])=>nomi[k]=n);
  const maxLook = auto ? 21 : Nfisso;
  const inConvalescenza=[];
  for(const [sk] of SINTOMI){
    if(attiviOggi.has(sk)) continue;               // ancora presente: non è convalescenza
    for(let i=1;i<=maxLook;i++){
      const d=spostaGiorni(dataInModifica,-i);
      const vd=voci[d];
      if(vd&&(vd.sintomi||[]).includes(sk)){
        const intens=vd.sintomiIntensita&&vd.sintomiIntensita[sk];
        const finestra = auto ? giorniConvalescenzaPer(sk, intens) : Nfisso;
        if(i<=finestra) inConvalescenza.push([nomi[sk], i, finestra]);
        break;                                     // conta solo l'ultima comparsa
      }
    }
  }
  if(inConvalescenza.length===0) return "";
  const lista=inConvalescenza.map(([n,g,f])=>`${n} (sparito ${g} giorn${g===1?"o":"i"} fa · attenzione ~${f} gg)`).join(", ");
  return `<div class="banner" style="background:var(--verde-chiaro);color:var(--testo);border:1px solid var(--verde)">
    🩹 <b>Convalescenza</b>: ${lista}. Per qualche giorno vale la pena stare più a bacchetta e fare attenzione: un fastidio residuo o una piccola ricaduta sono normali, ma segnali che tornano vanno annotati bene.${auto?" <span class='sotto' style='display:block;margin-top:4px'>Durata stimata da tipo e intensità del disturbo.</span>":""}</div>`;
}

/* ============ NAVIGAZIONE ============ */
function vai(v){
  if(vista!==v) scrollPos[vista]=window.scrollY;   // memorizza dove eri nella sezione attuale
  vista=v;
  if(v!=="salute") saluteRitorno=null;
  if(v==="oggi") dataInModifica=oggi();
  render();
  const y = scrollPos[v] || 0;                      // ripristina lo scroll della sezione scelta
  requestAnimationFrame(()=>window.scrollTo(0,y));
}
function mostraChrome(mostra){
  const nav=document.querySelector(".nav");
  const streak=document.getElementById("streak");
  if(nav) nav.style.display = mostra?"":"none";
  if(streak) streak.style.display = mostra?"":"none";
}
function render(){
  const app=document.getElementById("app");
  if(!authPronto){ mostraChrome(false); app.innerHTML=schermataCaricamento(); return; }
  if(!utente){ mostraChrome(false); app.innerHTML=schermataAccesso(); return; }
  mostraChrome(true);
  ["oggi","diario","analisi","salute","impostazioni"].forEach(v=>{
    document.getElementById("nav-"+v).classList.toggle("attivo", vista===v);
  });
  aggiornaProfiliUI();
  let corpo="";
  if(vista==="oggi") corpo=vistaOggi();
  else if(vista==="diario") corpo=vistaDiario();
  else if(vista==="analisi") corpo=vistaAnalisi();
  else if(vista==="salute") corpo=vistaSalute();
  else corpo=vistaImpostazioni();
  app.innerHTML=barraRicerca()+corpo;
  comprimiCarte();
  if(vista==="analisi") disegnaGrafico();
  if(queryRicerca) filtraPagina(queryRicerca);
}

      oninput="filtraPagina(this.value)" autocomplete="off">
    ${queryRicerca?`<button class="pulisci-ric" title="Cancella" onclick="filtraPagina('');document.getElementById('ricerca-globale').value=''">✕</button>`:""}

}

}
function cambiaProfilo(id){ S.profiloCorrente=id; localStorage.setItem(chiaveDati, JSON.stringify(S)); dataInModifica=oggi(); render(); }
function calcolaStreak(){
  let n=0, d=oggi();
  if(!compilato(d)) d=spostaGiorni(d,-1);
  while(compilato(d)){ n++; d=spostaGiorni(d,-1); }
  return n;
}
function giorniMancanti(){
  const v=vociProfilo();
  const date=Object.keys(v).filter(d=>compilato(d)).sort();
  if(date.length===0) return [];
  const mancanti=[];
  let d=date[0];
  const stop=oggi();
  while(d<stop){
    if(!compilato(d)) mancanti.push(d);
    d=spostaGiorni(d,1);
  }
  return mancanti.slice(-30);
}

/* ============ VISTA OGGI ============ */
function scala(campo, valore, emoji, etichette){
  let b="";
  for(let i=1;i<=5;i++){
    b+=`<button class="${valore===i?'attivo':''}" onclick="imposta('${campo}',${i})">${emoji?emoji[i-1]:i}</button>`;
  }
  return `<div class="scala ${emoji?'':'scala-num'}">${b}</div>
    <div class="etichette"><span>${etichette[0]}</span><span>${etichette[1]}</span></div>`;
}

      ${v.feci?`<div class="sotto">${notaFeci(v.feci)}</div>`:""}
      <div class="nome-scala" style="${sepStile}">🧻 Consistenza delle feci</div>
      <div class="chips">${CONSISTENZA_FECI.map(([k,n])=>`<button class="chip ${v.feciConsistenza===k?"attivo-verde":""}" onclick="imposta('feciConsistenza','${k}')">${n}</button>`).join("")}</div>
      ${v.feciConsistenza?`<div class="sotto">${notaConsistenza(v.feciConsistenza)}</div>`:""}`;

    if(traccia('occhi')) h+=`

  if(traccia('pasti')){

  }
  h+=`</div>`;
  if(v.attivita.includes("pisolino")){
    h+=`<div class="toggle-riga"><span>Pisolino subito dopo un pasto?</span>

    <div class="sotto">Sdraiarsi subito dopo mangiato può disturbare la digestione.</div>`;

  // Dettaglio attività: aggiungi voci a volontà con tipo, durata (min) e orario
  for(const [ak,an] of ATTIVITA){

  {

    const tAtt=sp.trattamenti.filter(t=>dataInModifica>=t.dal&&(!t.al||dataInModifica<=t.al));

function hhmmToMin(s){ if(!s) return null; const [H,M]=s.split(":").map(Number); return H*60+M; }

}

/* Rende ogni carta della vista comprimibile: di default chiusa, si espande toccando il titolo.

function chiaveCarta(card){ const h2=card.querySelector("h2"); return vista+"|"+(h2?h2.textContent.trim():""); }
function applicaStatoCarta(card){
  if(carteAperte.has(chiaveCarta(card))) card.classList.remove("collassato");
  else card.classList.add("collassato");
}
function toggleCarta(card, forzaChiudi){
  const k=chiaveCarta(card);
  if(forzaChiudi){ card.classList.add("collassato"); carteAperte.delete(k); return; }
  card.classList.toggle("collassato");

function comprimiCarte(){

    if(!card.querySelector(":scope > .chiudi-sezione")){
      const b=document.createElement("button");
      b.type="button"; b.className="chiudi-sezione"; b.textContent="▲ Chiudi sezione";
      b.addEventListener("click",()=>{ toggleCarta(card,true); card.scrollIntoView({block:"start",behavior:"smooth"}); });

/* Ricerca: filtra le carte (e le voci al loro interno) della vista attuale in base al testo. */
function filtraPagina(q){
  queryRicerca=q||"";
  const nq=normNome(queryRicerca.trim());
  const app=document.getElementById("app"); if(!app) return;
  // mostra/nasconde il pulsante "cancella" senza rigenerare la barra (mantiene il focus)
  const cont=app.querySelector(".barra-ricerca");
  if(cont){ let x=cont.querySelector(".pulisci-ric");
    if(nq && !x){ x=document.createElement("button"); x.className="pulisci-ric"; x.title="Cancella"; x.textContent="✕";
      x.addEventListener("click",()=>{ const inp=document.getElementById("ricerca-globale"); if(inp) inp.value=""; filtraPagina(""); }); cont.appendChild(x); }
    else if(!nq && x){ x.remove(); } }
  app.querySelectorAll(":scope > .card").forEach(card=>{
    const righe=card.querySelectorAll(".elemento-lista, .imp-riga");
    if(!nq){
      card.style.display=""; applicaStatoCarta(card);
      righe.forEach(r=>r.style.display="");
      card.querySelectorAll(".ric-mostra").forEach(el=>el.classList.remove("ric-mostra"));
      return;
    }
    const titolo=normNome((card.querySelector("h2")||{}).textContent||"");
    const titoloMatch=titolo.includes(nq);
    const testoMatch=normNome(card.textContent||"").includes(nq);
    if(titoloMatch||testoMatch){
      card.style.display=""; card.classList.remove("collassato");
      // rivela le eventuali sottosezioni chiuse dentro la carta (es. i singoli esami)
      card.querySelectorAll(".nascosto").forEach(el=>el.classList.add("ric-mostra"));
      righe.forEach(r=>{ r.style.display=(titoloMatch||normNome(r.textContent||"").includes(nq))?"":"none"; });
    } else { card.style.display="none"; }
  });
}
/* Cerca l'ultima voce registrata per una data attività (giorno più recente prima
   di quello in modifica) da cui ereditare durata e orario di default. */
function ultimaVoceAttivita(ak){
  const voci=vociProfilo();
  const date=Object.keys(voci).filter(d=>d<dataInModifica).sort().reverse();
  for(const d of date){
    const dett=voci[d].attivitaDett && voci[d].attivitaDett[ak];
    if(Array.isArray(dett)){
      for(let i=dett.length-1;i>=0;i--){
        const e=dett[i];
        if(e && ((e.d!==''&&e.d!=null) || (e.o!=null&&e.o!=='') || (e.int!=null&&e.int!==''))) return e;
      }
    }
  }
  return null;
}
/* Crea una nuova voce attività, ereditando durata/orario/intensità dall'ultima volta. */
function nuovaVoceAttivita(ak){
  const prec=ultimaVoceAttivita(ak);
  return prec ? {n:"", d:(prec.d!==''&&prec.d!=null)?prec.d:"", o:prec.o||"", int:prec.int||""}
              : {n:"", d:"", o:""};
}
function aggiungiVoceAttivita(ak){
  const v=voce(dataInModifica);
  if(!v.attivitaDett) v.attivitaDett={};
  if(!v.attivitaDett[ak]) v.attivitaDett[ak]=[];
  v.attivitaDett[ak].push(nuovaVoceAttivita(ak));
  v.agg=Date.now(); salva(); render();
}
function impostaVoceAttivita(ak, idx, campo, val){
  const v=voce(dataInModifica);
  if(!v.attivitaDett||!v.attivitaDett[ak]||!v.attivitaDett[ak][idx]) return;
  if(campo==="d"){ v.attivitaDett[ak][idx].d = (val===""? "" : Math.max(0, parseInt(val,10)||0)); }
  else { v.attivitaDett[ak][idx][campo] = val; }
  v.agg=Date.now(); salva();
}

const TL_H=1080;                 // altezza in px per 24 ore
const PXMIN=TL_H/1440;
function eventiTemporali(iso){
  const v=vociProfilo()[iso]; if(!v) return [];
  const b=[];
  const dd=hhmmToMin(v.oraDormire), sv=hhmmToMin(v.oraSveglia);
  if(dd!=null&&sv!=null){
    if(dd<sv){ b.push({s:dd,e:sv,txt:"😴 Sonno",col:"#5c6bc0"}); }
    else { b.push({s:0,e:sv,txt:"😴 Sonno",col:"#5c6bc0"}); b.push({s:dd,e:1440,txt:"😴 Sonno",col:"#5c6bc0"}); }
  } else if(sv!=null){ b.push({s:Math.max(0,sv-30),e:sv,txt:"☀️ Sveglia",col:"#5c6bc0"}); }
  const emojiPasto={colazione:"🍞 Colaz.",merendaMattino:"🍎 Mer. matt.",pranzo:"🍝 Pranzo",merendaPomeriggio:"🍏 Mer. pom.",cena:"🍲 Cena"};
  for(const [pk] of PASTI){ const p=v.pasti&&v.pasti[pk]; if(p&&p.ora){ const m=hhmmToMin(p.ora); if(m!=null) b.push({s:m,e:Math.min(1440,m+30),txt:emojiPasto[pk]||"🍽️",col:"#e8843c"}); } }
  const colAtt={meditazione:"#26a69a",respirazione:"#26a69a",sport:"#2e9e5b",pisolino:"#7e57c2",sauna:"#00897b",vacanza:"#00897b",intimita:"#d81b60"};
  const emoAtt=Object.fromEntries(ATTIVITA.map(([k,n])=>[k,n.split(" ")[0]]));
  for(const [ak] of ATTIVITA){
    const dett=(v.attivitaDett&&v.attivitaDett[ak])||[];
    for(const e of dett){ if(e.o){ const m=hhmmToMin(e.o); if(m!=null){ const dur=(e.d&&+e.d>0)?+e.d:30; b.push({s:m,e:Math.min(1440,m+dur),txt:(emoAtt[ak]||"🌿")+(e.n?" "+e.n:""),col:colAtt[ak]||"#2e9e5b"}); } } }
  }
  return b;
}
function colonnaOre(){

function colonnaTimeline(iso){

  for(let ora=0;ora<=24;ora+=2) h+=`<div class="tl-riga-ora" style="top:${ora*60*PXMIN}px"></div>`;
  for(const b of bl){

    h+=`<div class="tl-blocco" style="top:${top}px;height:${hgt}px;background:${b.col}" title="${esc(b.txt)}">${esc(b.txt)}</div>`;
  }

}

/* Gestione swipe sul popup riepilogo: ← → cambia giorno, ↓ chiude */
function attivaSwipeModale(){
  const ov=document.querySelector(".modale-overlay");
  const md=ov&&ov.querySelector(".modale");
  if(!md) return;
  let x0=null,y0=null,st0=0,t0=0;
  md.addEventListener("touchstart",(e)=>{
    if(e.touches.length!==1){ x0=null; return; }
    x0=e.touches[0].clientX; y0=e.touches[0].clientY; st0=md.scrollTop; t0=Date.now();
  },{passive:true});
  md.addEventListener("touchend",(e)=>{
    if(x0==null) return;
    const t=e.changedTouches[0], dx=t.clientX-x0, dy=t.clientY-y0, dt=Date.now()-t0; x0=null;
    if(dt>700) return;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.4){
      const avanti=dx<0;
      if(avanti && giornoRiepilogo>=oggi()) return;   // non si va oltre oggi
      mostraRiepilogo(spostaGiorni(giornoRiepilogo, avanti?1:-1));
      return;
    }
    if(dy>80 && st0<=0 && Math.abs(dy)>Math.abs(dx)) chiudiModale();
  },{passive:true});
}

function puntiGiorno(iso){

  const righe=[];

    righe.push([x.data, `🩺 ${esc(x.testo)}${x.invasivo?' <span class="badge" style="background:var(--rosso)">invasivo</span>':""}`]);
  for(const x of sp.notizie.filter(x=>x.data&&x.data.startsWith(pref)))
    righe.push([x.data, `${x.tipo==="buona"?"📬✨":"📬⛈️"} ${esc(x.testo)}`]);
  for(const f of sp.farmaci){
    if(f.dal&&f.dal.startsWith(pref)) righe.push([f.dal, `💊 Inizio: <b>${esc(f.nome)}</b> ${f.dose?esc(f.dose):""}`]);
    if(f.al&&f.al.startsWith(pref)) righe.push([f.al, `💊 Fine: <b>${esc(f.nome)}</b>`]);
  }
  for(const t of sp.trattamenti){
    if(t.dal&&t.dal.startsWith(pref)) righe.push([t.dal, `🧑‍⚕️ Inizio: <b>${esc(t.nome)}</b> ${t.dett?esc(t.dett):""}`]);
    if(t.al&&t.al.startsWith(pref)) righe.push([t.al, `🧑‍⚕️ Fine: <b>${esc(t.nome)}</b>`]);
  }
  for(const c of sp.cambiamenti.filter(c=>c.data&&c.data.startsWith(pref)&&c.tipo==="dose"))
    righe.push([c.data, `🔔 ${esc(c.testo)}`]);
  if(righe.length===0) return "";
  righe.sort((a,b)=>a[0]<b[0]?-1:1);
  let h=`<div class="card"><h2>📌 Eventi del mese</h2>`;
  for(const [d,t] of righe) h+=`<div class="elemento-lista" style="cursor:pointer" onclick="apriGiorno('${d}')"><b>${d.slice(8,10)}</b> — ${t}</div>`;
  h+=`</div>`;
  return h;
}

function cartaStatistiche(nDati){
  if(nDati<5) return "";
  const voci=vociProfilo();
  const date=Object.keys(voci).filter(d=>compilato(d)).sort();
  const nomiSintomi=Object.fromEntries(SINTOMI);
  // sintomo più frequente (ultimi 90 giorni)
  const da90=spostaGiorni(oggi(),-90);
  const conta={};
  for(const d of date){ if(d<da90) continue; for(const s of (voci[d].sintomi||[])) conta[s]=(conta[s]||0)+1; }
  const top=Object.entries(conta).sort((a,b)=>b[1]-a[1])[0];
  // medie ultimi 30 giorni
  const da30=spostaGiorni(oggi(),-30);
  const media=campo=>{
    const vals=date.filter(d=>d>=da30).map(d=>voci[d][campo]).filter(x=>x!=null);
    return vals.length? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : "—";
  };
  // stagione più critica
  const stagioni={inverno:[11,0,1],primavera:[2,3,4],estate:[5,6,7],autunno:[8,9,10]};
  let peggiore=null;
  for(const [nome,mesi] of Object.entries(stagioni)){
    const giorni=date.filter(d=>mesi.includes(Number(d.slice(5,7))-1));
    if(giorni.length<7) continue;
    const rate=giorni.filter(d=>(voci[d].sintomi||[]).length>0).length/giorni.length;
    if(!peggiore||rate>peggiore.rate) peggiore={nome,rate};
  }
  return `<div class="card"><h2>📊 Le tue statistiche</h2><div class="stat-griglia">
    <div class="stat-box"><div class="numero">${nDati}</div><div class="nome-stat">giorni tracciati</div></div>
    <div class="stat-box"><div class="numero">🔥 ${calcolaStreak()}</div><div class="nome-stat">giorni di fila</div></div>
    <div class="stat-box"><div class="numero">${media("umore")}</div><div class="nome-stat">umore medio (30 gg)</div></div>
    <div class="stat-box"><div class="numero">${media("sonnoQ")}</div><div class="nome-stat">sonno medio (30 gg)</div></div>
    <div class="stat-box"><div class="numero" style="font-size:1rem">${top?(nomiSintomi[top[0]]||top[0])+" ("+top[1]+"×)":"Nessuno 🎉"}</div><div class="nome-stat">disturbo più frequente (90 gg)</div></div>
    <div class="stat-box"><div class="numero" style="font-size:1rem">${peggiore?peggiore.nome+" ("+Math.round(peggiore.rate*100)+"% gg con disturbi)":"—"}</div><div class="nome-stat">stagione più critica</div></div>
  </div></div>`;
}
function cartaPrevisione(nDati){
  if(nDati<21) return `<div class="card"><h2>🔮 Previsioni</h2><p style="margin:0">Con almeno <b>21 giorni</b> di dati l'app stimerà il tuo rischio di ammalarti nei prossimi giorni, in base a stagione, sonno, stress, freddo e stanchezza. Giorni attuali: <b>${nDati}</b>.</p></div>`;
  const voci=vociProfilo();
  const date=Object.keys(voci).filter(d=>compilato(d));
  const meseCorrente=new Date().getMonth();
  let tot=0, mal=0;
  for(const d of date){
    const m=Number(d.slice(5,7))-1;
    const diff=Math.min(Math.abs(m-meseCorrente), 12-Math.abs(m-meseCorrente));
    if(diff<=1){ tot++; if((voci[d].sintomi||[]).includes("malattia")) mal++; }
  }
  let base = tot>=10 ? mal/Math.max(tot,1) : date.filter(d=>(voci[d].sintomi||[]).includes("malattia")).length/date.length;
  let rischio=Math.max(base,0.02);
  const motivi=[];
  const ultimi=[0,1,2].map(i=>voci[spostaGiorni(oggi(),-i)]).filter(Boolean);
  if(ultimi.some(v=>(v.sintomi||[]).includes("freddo"))){ rischio*=2; motivi.push("hai preso freddo di recente"); }
  if(ultimi.filter(v=>v.sonnoQ!=null&&v.sonnoQ<=2).length>=2){ rischio*=1.6; motivi.push("stai dormendo male"); }
  if(ultimi.filter(v=>v.stress!=null&&v.stress>=4).length>=2){ rischio*=1.5; motivi.push("sei molto stressato"); }
  if(ultimi.filter(v=>v.stanchezza!=null&&v.stanchezza>=4).length>=2){ rischio*=1.3; motivi.push("sei molto stanco"); }
  const conSole=ultimi.filter(v=>v.sole!=null);
  if(conSole.length>=2&&conSole.every(v=>!soleSufficiente(v))){ rischio*=1.2; motivi.push("stai prendendo poco sole"); }
  rischio=Math.min(rischio,0.9);
  let livello, colore, sfondo;
  if(rischio<0.08){ livello="BASSO"; colore="var(--verde)"; sfondo="var(--verde-chiaro)"; }
  else if(rischio<0.22){ livello="MEDIO"; colore="#8a6d00"; sfondo="#fdf3d7"; }
  else { livello="ALTO"; colore="var(--rosso)"; sfondo="var(--rosso-chiaro)"; }
  let h=`<div class="card"><h2>🔮 Previsioni</h2>
    <div class="previsione" style="background:${sfondo};color:${colore}">
      Rischio di ammalarti nei prossimi giorni: <b>${livello}</b> (~${Math.round(rischio*100)}%)
      ${motivi.length?`<div style="font-size:.9rem;margin-top:6px">Perché: ${motivi.join(", ")}.</div>`:""}
      ${livello!=="BASSO"?`<div style="font-size:.9rem;margin-top:6px">💡 Rallenta: dormi di più, copriti bene e riduci gli impegni per qualche giorno.</div>`:""}
    </div>
    <div class="avviso">Stima statistica basata sui tuoi dati passati e sulla stagione. Non è una previsione medica.</div></div>`;
  return h;
}
function cartaConsigli(){

    const mStress=media("stress");

    if(mStress!=null&&mStress>=3.5&&medita<3)
      c.push("🧘 Stress alto e poca pratica di rilassamento: 10 minuti al giorno di respirazione lenta (es. 4 secondi inspiro, 6 espiro) riducono in modo misurabile cortisolo e battito cardiaco.");
    if(giorni.filter(g=>g.pisolinoDopoPasto).length>=3)
      c.push("💤 Spesso fai il pisolino subito dopo mangiato: sdraiarsi a stomaco pieno favorisce reflusso e cattiva digestione. Aspetta 30-60 minuti.");
    if(giorni.filter(g=>g.denti!=null&&g.denti<2).length>giorni.length/2)
      c.push("🪥 Lava i denti almeno 2 volte al giorno: la salute della bocca è collegata anche a cuore e infiammazione generale.");
    const conEcc=giorni.filter(g=>Object.values(g.pasti||{}).some(p=>p&&p.ecc)).length;
    if(conEcc>giorni.length*0.35)
      c.push("🍝 Molte eccezioni alla dieta ultimamente: meglio pianificarle (es. una a settimana) che farle capitare. Il corpo tollera meglio gli strappi prevedibili.");
    const orePranzo=giorni.map(g=>g.pasti&&g.pasti.pranzo&&g.pasti.pranzo.ora).filter(Boolean).map(o=>Number(o.slice(0,2))*60+Number(o.slice(3,5)));
    if(orePranzo.length>=5&&Math.max(...orePranzo)-Math.min(...orePranzo)>120)
      c.push("🕐 Gli orari dei tuoi pasti variano molto: la ricerca sulla crononutrizione mostra che orari regolari aiutano metabolismo, digestione e sonno.");
    if(giorni.some(g=>g.feritaLenta))
      c.push("🩹 Hai segnalato ferite che cicatrizzano lentamente: parlane col medico, può indicare carenze (es. vitamina K, zinco) o rischio di infezione.");
    if(c.length===0) c.push("🌟 Le tue abitudini delle ultime 2 settimane sembrano equilibrate: continua così e tieni d'occhio l'analisi delle correlazioni.");
  }
  let h=`<div class="card"><h2>💡 Consigli per te</h2>`;
  for(const t of c.slice(0,5)) h+=`<div class="consiglio">${t}</div>`;
  h+=`<div class="avviso">Consigli generali ispirati a linee guida (OMS) e ricerca consolidata su sonno, luce solare, movimento e stress, applicati ai tuoi dati. Non sostituiscono il parere del medico.</div></div>`;
  return h;
}
function serieUltimi30(campo){
  const out=[];
  let d=spostaGiorni(oggi(),-29);
  for(let i=0;i<30;i++){
    const v=vociProfilo()[d];
    out.push({data:d, val:(v&&v[campo]!=null)?v[campo]:null});
    d=spostaGiorni(d,1);
  }
  return out;
}
function disegnaGrafico(){
  const cv=document.getElementById("grafico");
  if(!cv) return;
  const ctx=cv.getContext("2d");
  const W=cv.width, H=cv.height, pad=34;
  ctx.clearRect(0,0,W,H);
  const serie=serieUltimi30(graficoScelto);
  const valori=serie.filter(p=>p.val!=null);
  if(valori.length<2){
    ctx.fillStyle="#8a8a8a"; ctx.font="16px sans-serif"; ctx.textAlign="center";
    ctx.fillText("Non ci sono ancora abbastanza dati.", W/2, H/2);
    return;
  }
  let min=Math.min(...valori.map(p=>p.val)), max=Math.max(...valori.map(p=>p.val));
  if(graficoScelto!=="peso" && graficoScelto!=="acqua"){ min=1; max=5; }
  if(graficoScelto==="acqua"){ min=0; max=Math.max(obiettivoAcqua(), max); }
  if(min===max){ min-=1; max+=1; }
  const x=i=>pad+(W-pad-10)*(i/29);
  const y=v=>H-pad+ (pad+10-H)*((v-min)/(max-min));
  // assi
  ctx.strokeStyle="#e6e1d8"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad,10); ctx.lineTo(pad,H-pad); ctx.lineTo(W-10,H-pad); ctx.stroke();
  ctx.fillStyle="#8a8a8a"; ctx.font="12px sans-serif"; ctx.textAlign="right";
  ctx.fillText(String(Math.round(max*10)/10), pad-5, 18);
  ctx.fillText(String(Math.round(min*10)/10), pad-5, H-pad);
  // linea
  ctx.strokeStyle="#2e7d6b"; ctx.lineWidth=3; ctx.beginPath();
  let iniziato=false;
  serie.forEach((p,i)=>{
    if(p.val==null) return;
    if(!iniziato){ ctx.moveTo(x(i),y(p.val)); iniziato=true; }
    else ctx.lineTo(x(i),y(p.val));
  });
  ctx.stroke();
  // punti
  ctx.fillStyle="#2e7d6b";
  serie.forEach((p,i)=>{
    if(p.val==null) return;
    ctx.beginPath(); ctx.arc(x(i),y(p.val),4,0,7); ctx.fill();
  });
}

function fattoriDinamici(){

/* ===== Esami del sangue: andamento + correlazione leggera ===== */
function finestraMedia(iso, campo, raggio){
  const voci=vociProfilo(); let s=0,n=0;
  for(let i=-raggio;i<=raggio;i++){ const d=spostaGiorni(iso,i); const v=voci[d]; if(v&&v[campo]!=null){ s+=v[campo]; n++; } }
  return n? s/n : null;
}
function finestraSintomi(iso, raggio){
  const voci=vociProfilo(); let s=0,n=0;
  for(let i=-raggio;i<=raggio;i++){ const d=spostaGiorni(iso,i); const v=voci[d]; if(v&&compilato(d)){ s+=((v.sintomi||[]).length>0?1:0); n++; } }
  return n? s/n : null;
}
function pearson(xs, ys){
  const n=xs.length; if(n<3) return null;
  const mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
  let sxy=0,sxx=0,syy=0;
  for(let i=0;i<n;i++){ const dx=xs[i]-mx, dy=ys[i]-my; sxy+=dx*dy; sxx+=dx*dx; syy+=dy*dy; }
  if(sxx===0||syy===0) return null;
  return sxy/Math.sqrt(sxx*syy);
}
/* ===== Periodo di riferimento dei grafici ===== */
function periodoCutoff(){
  const p=periodoSangue;
  if(p.preset==="custom") return {da:p.da||null, a:p.a||null};
  const mesi={"1m":1,"3m":3,"6m":6,"1a":12}[p.preset];
  if(!mesi) return {da:null, a:null};
  const d=new Date(); d.setMonth(d.getMonth()-mesi);
  return {da:d.toISOString().slice(0,10), a:null};
}
function filtraPerPeriodo(arr){ const {da,a}=periodoCutoff(); return arr.filter(e=>(!da||e.data>=da)&&(!a||e.data<=a)); }
function impostaPeriodoSangue(preset){ periodoSangue={preset, da:"", a:""}; render(); }
function impostaPeriodoSangueData(k,v){ periodoSangue.preset="custom"; periodoSangue[k]=v; render(); }
function etichettaPeriodo(){
  const p=periodoSangue;
  if(p.preset==="custom") return (p.da||"inizio")+" → "+(p.a||"oggi");
  return {"1m":"ultimo mese","3m":"ultimi 3 mesi","6m":"ultimi 6 mesi","1a":"ultimo anno","tutto":"tutto lo storico"}[p.preset]||"tutto lo storico";
}
/* Grafico SVG dell'andamento nel tempo di un singolo esame (nessuna libreria, funziona offline) */
function graficoSangue(arr){
  const fmt=n=>{ const r=Math.round(n*100)/100; return String(r); };
  const dShort=d=>d.slice(8,10)+"/"+d.slice(5,7);
  const W=320,H=118,padL=38,padR=12,padT=12,padB=22, iw=W-padL-padR, ih=H-padT-padB;
  const vals=arr.map(e=>e.valore);
  let rb=null, ra=null;
  for(const e of arr){ if(rb==null&&e.rifBasso!=null) rb=e.rifBasso; if(ra==null&&e.rifAlto!=null) ra=e.rifAlto; }
  let lo=Math.min(...vals), hi=Math.max(...vals);
  if(rb!=null){ lo=Math.min(lo,rb); hi=Math.max(hi,rb); }
  if(ra!=null){ lo=Math.min(lo,ra); hi=Math.max(hi,ra); }
  if(lo===hi){ lo-=1; hi+=1; }
  const mrg=(hi-lo)*0.12; lo-=mrg; hi+=mrg;
  const t0=new Date(arr[0].data).getTime(), t1=new Date(arr[arr.length-1].data).getTime(), spanT=t1-t0;
  const X=e=> padL + (spanT? (new Date(e.data).getTime()-t0)/spanT : 0.5)*iw;
  const Y=v=> padT + (1-(v-lo)/(hi-lo))*ih;
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;margin:4px 0" preserveAspectRatio="xMidYMid meet">`;
  // banda di riferimento
  if(rb!=null||ra!=null){
    const yTop=Y(ra!=null?ra:hi), yBot=Y(rb!=null?rb:lo);
    svg+=`<rect x="${padL}" y="${yTop.toFixed(1)}" width="${iw}" height="${Math.max(0,yBot-yTop).toFixed(1)}" fill="var(--verde)" opacity="0.13"/>`;
    if(ra!=null) svg+=`<line x1="${padL}" y1="${Y(ra).toFixed(1)}" x2="${padL+iw}" y2="${Y(ra).toFixed(1)}" stroke="var(--verde)" stroke-width="1" stroke-dasharray="3 3" opacity=".5"/>`;
    if(rb!=null) svg+=`<line x1="${padL}" y1="${Y(rb).toFixed(1)}" x2="${padL+iw}" y2="${Y(rb).toFixed(1)}" stroke="var(--verde)" stroke-width="1" stroke-dasharray="3 3" opacity=".5"/>`;
  }
  // etichette asse Y (min/max) e X (prima/ultima data)
  svg+=`<text x="${padL-4}" y="${(padT+4).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--grigio)">${fmt(hi)}</text>`;
  svg+=`<text x="${padL-4}" y="${(padT+ih).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--grigio)">${fmt(lo)}</text>`;
  svg+=`<text x="${padL}" y="${H-6}" text-anchor="start" font-size="9" fill="var(--grigio)">${dShort(arr[0].data)}</text>`;
  if(arr.length>1) svg+=`<text x="${padL+iw}" y="${H-6}" text-anchor="end" font-size="9" fill="var(--grigio)">${dShort(arr[arr.length-1].data)}</text>`;
  // linea
  if(arr.length>1){
    const pts=arr.map(e=>`${X(e).toFixed(1)},${Y(e.valore).toFixed(1)}`).join(" ");
    svg+=`<polyline points="${pts}" fill="none" stroke="var(--blu)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  }
  // punti (rossi se fuori dai riferimenti)
  for(const e of arr){
    const fuori=(e.rifBasso!=null&&e.valore<e.rifBasso)||(e.rifAlto!=null&&e.valore>e.rifAlto);
    svg+=`<circle cx="${X(e).toFixed(1)}" cy="${Y(e.valore).toFixed(1)}" r="3.2" fill="${fuori?'var(--rosso)':'var(--blu)'}" stroke="var(--card)" stroke-width="1"><title>${esc(dShort(e.data))}: ${esc(fmt(e.valore))}</title></circle>`;
  }
  svg+=`</svg>`;
  return svg;
}
function cartaSangue(){
  const sp=saluteProfilo();
  if(!sp.sangue||sp.sangue.length===0) return "";
  const perCat={};
  for(const e of sp.sangue){ const k=e.catId||("nome:"+e.nome); (perCat[k]=perCat[k]||[]).push(e); }
  const chiaviCat=Object.keys(perCat).sort((a,b)=>{
    const na=(categoriaById(sp,a)||{}).nome||perCat[a][0].nome, nb=(categoriaById(sp,b)||{}).nome||perCat[b][0].nome;
    return norm(na).localeCompare(norm(nb)); });
  // filtra per periodo scelto e tieni solo gli esami con misure nel periodo
  const catArr={}, chiaviVis=[];
  for(const kCat of chiaviCat){
    const arr=filtraPerPeriodo(perCat[kCat]).slice().sort((a,b)=>a.data<b.data?-1:1);
    if(arr.length){ catArr[kCat]=arr; chiaviVis.push(kCat); }

  h+=`<div class="sotto" style="margin-top:8px">${chiaviVis.length} esami nel periodo${nFuori?` · <b class="trend-su">${nFuori} fuori dai riferimenti</b>`:(chiaviVis.length?" · <span class='trend-stab'>tutti nei riferimenti</span>":"")}.</div>`;
  if(!chiaviVis.length){ h+=`<div class="avviso" style="color:var(--grigio)">Nessuna misura nel periodo selezionato.</div></div>`; return h; }
  h+=`<button class="dettagli-btn" onclick="togglaSezione('sangue-singoli')">📊 Mostra i singoli esami e i grafici (${chiaviVis.length}) ▾</button>`;
  h+=`<div id="sangue-singoli" class="${sezClass('sangue-singoli')}">`;
  for(const kCat of chiaviVis){
    const nome=(categoriaById(sp,kCat)||{}).nome||perCat[kCat][0].nome;
    const arr=catArr[kCat];
    const primo=arr[0], ultimo=arr[arr.length-1];
    let trend="stabile", cls="trend-stab", freccia="→";
    if(arr.length>=2){
      const d=ultimo.valore-primo.valore, soglia=Math.abs(primo.valore)*0.05;
      if(d>soglia){ trend="in aumento"; cls="trend-su"; freccia="↑"; }
      else if(d<-soglia){ trend="in calo"; cls="trend-giu"; freccia="↓"; }
    }
    const fuori=(ultimo.rifBasso!=null&&ultimo.valore<ultimo.rifBasso)||(ultimo.rifAlto!=null&&ultimo.valore>ultimo.rifAlto);
    const gid="graf-"+kCat.replace(/[^A-Za-z0-9]/g,"");
    h+=`<div class="elemento-lista">
      <div class="titolo"><span>🩸 ${esc(nome)}</span>
      <span class="${cls}">${freccia} ${arr.length>=2?trend:"1 misura"}</span></div>
      <div class="sotto">Ultimo: <b class="${fuori?'trend-su':''}">${esc(String(ultimo.valore))}${ultimo.unita?" "+esc(ultimo.unita):""}</b> il ${ultimo.data}${arr.length>=2?` · prima: ${esc(String(primo.valore))} il ${primo.data}`:""}${fuori?" · ⚠️ fuori dai riferimenti":""}</div>
      <button class="dettagli-btn" style="margin-top:6px" onclick="togglaSezione('${gid}')">📈 Grafico e dettagli ▾</button>
      <div id="${gid}" class="${sezClass(gid, true)}">`;
    h+= arr.length>=2 ? graficoSangue(arr)
        : `<div class="sotto">Una sola misura finora: il grafico dell'andamento comparirà dal secondo esame in poi.</div>`;
    if(arr.length>=4){
      const xs=[], yU=[], yS=[];
      for(const e of arr){ const u=finestraMedia(e.data,"umore",3), st=finestraSintomi(e.data,3);
        if(u!=null){ xs.push(e.valore); yU.push(u); yS.push(st==null?0:st); } }
      if(xs.length>=4){
        const rU=pearson(xs,yU);
        if(rU!=null&&Math.abs(rU)>=0.5)
          h+=`<div class="sotto">📈 Quando <b>${esc(nome)}</b> era più ${rU<0?"alto":"basso"}, nei giorni attorno l'umore tendeva a essere più basso. Indizio da verificare.</div>`;
        const rS=pearson(xs,yS);
        if(rS!=null&&Math.abs(rS)>=0.5)
          h+=`<div class="sotto">📈 Valori più ${rS>0?"alti":"bassi"} di <b>${esc(nome)}</b> si accompagnano a più disturbi nei giorni vicini. Indizio da verificare.</div>`;
      }
    }
    h+=`</div></div>`;
  }
  h+=`<div class="avviso" style="color:var(--grigio)">Con poche misurazioni questi collegamenti sono solo indizi, non prove: servono più esami distribuiti nel tempo.</div>`;
  h+=`</div></div>`;
  return h;
}
/* Motore comune: restituisce le coppie fattore→esito significative, con struttura
   (usato sia dall'elenco testuale sia dalla mappa delle correlazioni). */
function coppieCorrelazioni(){
  const voci=vociProfilo();
  const date=Object.keys(voci).filter(d=>compilato(d)).sort();
  if(date.length<14) return [];
  const out=[];
  for(const [fk,fNome,fTest,eBenefico] of FATTORI.concat(fattoriDinamici())){
    for(const [ek,eNome,eTest] of ESITI){
      if(fk==="cattivoSonno"&&ek==="cattivoSonnoEsito") continue;
      if(fk==="stressAlto"&&ek==="stressAltoEsito") continue;
      for(const lag of [0,1]){
        let conF=0,conFE=0,senzaF=0,senzaFE=0;
        for(const d of date){
          const dEsito=spostaGiorni(d,lag);
          const vE=voci[dEsito];
          if(!vE||!compilato(dEsito)) continue;
          const f=!!fTest(voci[d], d), e=eTest(vE);
          if(f){conF++; if(e)conFE++;} else {senzaF++; if(e)senzaFE++;}
        }
        if(conF<5||senzaF<5) continue;
        const p1=conFE/conF, p0=senzaFE/senzaF;
        const diff=p1-p0;
        if(Math.abs(diff)<0.2) continue;
        const positiva=diff<0;
        if(!positiva && eBenefico) continue; // attività benefica che "causa" sintomi: probabile rumore, salta
        out.push({fk,fNome,ek,eNome,forza:Math.abs(diff),positiva,lag,conF,senzaF,p1,p0});
      }
    }
  }
  out.sort((a,b)=>b.forza-a.forza);
  return out;
}
function trovaCorrelazioni(){
  const pct=x=>Math.round(x*100)+"%";
  const risultati=coppieCorrelazioni().map(c=>{
    const quando=c.lag===1?"Il giorno dopo":"Nei giorni con";
    const testo = c.positiva
      ? `✅ <b>${quando} ${c.fNome}</b> hai avuto meno ${c.eNome}: ${pct(c.p1)} delle volte, contro ${pct(c.p0)} negli altri giorni.`
      : `⚠️ <b>${quando} ${c.fNome}</b> hai avuto <b>${c.eNome}</b> molto più spesso: ${pct(c.p1)} delle volte, contro ${pct(c.p0)} negli altri giorni.`;
    return {testo, positiva:c.positiva, forza:c.forza,
      dettaglio:`Basato su ${c.conF} giorni con e ${c.senzaF} senza. ${c.lag===1?"(effetto del giorno dopo)":""}`};
  });
  return risultati.slice(0,10);
}

function nodoPer(k, nome){

/* Costruisce nodi e archi combinando correlazioni automatiche + collegamenti manuali. */
function datiGrafoCorrelazioni(){
  const nodi={}; const archi={};
  const addNodo=n=>{ if(!nodi[n.id]) nodi[n.id]={id:n.id,label:n.label,emoji:n.emoji}; return nodi[n.id]; };
  const addArco=(daId,aId,forza,positiva,auto,nota)=>{
    if(daId===aId) return;
    const key=daId+'>'+aId;
    const ex=archi[key];
    if(!ex || forza>ex.forza){ archi[key]={daId,aId,forza,positiva,auto,nota:nota||(ex&&ex.nota)||''}; }
  };
  // automatiche
  for(const c of coppieCorrelazioni()){
    const da=nodoPer(c.fk,c.fNome), a=nodoPer(c.ek,c.eNome);
    addNodo(da); addNodo(a);
    addArco(da.id, a.id, c.forza, c.positiva, true);
  }
  // manuali
  const sp=saluteProfilo(); const man=(sp&&sp.grafoManuale)||[];
  for(const m of man){
    addNodo({id:m.daId,label:m.daLabel,emoji:m.daEmoji||'•'});
    addNodo({id:m.aId,label:m.aLabel,emoji:m.aEmoji||'•'});
    addArco(m.daId, m.aId, m.forza, m.positiva, false, m.nota);
  }
  return {nodi:Object.values(nodi), archi:Object.values(archi)};
}
/* Disegna il grafo come SVG inline (nessuna libreria esterna). */
function svgGrafoCorrelazioni(dati){
  const N=dati.nodi.length;
  if(!N) return "";
  const W=400, H=Math.max(360, 300+N*6), cx=W/2, cy=H/2, R=Math.min(cx,cy)-56, rN=21;
  const pos={};
  dati.nodi.forEach((n,i)=>{ const ang=-Math.PI/2 + i*2*Math.PI/N;
    pos[n.id]={x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang)}; });
  let archiSvg="";
  for(const a of dati.archi){
    const p=pos[a.daId], q=pos[a.aId]; if(!p||!q) continue;
    const dx=q.x-p.x, dy=q.y-p.y, len=Math.hypot(dx,dy)||1, ux=dx/len, uy=dy/len;
    // accorcia agli estremi per non entrare nei cerchi + spazio freccia
    const x1=p.x+ux*rN, y1=p.y+uy*rN, x2=q.x-ux*(rN+3), y2=q.y-uy*(rN+3);
    // curvatura: verso opposto per archi reciproci
    const side=(a.daId<a.aId)?1:-1;
    const mx=(x1+x2)/2 - uy*24*side, my=(y1+y2)/2 + ux*24*side;
    const w=(1.6+a.forza*7).toFixed(1);
    const col=a.positiva?'var(--verde)':'var(--rosso)';
    const mk=a.positiva?'url(#fr-v)':'url(#fr-r)';
    const dash=a.auto?'':'6 4';
    const tip=(a.positiva?'Fa bene: ':'Fa male: ')+Math.round(a.forza*100)+'%'+(a.auto?' (automatico)':' (manuale)')+(a.nota?' — '+a.nota:'');
    archiSvg+=`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} Q${mx.toFixed(1)},${my.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round" stroke-opacity="${(0.45+a.forza*0.5).toFixed(2)}" ${dash?`stroke-dasharray="${dash}"`:''} marker-end="${mk}"><title>${esc(tip)}</title></path>`;
  }
  let nodiSvg="";
  for(const n of dati.nodi){
    const p=pos[n.id];
    const label=esc(n.label);
    nodiSvg+=`<g>
      <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${rN}" fill="var(--card)" stroke="var(--bordo)" stroke-width="2"></circle>
      <text x="${p.x.toFixed(1)}" y="${(p.y+6).toFixed(1)}" text-anchor="middle" font-size="18">${n.emoji}</text>
      <text x="${p.x.toFixed(1)}" y="${(p.y+rN+13).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="var(--testo)" font-weight="600">${label}</text>
    </g>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:520px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="fr-v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--verde)"></path></marker>
      <marker id="fr-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--rosso)"></path></marker>
    </defs>
    ${archiSvg}${nodiSvg}
  </svg>`;
}
function cartaGrafoCorrelazioni(){
  const sp=saluteProfilo(); const man=(sp&&sp.grafoManuale)||[];
  const nDati=Object.keys(vociProfilo()).filter(d=>compilato(d)).length;
  const dati=datiGrafoCorrelazioni();
  let h=`<div class="card"><h2>🕸️ Mappa delle correlazioni</h2>
    <div class="sotto" style="margin-top:0;margin-bottom:8px">Ogni pallino è un punto focale (sonno, stanchezza, fastidi…). Le frecce mostrano <b>come una cosa influenza l'altra</b>: più la freccia è spessa, più il collegamento è forte. <span style="color:var(--verde);font-weight:700">Verde</span> = fa bene (riduce), <span style="color:var(--rosso);font-weight:700">rosso</span> = fa male (aumenta). Le frecce tratteggiate sono i collegamenti che aggiungi a mano.</div>`;
  if(dati.archi.length===0){
    h+=`<div class="sotto" style="padding:10px 0">Ancora nessun collegamento da mostrare.${nDati<14?` Servono almeno <b>14 giorni</b> di dati per le frecce automatiche (ne hai <b>${nDati}</b>), ma puoi già aggiungerne di tue qui sotto.`:` Aggiungi un collegamento manuale per iniziare.`}</div>`;
  } else {
    h+=`<div style="overflow-x:auto;margin:4px -4px 6px">${svgGrafoCorrelazioni(dati)}</div>`;
  }
  // elenco collegamenti manuali con eliminazione
  if(man.length){
    h+=`<div class="sotto" style="font-weight:700;margin:10px 0 4px">Collegamenti manuali</div>`;
    man.forEach((m,i)=>{
      h+=`<div class="esame-riga"><span>${m.daEmoji||''} ${esc(m.daLabel)} → ${m.aEmoji||''} ${esc(m.aLabel)}
        <span class="sotto" style="display:inline"> · ${m.positiva?'✅ fa bene':'⚠️ fa male'} · ${['debole','media','forte'][Math.min(2,Math.round(m.forza*2.5))]||'media'}${m.nota?' · '+esc(m.nota):''}</span></span>
        <button class="btn btn-piccolo" onclick="eliminaArcoManuale(${i})" title="Rimuovi">🗑️</button></div>`;
    });
  }
  h+=`<button class="chip" style="margin-top:10px" onclick="apriArcoManuale()">➕ Aggiungi collegamento</button>
    <div class="avviso" style="margin-top:10px">⚠️ Le frecce automatiche sono indizi statistici, non rapporti di causa-effetto certi.</div></div>`;
  return h;
}
/* --- Collegamento manuale: modale di inserimento --- */
let arcoTmp={daId:'',aId:'',forza:0.5,positiva:false};
function opzioniNodo(sel){
  const focali=nodiFocali();
  const extra=datiGrafoCorrelazioni().nodi.filter(n=>!focali.some(f=>f.id===n.id));
  const tutti=focali.concat(extra);
  return tutti.map(n=>`<option value="${esc(n.id)}" ${sel===n.id?'selected':''}>${n.emoji} ${esc(n.label)}</option>`).join("");
}
function apriArcoManuale(){
  arcoTmp={daId:'',aId:'',forza:0.5,positiva:false};
  const html=`<div class="modale-overlay" style="z-index:80" onclick="if(event.target===this)chiudiArcoManuale()">
    <div class="modale" style="max-height:80vh"><div class="maniglia"></div>
      <h2>➕ Collegamento tra due punti</h2>
      <div class="sotto" style="margin-top:0;margin-bottom:10px">Indica come un punto influenza un altro. Comparirà nella mappa come freccia tratteggiata.</div>
      <label class="sotto" style="font-weight:700">Da (causa)</label>
      <select id="arco-da" style="width:100%;margin:4px 0 10px;padding:10px;border:2px solid var(--bordo);border-radius:12px;background:var(--input);color:var(--testo)"><option value="">— scegli —</option>${opzioniNodo('')}</select>
      <label class="sotto" style="font-weight:700">Verso (effetto)</label>
      <select id="arco-a" style="width:100%;margin:4px 0 10px;padding:10px;border:2px solid var(--bordo);border-radius:12px;background:var(--input);color:var(--testo)"><option value="">— scegli —</option>${opzioniNodo('')}</select>
      <label class="sotto" style="font-weight:700">Effetto</label>
      <div class="chips" id="arco-segno" style="margin:4px 0 10px">
        <button type="button" class="chip" onclick="arcoTmp.positiva=false;segnaArcoSel()">⚠️ Fa male (aumenta)</button>
        <button type="button" class="chip" onclick="arcoTmp.positiva=true;segnaArcoSel()">✅ Fa bene (riduce)</button></div>
      <label class="sotto" style="font-weight:700">Forza</label>
      <div class="chips" id="arco-forza" style="margin:4px 0 10px">
        <button type="button" class="chip" onclick="arcoTmp.forza=0.28;segnaArcoSel()">Debole</button>
        <button type="button" class="chip" onclick="arcoTmp.forza=0.5;segnaArcoSel()">Media</button>
        <button type="button" class="chip" onclick="arcoTmp.forza=0.8;segnaArcoSel()">Forte</button></div>
      <label class="sotto" style="font-weight:700">Nota (facoltativa)</label>
      <input type="text" id="arco-nota" placeholder="Es. solo se salto la colazione" style="width:100%;margin:4px 0 12px;padding:10px;border:2px solid var(--bordo);border-radius:12px;background:var(--input);color:var(--testo)">
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-verde" onclick="salvaArcoManuale()">✓ Aggiungi</button>
        <button class="btn" onclick="chiudiArcoManuale()">Annulla</button></div>
    </div></div>`;
  const host=document.createElement("div"); host.id="arco-host"; host.innerHTML=html;
  document.body.appendChild(host);
  segnaArcoSel();
}
function segnaArcoSel(){
  const seg=document.getElementById("arco-segno");
  if(seg){ seg.children[0].classList.toggle("attivo",!arcoTmp.positiva); seg.children[1].classList.toggle("attivo-verde",arcoTmp.positiva); }
  const fz=document.getElementById("arco-forza");
  if(fz){ const idx=arcoTmp.forza<0.4?0:(arcoTmp.forza<0.65?1:2);
    [...fz.children].forEach((c,i)=>c.classList.toggle("attivo-verde",i===idx)); }
}
function chiudiArcoManuale(){ const h=document.getElementById("arco-host"); if(h) h.remove(); }
function salvaArcoManuale(){
  const daId=(document.getElementById("arco-da")||{}).value||"";
  const aId=(document.getElementById("arco-a")||{}).value||"";
  if(!daId||!aId){ alert("Scegli il punto di partenza e quello di arrivo."); return; }
  if(daId===aId){ alert("Scegli due punti diversi."); return; }
  const nota=norm(((document.getElementById("arco-nota")||{}).value||"").trim());
  // recupera label/emoji dei nodi scelti
  const catalogo={}; datiGrafoCorrelazioni().nodi.forEach(n=>catalogo[n.id]=n); nodiFocali().forEach(n=>{ if(!catalogo[n.id]) catalogo[n.id]=n; });
  const da=catalogo[daId], a=catalogo[aId];
  const sp=saluteProfilo(); if(!sp.grafoManuale) sp.grafoManuale=[];
  sp.grafoManuale.push({daId, daLabel:da.label, daEmoji:da.emoji, aId, aLabel:a.label, aEmoji:a.emoji,
    forza:arcoTmp.forza, positiva:arcoTmp.positiva, nota});
  chiudiArcoManuale();
  mostraToast("Collegamento aggiunto ✓");
  salva(); render();
}
function eliminaArcoManuale(i){
  const sp=saluteProfilo(); if(!sp.grafoManuale||!sp.grafoManuale[i]) return;
  sp.grafoManuale.splice(i,1); salva(); render();
}

function normNome(s){ return norm(String(s==null?"":s)).toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]+/g," ").trim(); }

function riconosciAnalita(nome){
  const n=normNome(nome); if(!n) return null; let best=null;
  for(const a of ANALITI){ for(const raw of a.alias){ const al=normNome(raw);
    let ok=false;
    if(n===al) ok=true;
    else if(al.length>=4 && (" "+n+" ").includes(" "+al+" ")) ok=true;
    else if(al.length>=5 && n.includes(al)) ok=true;
    if(ok && (!best || al.length>best.len)) best={a, len:al.length};
  }}
  return best?best.a:null;

/* Converte un valore verso l'unità canonica della categoria, se il fattore è noto.
   Ritorna {valore, unita} già convertiti, oppure il valore originale se la conversione è ignota. */
function convertiUnita(valore, unitaFrom, cat, built){
  if(valore==null||isNaN(valore)) return {valore, unita:unitaFrom||(cat&&cat.unita)||""};
  const target=(cat&&cat.unita)||(built&&built.unita)||unitaFrom||"";
  const uf=normU(unitaFrom), ut=normU(target);
  if(!uf) return {valore, unita:target};            // nessuna unità indicata: assumo già canonica
  if(uf===ut) return {valore, unita:target};        // già nell'unità giusta
  const table=(built&&built.conv)||{};
  if(table[uf]!=null && table[uf]!==0) return {valore:+( valore*table[uf] ).toPrecision(6), unita:target};
  return {valore, unita:unitaFrom};                 // conversione ignota: lascio l'originale
}
/* Assegna (o crea) una categoria per un esame, imparando l'alias e convertendo l'unità.
   Ritorna {catId, valore, unita, valoreOrig, unitaOrig}. */
function assegnaCategoria(sp, nome, unita, valore, forcedCatId){
  if(!sp.categorie) sp.categorie=[];
  const built=riconosciAnalita(nome);
  const nN=normNome(nome);
  let cat=null;
  if(forcedCatId){ cat=categoriaById(sp, forcedCatId)||null; }
  if(cat){
    if(nN && normNome(cat.nome)!==nN && !(cat.alias||[]).some(a=>normNome(a)===nN)){ (cat.alias=cat.alias||[]).push(norm(nome)); }
    const convF=convertiUnita(valore, unita, cat, built);
    const convertitoF = convF.unita!==(unita||cat.unita) || convF.valore!==valore;
    return { catId:cat.id, valore:convF.valore, unita:convF.unita,
             valoreOrig: convertitoF?valore:null, unitaOrig: convertitoF?(unita||""):null };
  }
  for(const c of sp.categorie){
    if((c.alias||[]).some(a=>normNome(a)===nN)) { cat=c; break; }
    if(normNome(c.nome)===nN){ cat=c; break; }
    if(built && normNome(c.nome)===normNome(built.nome)){ cat=c; break; }
    if(built && (c.builtNome && normNome(c.builtNome)===normNome(built.nome))){ cat=c; break; }
  }
  if(!cat){
    cat={ id:"cat"+Date.now()+Math.floor(Math.random()*9999),
      nome: built?built.nome:norm(nome), unita: built?built.unita:norm(unita||""),
      builtNome: built?built.nome:null, alias:[] };
    sp.categorie.push(cat);
  }
  if(nN && normNome(cat.nome)!==nN && !(cat.alias||[]).some(a=>normNome(a)===nN)){ (cat.alias=cat.alias||[]).push(norm(nome)); }
  const conv=convertiUnita(valore, unita, cat, built);
  const convertito = conv.unita!==(unita||cat.unita) || conv.valore!==valore;
  return { catId:cat.id, valore:conv.valore, unita:conv.unita,
           valoreOrig: convertito?valore:null, unitaOrig: convertito?(unita||""):null };
}

function anteprimaCategoria(nome){

  if(b){ for(const c of sp.categorie||[]){ if(normNome(c.nome)===normNome(b.nome)) return c.nome; } return b.nome; }
  return norm(nome);

/* Da una riga di testo estrae {nome, valore, unita, rifBasso, rifAlto} oppure null */
function estraiRigaTesto(riga){
  const line=norm(riga).replace(/\s+/g," ").trim();
  if(line.length<3) return null;
  // primo numero "valore" (anche con < >)
  const mNum=line.match(/([<>]?\s*-?\d{1,4}(?:[.,]\d+)?)/);
  if(!mNum) return null;
  const idx=mNum.index;
  let nome=line.slice(0,idx).replace(/[.:;·\-–\s]+$/,"").trim();
  if(!/[A-Za-zÀ-ÿ]{3}/.test(nome)) return null; // nome deve avere lettere
  if(/^(data|referto|paziente|reparto|pag|pagina|codice|nato|prelievo|refertazione|analisi di)/i.test(nome)) return null;
  const valore=numIt(mNum[1].replace(/[<>]/g,""));
  if(isNaN(valore)) return null;
  const resto=line.slice(idx+mNum[1].length).trim();

  let unita=""; const mU=resto.match(/^([A-Za-zµμ%][A-Za-zµμ%\/·^0-9\.]*)/); if(mU) unita=mU[1].replace(/\.$/,"");

  let rifBasso=null, rifAlto=null;
  const mR=resto.match(/(-?\d+(?:[.,]\d+)?)\s*[-–aA]\s*(-?\d+(?:[.,]\d+)?)/);
  if(mR){ rifBasso=numIt(mR[1]); rifAlto=numIt(mR[2]); }
  else { const mLt=resto.match(/[<≤]\s*(-?\d+(?:[.,]\d+)?)/); if(mLt) rifAlto=numIt(mLt[1]);
         const mGt=resto.match(/[>≥]\s*(-?\d+(?:[.,]\d+)?)/); if(mGt) rifBasso=numIt(mGt[1]); }
  if(isNaN(rifBasso)) rifBasso=null; if(isNaN(rifAlto)) rifAlto=null;
  return { nome, valore, unita, rifBasso, rifAlto };
}
function estraiDaTesto(txt){
  const out=[];
  for(const riga of String(txt).split(/\r?\n/)){ const c=estraiRigaTesto(riga); if(c) out.push(c); }
  return out;
}
/* Estrae {rifBasso,rifAlto} da una stringa tipo "70 - 110", "< 200", "> 40" */
function parseRangeTesto(s){

  s=String(s);
  const mR=s.match(/(-?\d+(?:[.,]\d+)?)\s*[-–—aA]\s*(-?\d+(?:[.,]\d+)?)/);
  if(mR){ rifBasso=numIt(mR[1]); rifAlto=numIt(mR[2]); }

/* Formato "riepilogo": esami nelle righe, date nelle colonne (+ eventuali colonne Range/Unità).

function estraiDaRigheMatrice(rows){

    rows[i].forEach((cell,j)=>{ const d=parseDataFlessibile(cell); if(d){ dc[j]=d; n++; } });
    if(n>nDate){ nDate=n; hd=i; dateCol=dc; }
  }
  if(hd<0 || nDate<2) return null; // non è un formato a matrice
  // Individua colonne Range e Unità (nella riga intestazione o in quella sopra/sotto)
  let colRange=-1, colUnita=-1;
  for(const i of [hd, hd-1, hd+1]){
    if(i<0||i>=rows.length) continue;
    rows[i].forEach((cell,j)=>{
      if(dateCol[j]) return;                 // salta le colonne-data
      const c=norma(cell); if(!c || c.length>24) return;
      if(colRange<0 && /(range|rif|interval|norma)/.test(c)) colRange=j;
      if(colUnita<0 && /(unit[àa]?|u\.?m\.?|misura)/.test(c)) colUnita=j;
    });

  const minDateCol=Math.min(...dateCols);

  for(let i=hd+1;i<rows.length;i++){
    const r=rows[i]; if(!r) continue;
    // Il nome è la prima cella testuale non numerica prima delle colonne data
    let nome="";
    for(let j=0;j<minDateCol;j++){
      const v=norm(String(r[j]==null?"":r[j])).trim();
      if(v && !/^[<>≤≥]?\s*-?\d/.test(v)){ nome=v; break; }
    }
    if(!nome || !/[A-Za-zÀ-ÿ]{2}/.test(nome)) continue;
    const unita=colUnita>=0 ? norm(String(r[colUnita]==null?"":r[colUnita])).trim() : "";
    const rng=colRange>=0 ? parseRangeTesto(r[colRange]) : {rifBasso:null,rifAlto:null};
    for(const j of dateCols){
      const valore=numIt(r[j]);
      if(isNaN(valore)) continue;
      out.push({nome, valore, unita, rifBasso:rng.rifBasso, rifAlto:rng.rifAlto, data:dateCol[j]});
