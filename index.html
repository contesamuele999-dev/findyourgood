        if(mR){ rifBasso=numIt(mR[1]); rifAlto=numIt(mR[2]); }

function parseDataFlessibile(v){

  if(v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
  const s=String(v).trim();

  return null;
}

/* Genera e scarica un modello Excel compatibile con l'import (esami in riga, date in colonna). */
async function scaricaTemplateSangue(){
  const st=document.getElementById("tmpl-stato");
  const stato=(t,m)=>{ if(st){ st.style.display=m===false?"none":"block"; st.innerHTML=t; } };
  try{
    stato("📊 Preparo il modello…");
    if(!window.XLSX) await caricaLib("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js");
    const sp=saluteProfilo();
    const NDATE=12;                       // colonne data lasciate vuote da compilare
    const vuote=Array(NDATE).fill("");
    const righeEsami=[], visti=new Set();
    const push=(nome,range,unita)=>{ const k=normNome(nome); if(!k||visti.has(k)) return; visti.add(k); righeEsami.push([nome, ...vuote, range||"", unita||""]); };
    // prima gli esami che l'utente segue già (con l'ultimo range/unità noti)
    for(const c of (sp.categorie||[])){
      let range="";
      const u=(sp.sangue||[]).filter(e=>e.catId===c.id&&(e.rifBasso!=null||e.rifAlto!=null)).sort((a,b)=>a.data<b.data?1:-1)[0];
      if(u){ if(u.rifBasso!=null&&u.rifAlto!=null) range=u.rifBasso+" - "+u.rifAlto; else if(u.rifAlto!=null) range="< "+u.rifAlto; else if(u.rifBasso!=null) range="> "+u.rifBasso; }
      push(c.nome, range, c.unita||"");
    }
    for(const [n,r,u] of STD_SANGUE) push(n,r,u);
    // layout come il template: titolo, riga intestazione con date VUOTE, poi Range e Unità
    const aoa=[];
    aoa.push(["Andamento valori del sangue — scrivi le date nella riga qui sotto (formato AAAA-MM-GG) e i valori sotto ogni data"]);
    aoa.push(["Esame", ...vuote, "Range", "Unità misura"]);
    for(const r of righeEsami) aoa.push(r);
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"]=[{wch:34}, ...Array(NDATE).fill({wch:11}), {wch:14}, {wch:14}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Esami");
    XLSX.writeFile(wb, "Modello esami sangue.xlsx");
    stato("✓ Modello scaricato: aprilo, compila i valori e ricaricalo qui.");
    setTimeout(()=>stato("",false), 3500);
  }catch(e){ stato("",false); alert("Non sono riuscito a creare il modello: "+(e&&e.message?e.message:e)+"\nServe una connessione per caricare lo strumento Excel."); }
}
async function importaSangue(input, tipo){
  const file=input.files&&input.files[0]; input.value=""; if(!file) return;
  try{
    let cand=[];
    if(tipo==="excel"){
      impStato("📊 Leggo il foglio…");
      if(!window.XLSX) await caricaLib("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js");
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(new Uint8Array(buf),{type:"array",cellDates:true});
      for(const sh of wb.SheetNames){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,raw:true,defval:null});
        cand=cand.concat(estraiDaRighe(rows));
      }
    } else if(tipo==="pdf" || (tipo==="foto" && /pdf$/i.test(file.name))){
      impStato("📄 Estraggo il testo dal PDF…");
      if(!window.pdfjsLib) await caricaLib("https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js");
      pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;
      let testo="";
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p); const tc=await page.getTextContent();
        // raggruppa per riga in base alla coordinata verticale
        const righe={}; for(const it of tc.items){ const y=Math.round(it.transform[5]); (righe[y]=righe[y]||[]).push(it.str); }
        for(const y of Object.keys(righe).sort((a,b)=>b-a)) testo+=righe[y].join(" ")+"\n";
      }
      cand=estraiDaTesto(testo);
      if(cand.length===0){ impStato("📄 Nessun testo selezionabile: provo con il riconoscimento immagine (OCR)…"); cand=await ocrPdf(file); }
    } else { // foto immagine
      impStato("📷 Riconoscimento testo dall'immagine (OCR), può richiedere qualche secondo…");
      if(!window.Tesseract) await caricaLib("https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js");
      const {data}=await Tesseract.recognize(file,"ita+eng");
      cand=estraiDaTesto(data.text);
    }
    impStato("",false);
    if(!cand.length){ alert("Non sono riuscito a riconoscere valori nel file. Puoi inserirli a mano qui sotto, oppure prova con un foglio Excel/CSV con colonne Esame, Valore, Unità."); return; }
    // deduplica per nome+valore
    const visti=new Set(); impRighe=[];
    for(const c of cand){ const k=c.nome.toLowerCase()+"|"+c.valore; if(visti.has(k)) continue; visti.add(k); impRighe.push(c); }
    mostraRevisioneImport();
  }catch(e){ impStato("",false); alert("Errore durante l'import: "+(e&&e.message?e.message:e)+"\nSe sei offline, l'import richiede una connessione per caricare gli strumenti di lettura."); }
}
async function ocrPdf(file){
  if(!window.pdfjsLib) await caricaLib("https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js");
  pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
  if(!window.Tesseract) await caricaLib("https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js");
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;
  let cand=[];
  for(let p=1;p<=Math.min(pdf.numPages,6);p++){
    const page=await pdf.getPage(p); const vp=page.getViewport({scale:2});
    const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
    await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
    const {data}=await Tesseract.recognize(cv,"ita+eng");
    cand=cand.concat(estraiDaTesto(data.text));
  }
  return cand;
}

function assicuraIndizi(i){

function votaIpotesi(id, delta){
  const i=saluteProfilo().ipotesi.find(x=>x.id===id); if(!i) return;
  assicuraIndizi(i);

  if(nota===null) return;
  const el={testo:norm(String(nota).trim()), data:oggi()};
  if(delta>0){ i.indiziPro.push(el); i.pro=i.indiziPro.length; }
  else { i.indiziContro.push(el); i.contro=i.indiziContro.length; }
  i.agg=Date.now(); salva(); render();
}
function eliminaIndizio(id, tipo, idx){
  const i=saluteProfilo().ipotesi.find(x=>x.id===id); if(!i) return;
  assicuraIndizi(i);
  const arr = tipo==="pro"?i.indiziPro:i.indiziContro;
  arr.splice(idx,1);
  i.pro=i.indiziPro.length; i.contro=i.indiziContro.length;
  i.agg=Date.now(); salva(); render();
}
function statoIpotesi(id, stato){

function eliminaElemento(lista, id){
  if(!confirm("Eliminare questo elemento?")) return;
  const sp=saluteProfilo();
  const elem=(sp[lista]||[]).find(x=>x.id===id);
  sp[lista]=sp[lista].filter(x=>x.id!==id);
  // Rimuovi anche i "cambiamenti nella terapia" collegati (evita promemoria fantasma)
  if((lista==="farmaci"||lista==="trattamenti") && Array.isArray(sp.cambiamenti)){
    const nome=elem&&elem.nome?elem.nome:null;
    sp.cambiamenti=sp.cambiamenti.filter(c=>{
      if(c.rif===id) return false;                                   // collegamento diretto
      if(nome && !c.rif && c.testo && c.testo.includes(nome)) return false;  // compat: vecchi record senza rif
      return true;
    });
  }
  salva(); render();
}

    <p><b>A stomaco vuoto</b> (circa 1 ora prima o 2 ore dopo il pasto): alcuni farmaci si assorbono meglio senza cibo, ad esempio diversi antibiotici, alcuni ormoni tiroidei e i bifosfonati per le ossa. Il cibo può ridurne l'efficacia.</p>
    <p><b>Durante o subito dopo i pasti</b>: farmaci che possono irritare lo stomaco (molti antinfiammatori/FANS, cortisonici) o che si assorbono meglio con il cibo. Il pasto fa da "cuscinetto" e riduce nausea e bruciore.</p>
    <p><b>Regole d'oro:</b> rispetta gli <b>orari</b> il più possibile costanti; non <b>interrompere</b> un antibiotico prima del previsto anche se stai meglio; non <b>raddoppiare</b> se salti una dose (chiedi come comportarti); alcuni farmaci non vanno presi con <b>latte/latticini</b> (calcio) o con il <b>succo di pompelmo</b>, che può alterarne l'effetto.</p>
    <p><b>Con acqua:</b> ingoia le compresse con un <b>bicchiere pieno d'acqua</b> (non a secco), stando seduto o in piedi, per evitare che restino in gola o nell'esofago.</p>
  </div>

  <button class="dettagli-btn" style="margin-top:8px" onclick="togglaSezione('aiuto-dosi')">🥄 Cucchiai, gocce e dosi ▾</button>
  <div id="aiuto-dosi" class="nascosto" style="font-size:.96rem; line-height:1.5">
    <p style="margin-top:8px">Misure indicative per gli sciroppi e i liquidi:</p>
    <ul style="padding-left:20px">
      <li><b>1 cucchiaino</b> da caffè/tè ≈ <b>5 ml</b></li>
      <li><b>1 cucchiaio</b> da tavola ≈ <b>15 ml</b> (cioè 3 cucchiaini)</li>
      <li><b>1 cucchiaio da dessert</b> ≈ <b>10 ml</b></li>
      <li><b>1 tazzina</b> da caffè ≈ 30-40 ml · <b>1 bicchiere</b> d'acqua ≈ 200-250 ml</li>
      <li>Circa <b>20 gocce</b> ≈ 1 ml (varia molto secondo il liquido e il contagocce)</li>
    </ul>
    <p><b>Consiglio:</b> per i farmaci usa sempre il <b>misurino, la siringa dosatrice o il bicchierino graduato</b> forniti nella confezione. I cucchiai di casa hanno capacità molto diverse e sono imprecisi: usali solo come riferimento di massima, mai per dosare un medicinale.</p>
  </div>

  <button class="dettagli-btn" style="margin-top:8px" onclick="togglaSezione('aiuto-acqua')">💧 Bere acqua: quanto e perché ▾</button>
  <div id="aiuto-acqua" class="nascosto" style="font-size:.96rem; line-height:1.5">
    <p style="margin-top:8px">In condizioni normali si indicano circa <b>1,5-2 litri al giorno</b> (6-8 bicchieri), di più con caldo, febbre, sport, diarrea o vomito. Gran parte del corpo è fatta d'acqua: bere a sufficienza aiuta molte funzioni.</p>
    <p><b>Effetti del bere bene:</b> più energia e concentrazione, meno mal di testa, digestione e transito regolari, pelle e reni che lavorano meglio, aiuto nell'eliminare le scorie. Molti farmaci hanno bisogno di buona idratazione per essere smaltiti senza affaticare i reni.</p>
    <p><b>Segnali che stai bevendo poco:</b> urina scura e concentrata, bocca secca, sete intensa, stanchezza, mal di testa, pelle "che resta sollevata" se pizzicata. L'urina chiara è un buon segno.</p>
    <p><b>Consigli pratici:</b> tieni una bottiglia in vista, bevi a piccoli sorsi durante tutta la giornata senza aspettare la sete, un bicchiere al risveglio e uno prima dei pasti. Attenzione a caffè e alcol in eccesso, che fanno urinare di più.</p>
    <p class="sotto">Nota: in alcune condizioni (per es. problemi di cuore o reni) il medico può indicare un limite ai liquidi. In quel caso segui la sua indicazione.</p>
  </div>

  <button class="dettagli-btn" style="margin-top:8px" onclick="togglaSezione('aiuto-abitudini')">🌙 Sonno, movimento e piccole abitudini ▾</button>
  <div id="aiuto-abitudini" class="nascosto" style="font-size:.96rem; line-height:1.5">
    <p style="margin-top:8px"><b>Sonno:</b> per un adulto di solito servono 7-9 ore. Aiutano orari regolari, poca luce e schermi prima di dormire, e limitare caffè dal pomeriggio.</p>
    <p><b>Movimento:</b> anche una camminata di 20-30 minuti al giorno migliora umore, sonno e salute generale.</p>
    <p><b>Pasti:</b> orari regolari e porzioni non enormi aiutano digestione ed energia; annota nell'app cosa ti fa sentire pesante o gonfio, così l'app può notarlo.</p>
    <p><b>Conservazione dei farmaci:</b> tienili all'asciutto, lontano da luce e calore (non in bagno o in auto), fuori dalla portata dei bambini; controlla la <b>scadenza</b> e come conservare quelli che vanno in frigo.</p>
    <p><b>Compila con costanza:</b> il valore dell'app cresce con la regolarità. Basta poco ogni giorno: è dalla continuità che emergono le relazioni tra ciò che fai e come stai.</p>
  </div>

  <p class="avviso" style="margin-top:12px">Queste informazioni sono generali e non sostituiscono il parere di medico o farmacista. In caso di dubbi sui tuoi farmaci o sintomi, chiedi sempre a un professionista.</p>
  </div>`;
}

function aggiungiProfilo(){
  const nome=prompt("Nome della persona:");
  if(!nome) return;
  const id="p"+Date.now();
  S.profili.push({id, nome:nome.trim()});
  S.profiloCorrente=id;
  salva(); render();
}
function rinominaProfilo(id){
  const p=S.profili.find(p=>p.id===id);
  const nome=prompt("Nuovo nome:", p.nome);
  if(!nome) return;
  p.nome=nome.trim(); salva(); render();
}
function eliminaProfilo(id){
  const p=S.profili.find(p=>p.id===id);
  if(!confirm(`Eliminare "${p.nome}" e tutti i suoi dati? Non si può annullare.`)) return;
  S.profili=S.profili.filter(x=>x.id!==id);
  delete S.voci[id];
  if(S.profiloCorrente===id) S.profiloCorrente=S.profili[0].id;
  salva(); render();
}
function esporta(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="find-your-good-backup-"+oggi()+".json";
  a.click();
  mostraToast("Backup scaricato ✓");
}
function importa(input){
  const f=input.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const dati=JSON.parse(r.result);
      if(!dati.profili||!dati.voci) throw new Error();
      if(!confirm("Sostituire i dati attuali con quelli del backup?")) return;
      S=dati; salva(); render();
      mostraToast("Backup caricato ✓");
    }catch(e){ alert("File non valido. Usa un backup creato da questa app."); }
  };
  r.readAsText(f);
}
function cancellaTutto(){
  if(!confirm("Cancellare DAVVERO tutti i tuoi dati?")) return;
  if(!confirm("Ultima conferma: i dati andranno persi per sempre (a meno che tu non abbia un backup).")) return;
  localStorage.removeItem(chiaveDati);
  S=carica(); render();
}
function impostaConvalescenza(val){
  const n=parseInt(val,10);
  S.impostazioni.giorniConvalescenza=isNaN(n)?3:Math.max(0,Math.min(14,n));
  salva();
}
function impostaConvAuto(on){ S.impostazioni.convalescenzaAuto=!!on; salva(); render(); }
function impostaSonnoDefault(campo, val){ if(!val) return; S.impostazioni[campo+"Default"]=val; salva(); }
function impostaTraccia(k, on){
  if(!S.impostazioni.traccia) S.impostazioni.traccia={};
  S.impostazioni.traccia[k]=!!on;
  salva();
}
function nomeProfiloCorrente(){
  if(utente&&utente.email) return utente.email;
  const p=S.profili.find(p=>p.id===S.profiloCorrente);
  return p?p.nome:"—";
}

function generaResoconto(){
  let dal=valore("rep-dal")||spostaGiorni(oggi(),-29);
  let al=valore("rep-al")||oggi();
  if(dal>al){ const t=dal; dal=al; al=t; }
  const voci=vociProfilo();
  const sp=saluteProfilo();
  const nomiSint=Object.fromEntries(SINTOMI);
  const nomiAtt=Object.fromEntries(ATTIVITA);
  const nomiUr=Object.fromEntries(URINA.map(([k,n])=>[k,n]));
  const nomiFe=Object.fromEntries(FECI.map(([k,n])=>[k,n]));
  const nomiFecCons=Object.fromEntries(CONSISTENZA_FECI);
  const nomiOc=Object.fromEntries(OCCHI);
  const nomiQ=Object.fromEntries(QUANTITA);
  // giorni nel periodo, ordinati
  const date=[];
  for(let d=dal; d<=al; d=spostaGiorni(d,1)) date.push(d);
  const dateCompilate=date.filter(d=>voci[d]&&compilato(d));
  // medie
  const num=(campo)=>{ const a=dateCompilate.map(d=>voci[d][campo]).filter(x=>x!=null); return a.length?(a.reduce((x,y)=>x+y,0)/a.length):null; };
  const fmt=(x)=> x==null?"—":(Math.round(x*10)/10).toString().replace(".",",");
  // conteggio sintomi
  const contaSint={};
  for(const d of dateCompilate) for(const s of (voci[d].sintomi||[])) contaSint[s]=(contaSint[s]||0)+1;
  const sintOrd=Object.entries(contaSint).sort((a,b)=>b[1]-a[1]);
  const totScariche=dateCompilate.reduce((t,d)=>t+(voci[d].scariche||0),0);
  const giorniConScariche=dateCompilate.filter(d=>voci[d].scariche!=null).length;

  const per=(iso)=>{
    const v=voci[iso]; if(!v||!compilato(iso)) return "";
    const parti=[];
    if(v.umore!=null) parti.push(`Umore ${v.umore}/5`);
    if(v.stress!=null) parti.push(`Stress ${v.stress}/5`);
    if(v.sonnoQ!=null) parti.push(`Sonno ${v.sonnoQ}/5`);
    if(v.oraDormire||v.oraSveglia) parti.push(`Orari sonno ${v.oraDormire||"?"}→${v.oraSveglia||"?"}`);
    if(v.risvegli!=null) parti.push(`Risvegli ${v.risvegli}${v.motivoRisvegli?" ("+esc(v.motivoRisvegli)+")":""}`);
    if(v.incubi) parti.push(`Incubi${v.notaIncubi?" ("+esc(v.notaIncubi)+")":""}`);
    if(v.sogni) parti.push(`Sogni: ${esc(v.sogni)}`);
    if(v.peso!=null) parti.push(`Peso ${v.peso} kg`); else if(v.pesoSaltato) parti.push("Peso: non pesato");
    if(v.temperatura!=null) parti.push(`Temp. ${tempTesto(v.temperatura)}`);
    if(v.acqua!=null) parti.push(`Acqua ${v.acqua} bicch.`);
    if(v.urina) parti.push(`Urina: ${nomiUr[v.urina]}`);
    if(v.scariche!=null) parti.push(`Scariche ${v.scariche}×`); else if(traccia('feci')) parti.push("Scariche 0×");
    if(v.feci) parti.push(`Feci: ${nomiFe[v.feci]}`);
    if(v.feciConsistenza) parti.push(`Consistenza: ${nomiFecCons[v.feciConsistenza]}`);
    if(v.occhi) parti.push(`Occhi: ${nomiOc[v.occhi]}`);
    if(v.stanchezza!=null) parti.push(`Stanchezza ${v.stanchezza}/5`);
    if(v.sonnolenza!=null) parti.push(`Sonnolenza ${v.sonnolenza}/5`);
    const igi=[]; if(v.denti!=null) igi.push("denti "+v.denti+"×"); if(v.filo!=null) igi.push("filo "+v.filo+"×"); if(v.colluttorio) igi.push("colluttorio");
    if(igi.length) parti.push("Igiene: "+igi.join(", "));
    const pasti=PASTI.filter(([pk])=>v.pasti&&v.pasti[pk]&&(v.pasti[pk].q||v.pasti[pk].ora)).map(([pk,pn])=>{
      const p=v.pasti[pk]; const m=(MACRO.find(x=>x[0]===p.macro)||[])[1]; return pn.replace(/^[^ ]+ /,"")+(p.q?": "+nomiQ[p.q]:"")+(m?" · "+m:"")+(p.ora?" ("+p.ora+")":"")+(p.ecc?" ⚠️":"");
    });
    if(pasti.length) parti.push("Pasti: "+pasti.join("; "));
    if(v.sintomi&&v.sintomi.length){
      const s=v.sintomi.map(sk=>{ const int=v.sintomiIntensita&&v.sintomiIntensita[sk]; const tp=v.sintomiTipo&&v.sintomiTipo[sk]; return (nomiSint[sk]||sk)+(tp?" "+esc(tp):"")+(int?" ("+int+"/10)":""); });
      parti.push("<b>Disturbi:</b> "+s.join("; "));
    }
    if(v.attivita&&v.attivita.length){
      const a=v.attivita.map(ak=>{
        const dett=(v.attivitaDett&&v.attivitaDett[ak])||[];
        if(dett.length) return dett.map(x=>(nomiAtt[ak]||ak).replace(/^[^ ]+ /,"")+(x.n?" "+esc(x.n):"")+(x.d?" "+x.d+"min":"")+(x.int?" ("+x.int+")":"")).join(", ");
        return (nomiAtt[ak]||ak).replace(/^[^ ]+ /,"");
      });
      parti.push("Cura di te: "+a.join("; "));
    }
    const adRep=(id)=>{ const st=v.aderenza&&v.aderenza[id]; const q=v.aderenzaDett&&v.aderenzaDett[id]; return st==="preso"?" [preso"+(q?" "+esc(q):"")+"]":(st==="saltato"?" [saltato]":""); };
    const fAtt=sp.farmaci.filter(f=>iso>=f.dal&&(!f.al||iso<=f.al)).map(f=>esc(f.nome)+(f.dose?" ("+esc(f.dose)+")":"")+adRep(f.id));
    if(fAtt.length) parti.push("Farmaci: "+fAtt.join(", "));
    const tAttR=sp.trattamenti.filter(t=>iso>=t.dal&&(!t.al||iso<=t.al)).map(t=>esc(t.nome)+adRep(t.id));
    if(tAttR.length) parti.push("Trattamenti: "+tAttR.join(", "));
    const camb=sp.cambiamenti.filter(c=>c.data===iso).map(c=>esc(c.testo));
    if(camb.length) parti.push("<b>Cambio terapia:</b> "+camb.join("; "));
    const vis=sp.visite.filter(x=>x.data===iso).map(x=>esc(x.testo)+(x.invasivo?" (invasivo)":""));
    if(vis.length) parti.push("<b>Visite/esami:</b> "+vis.join("; "));
    if(v.note) parti.push("Note: "+esc(v.note));
    return `<tr><td class="d">${iso.slice(8,10)}/${iso.slice(5,7)}</td><td>${parti.join(" · ")}</td></tr>`;
  };

  let righe=""; for(const d of date) righe+=per(d);
  if(!righe) righe=`<tr><td colspan="2" style="color:#666">Nessun dato registrato nel periodo selezionato.</td></tr>`;

  // farmaci/trattamenti attivi nel periodo
  const farmPeriodo=sp.farmaci.filter(f=>f.dal<=al&&(!f.al||f.al>=dal))
    .map(f=>`<li><b>${esc(f.nome)}</b>${f.dose?" — "+esc(f.dose):""} (dal ${f.dal}${f.al?" al "+f.al:", in corso"})</li>`).join("");
  const trattPeriodo=sp.trattamenti.filter(t=>t.dal<=al&&(!t.al||t.al>=dal))
    .map(t=>`<li><b>${esc(t.nome)}</b>${t.dett?" — "+esc(t.dett):""} (dal ${t.dal}${t.al?" al "+t.al:", in corso"})</li>`).join("");
  const sanguePeriodo=(sp.sangue||[]).filter(e=>e.data>=dal&&e.data<=al).sort((a,b)=>a.data<b.data?-1:1)
    .map(e=>{ const f=(e.rifBasso!=null&&e.valore<e.rifBasso)||(e.rifAlto!=null&&e.valore>e.rifAlto); return `<li>${e.data} — <b>${esc(e.nome)}</b>: ${esc(String(e.valore))}${e.unita?" "+esc(e.unita):""}${(e.rifBasso!=null||e.rifAlto!=null)?" (rif. "+(e.rifBasso!=null?e.rifBasso:"–")+"–"+(e.rifAlto!=null?e.rifAlto:"–")+")":""}${f?" <b>⚠ fuori range</b>":""}</li>`; }).join("");

}
function contaVoci(st){
  let n=0;
  for(const pid in (st.voci||{})) n+=Object.keys(st.voci[pid]||{}).length;
  return n;
}
function unisci(remoto, locale){
  const out=JSON.parse(JSON.stringify(remoto));
  out.profili=out.profili||[];
  // Un profilo locale conta solo se ha davvero dei dati (voci o salute):
  // così un profilo "Io" appena creato (es. dopo aver svuotato i dati PWA)
  // non viene aggiunto come doppione né scavalca i dati già nel cloud.
  const haDati=(pid)=>{
    const vv=locale.voci&&locale.voci[pid];
    if(vv && Object.keys(vv).length) return true;
    const ss=locale.salute&&locale.salute[pid];
    if(ss && ["farmaci","trattamenti","visite","notizie","ipotesi","cambiamenti","sangue"].some(k=>ss[k]&&ss[k].length)) return true;
    return false;
  };
  for(const p of (locale.profili||[])){
    if(out.profili.some(x=>x.id===p.id)) continue;
    if(out.profili.length===0 || haDati(p.id)) out.profili.push(p);
  }
  if(out.profili.length===0) out.profili=locale.profili;
  // Mantieni il profilo corrente locale solo se esiste ancora nell'unione
  // (cioè non è un doppione vuoto scartato); altrimenti usa quello del cloud.
  const localeVuoto=!(locale.profili||[]).some(p=>haDati(p.id));
  const preferito =
    (!localeVuoto && out.profili.some(p=>p.id===locale.profiloCorrente)) ? locale.profiloCorrente
    : (remoto.profiloCorrente && out.profili.some(p=>p.id===remoto.profiloCorrente)) ? remoto.profiloCorrente
    : null;
  out.voci=out.voci||{};
  for(const pid in (locale.voci||{})){
    out.voci[pid]=out.voci[pid]||{};
    for(const d in locale.voci[pid]){
      const l=locale.voci[pid][d], r=out.voci[pid][d];
      if(!r || (l.agg||0)>=(r.agg||0)) out.voci[pid][d]=l;
    }
  }
  out.salute=out.salute||{};
  for(const pid in (locale.salute||{})){
    out.salute[pid]=out.salute[pid]||{};
    for(const k of ["farmaci","trattamenti","visite","notizie","ipotesi","cambiamenti","sangue"]){
      const mappa={};
      for(const x of (out.salute[pid][k]||[])) mappa[x.id]=x;
      for(const x of (locale.salute[pid][k]||[])){
        if(!mappa[x.id] || (x.agg||0)>=(mappa[x.id].agg||0)) mappa[x.id]=x;
      }
      out.salute[pid][k]=Object.values(mappa);
    }
  }
  // Se il locale è vuoto (dispositivo appena ripulito) tieni le impostazioni del cloud.
  out.impostazioni = localeVuoto
    ? (out.impostazioni||locale.impostazioni||{oraPromemoria:"20:00"})
    : (locale.impostazioni||out.impostazioni||{oraPromemoria:"20:00"});
  // Scegli come profilo iniziale uno che abbia davvero dei dati, cosi dopo il
  // login su un nuovo dispositivo (es. tablet) non si apre su una persona vuota.
  const haDatiOut=(pid)=>{
    const vv=out.voci&&out.voci[pid];
    if(vv && Object.keys(vv).length) return true;
    const ss=out.salute&&out.salute[pid];
    if(ss && ["farmaci","trattamenti","visite","notizie","ipotesi","cambiamenti","sangue"].some(k=>ss[k]&&ss[k].length)) return true;
    return false;
  };
  out.profiloCorrente =
    (preferito && haDatiOut(preferito)) ? preferito
    : ((out.profili.find(p=>haDatiOut(p.id))||{}).id || preferito || out.profili[0].id);
  return out;
}

/* ============ SWIPE (cambio giorno/mese) ============ */
function setupSwipe(){
  let x0=null,y0=null,t0=0;
  const bloccata=(el)=> el && el.closest && el.closest('input,textarea,select,button,label,a,.modale,.riga-intensita,.voce-attivita,canvas,.contatore-acqua,.tl-scroll,.slider-orario');
  document.addEventListener("touchstart",(e)=>{
    if(e.touches.length!==1 || bloccata(e.target)){ x0=null; return; }
    x0=e.touches[0].clientX; y0=e.touches[0].clientY; t0=Date.now();
  },{passive:true});
  document.addEventListener("touchend",(e)=>{
    if(x0==null) return;
    const t=e.changedTouches[0];
    const dx=t.clientX-x0, dy=t.clientY-y0, dt=Date.now()-t0;
    x0=null;
    if(dt>600 || Math.abs(dx)<60 || Math.abs(dy)>50) return;
    if(!authPronto || !utente) return;
    const avanti = dx<0; // trascinamento verso sinistra = giorno/mese successivo
    if(vista==="oggi"){
      if(avanti){ if(dataInModifica<oggi()){ dataInModifica=spostaGiorni(dataInModifica,1); render(); } }
      else { dataInModifica=spostaGiorni(dataInModifica,-1); render(); }
    } else if(vista==="diario"){
      if(modoDiario==="anno"){ if(avanti && annoDiario>=+oggi().slice(0,4)) return; annoDiario+=avanti?1:-1; render(); }
      else if(modoDiario==="settimana"){ settimanaAncora=spostaGiorni(settimanaAncora, avanti?7:-7); render(); }
      else if(modoDiario==="giorno"){ if(avanti && giornoDiario>=oggi()) return; giornoDiario=spostaGiorni(giornoDiario, avanti?1:-1); render(); }
      else cambiaMese(avanti?1:-1);
    }
  },{passive:true});
}

/* ============ AVVIO ============ */
setupSwipe();
applicaTema();
if(window.matchMedia){
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", ()=>{
    if((S.impostazioni&&S.impostazioni.tema||"auto")==="auto") applicaTema();
  });
}
if(!supaCfg){ authPronto=true; }   // nessuna configurazione: mostra la schermata di configurazione
initSupabase();
render();
</script>
